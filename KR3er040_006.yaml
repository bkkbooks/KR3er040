精神昏憒痰涎不利等症全蠍去毒炒殭蠶天麻防風人參辰砂雄黃甘草炙牛黃麝香五分上為末煉蜜丸芡實大每服一丸薄荷煎湯下消風散治風熱上攻頭目昏眩鼻塞聲重及皮膚頑麻癮疹瘙癢等症荊芥穗甘草炙陳皮厚朴各五兩殭蠶人參茯苓防風川芎藿香葉蛇蛻去土炒羌活各二兩上為末每服二錢清茶調白餅子治小兒咳吐痰涎腹中痞癖臟腑積熱元氣充實者巴豆二十四個去皮膜水煮半夏輕粉滑石天南星上研勻為末糯米飯丸小豆大捻作餅子每服一餅白湯下天麻散治小兒急慢驚風發熱抽搐痰涎壅盛或脾土虛弱肝木乘侮以致前症或吐瀉不食嗜臥困倦半夏七錢天麻二錢半甘草炙白茯苓白朮各三錢上為末每服一錢半薑棗湯調涼驚丸治小兒急驚抽搐發熱痰盛或肝經風熱積熱抽搐目瞪或連札等症防風青黛草龍膽各三錢鉤藤鉤二錢牛黃黃連各五分麝香龍腦各少許上糊丸粟米大每服三五丸薄荷湯下利驚丸治小兒驚風及風熱生涎咽喉不利脾胃無傷痰涎壅盛者辰砂南星炮去皮臍巴豆去心油各五錢上為末蒸餅丸黍米大每服五七丸薄荷生薑煎湯下瀉青丸治肝經實熱生風目睛上視驚搐痰盛發熱便祕等症龍膽草炒焦川芎當歸梔子炒羌活防風各一錢大黃煨五分上為末煉蜜丸芡實大每服一丸白湯下導赤散治心經有熱煩躁驚搐小便赤澀生地黃木通甘草炙各一錢上為末每服一錢竹葉煎湯調服瀉黃散治脾經有熱煩躁驚搐小便赤澀口舌生瘡咽乾作渴等症藿香葉七錢山梔一兩石膏五錢防風四兩甘草三兩上為末每服一錢白湯調瀉白散治肺經有熱咳嗽痰壅等症桑白皮地骨皮各一兩甘草五錢上為末每服一錢白湯調益黃散治脾土虛寒飲食少思或嘔吐作瀉腹痛腸鳴或寒水反來侮土以致前症陳皮一兩青皮訶子肉甘草炙丁香各二錢上為末每服二錢水煎陳氏異功散治元氣虛寒痘瘡色白寒戰咬牙泄瀉喘嗽等症木香當歸各三錢半官桂茯苓白朮各二錢人參肉豆蔻陳皮厚朴薑製丁香各二錢半半夏附子炮各一錢半上為末每服二三錢薑棗水煎百祥丸治痘疹黑陷耳冷鼻鼽咬牙吐瀉飲食不進等症紅牙大戟一兩青州棗三十個上水煎乾去大戟將棗焙乾為丸白湯下升麻葛根湯治痘瘡初見發熱頭痛等症升麻葛根芍藥甘草上水煎服清涼飲治痘後餘毒頭面患瘡目赤咽痛發熱飲冷大便不通等症赤芍藥當歸甘草大黃各等分上水煎服柴術參苓散治肝火風熱搐搦不寧肢體瘙癢等症柴胡山梔炒川芎芍藥炒各五分熟地黃當歸各八分茯苓甘草炒各五分上水煎服參苓白朮散治脾胃虛弱飲食少思或嘔吐泄瀉等症病後元氣未復亦宜用此藥調理人參茯苓白扁豆去皮薑汁拌炒白朮炒蓮肉去皮心砂仁炒薏苡仁炒桔梗炒山藥甘草炙上為末每服二錢白湯煎服人參安胃散治因服峻厲脾胃虧損或成慢驚泄瀉嘔吐或腸胃有熱以致前症人參一錢黃耆三錢生甘草炙甘草各五分白芍藥七分白茯苓四分黃連二分上為末每服二錢水煎溫脾散治脾胃虧損腹脅虛脹乳食不進困倦無力等症訶子肉人參各七錢半白朮木香桔梗茯苓藿香陳皮黃耆各五錢甘草二錢半上每服二錢薑棗水煎溫膽湯治膽氣怯弱驚悸少寐發熱嘔痰飲食少思等症半夏枳實各一兩橘紅一兩五錢茯苓七錢半甘草炙四錢上每服一二錢薑棗水煎肥兒丸治小兒食積五疳或白禿體瘦肚大筋青發稀成穗或遍身瘡疥等症蕪荑炒神麯炒麥蘖炒黃連各一錢上為末豬膽汁丸黍米大每服一二十丸木通煎湯下九味蘆薈丸治小兒肝脾疳積體瘦熱渴大便不調或瘰癧結核耳內生瘡等症胡黃連黃連蘆薈木香蕪荑炒青皮白雷丸鶴膝草各一兩麝香三錢上為末蒸餅糊丸麻子大每服一錢空心白湯下大蕪荑湯一名梔子茯苓湯治小兒脾疳少食發熱作渴大便不調發黃脫落面黑便青鼻下生瘡能乳食吐等症山梔三分黃柏甘草炙各二分蕪荑五分黃連防風各二分麻黃羌活柴胡各三分白朮五分茯苓當歸各四分上每服二錢水煎桔梗湯治咳嗽吐膿痰中有血已成肺癰症桔梗炒貝母當歸酒浸栝蔞仁枳殼麩炒薏苡仁桑白皮炒百合蒸各一錢半五味子炒甜葶藶炒地骨皮知母炒甘草節防己黃耆杏仁各五分上水煎服地黃清肺飲治肺疳咳嗽痰唾稠黏等症明阿膠一錢麵炒鼠黏子三分炒馬兜鈴甘草各五分杏仁七枚去皮尖糯米炒十粒上每服一錢水煎清中解鬱湯治小兒脾氣虛弱飲食停滯鬱熱生痰或身發赤暈等症白朮茯苓陳皮山梔炒山楂神麯炒麥芽炒川芎桔梗甘草炒各五分上每服二錢水煎九味解毒湯治一切熱毒腫痛或風熱瘙癢脾胃無傷者黃連三分金銀花連翹漏蘆各五分山梔四分白芷六分當歸八分防風三分甘草二分上每服二錢水煎大連翹飲治風熱熱毒表裡受患脾胃無傷發熱作渴大便祕結者連翹瞿麥荊芥木通赤芍藥蟬蛻甘草防風柴胡滑石山梔炒黃芩炒當歸各等分上每服一錢水煎犀角消毒丸治瘡瘍初起焮腫作痛熱悶已成欲作膿或膿成已潰者皆不宜用犀角薄荷連翹玄參牛蒡子各一錢甘草三分金銀花一錢上為末丸桐子大每服一二十丸白湯下硃砂安神丸治心神煩亂發熱怔忡少寐或寐中驚悸等症黃連一錢半生地黃當歸甘草炙五分硃砂一錢另研上為末蒸餅丸黍米大每服十丸津咽下柴胡清肝散治肝膽三焦風熱瘡瘍或怒火憎寒發熱或瘡毒結於兩耳前後或身外側至足或胸乳小腹下及兩股內側至足等症柴胡黃芩炒人參各三分山梔炒川芎各五分連翹桔梗各四分甘草三分上水煎服活血散治痘疹已出未盡煩躁不寧肚腹作疼等症白芍藥一兩酒炒紫草茸一錢半上為末每服一匙糯米湯調下神功散治一切瘡瘍腫焮作痛未成者敷之即散已潰者敷之腫痛即消黃柏炒草烏炒血竭上為末津調敷患處惺惺散治變蒸傷寒頭疼壯熱目眵多睡咳嗽喘急或痘疹已出未出疑似之間人參白朮茯苓芍藥細辛桔梗甘草天花粉等分上水姜煎服人參羌活散治傷寒時氣頭疼或痘疹兼於發表人參羌活獨活柴胡前胡桔梗茯苓枳殼川芎天麻甘草地骨皮各三分上入薄荷五葉薑水煎服參蘇飲治感冒風寒發熱咳嗽或痘瘡初起未出咳嗽等症人參紫蘇陳皮半夏茯苓枳殼麩炒桔梗炒前胡乾葛甘草各五分木香上薑水煎服升均湯治痘瘡已出不勻或吐瀉發熱作渴升麻乾葛芍藥炒人參白朮炒茯苓甘草紫草如無紅花代之上每服三五錢薑水煎參耆四聖散治痘瘡已出至六七日不起發不生膿不作癢人參黃耆炒白朮炒茯苓當歸芍藥炒川芎各五分紫草木通防風各三分糯米二百粒上水煎服人參透肌飲治痘瘡雖出不齊隱於肌膚間者人參紫草白朮茯苓當歸芍藥木通蟬蛻甘草糯米各等分上每服三錢水煎參耆內托散治痘瘡裡虛發癢或不潰膿或為倒靨等症人參黃耆炒當歸川芎厚朴薑製防風桔梗炒白芷官桂紫草木香甘草炒上入糯米一撮水煎服仍量兒加減加味參耆朮附湯治痘瘡表裡俱虛吐瀉作渴手足厥冷非犯裡虛寒戰咬牙吐瀉頭溫足冷者不可服人參三錢黃耆二錢五分白朮二錢附子木香各五分當歸一錢五分川芎陳皮炒甘草炙各一錢豆蔻煨一個茯苓乾葛各一錢半訶子二個芍藥一錢五分糯米三百粒上每服二錢薑水煎紫草快斑湯治痘疹血氣不足不能發出色不紅活等症紫草人參白朮茯苓當歸川芎芍藥木通甘草糯米上每服二錢水煎人參胃愛散治痘瘡已發未發吐瀉不止不思飲食等症人參藿香紫蘇木瓜丁香茯苓甘草糯米上每服三錢薑棗水煎紫草木香湯治痘瘡裡虛癢塌黑陷悶亂紫草木香茯苓白朮人參甘草炒糯米上每服三錢水煎人參門冬飲治痘瘡發熱煩渴等症麥門冬一兩人參陳皮白朮厚朴甘草各五錢上每服二三錢水煎前胡枳殼湯治痘瘡八九日間腹脹大小便不通等症前胡枳殼麩炒茯苓大黃炒甘草各等分上每服二錢水煎服如身溫脈微及瀉者不可用射干鼠黏子湯治痘瘡收斂後餘毒不盡發熱不止或咽喉腫痛或患熱毒等症鼠黏子四兩炒升麻射干甘草各一兩上每服三錢水煎三豆飲治天行痘瘡始覺即服之多者必少少者不出等症赤小豆黑豆緑豆各一升甘草節五錢上水煮熟任兒食之七日自不發敗草散治痘瘡過搔成瘡膿血淋漓謂之斑爛用屋爛草或蓋牆爛草多年者佳取為末搽之須多摻席上任兒坐臥紫草木通湯治痘疹出不快紫草人參木通茯苓糯米各等分甘草減半上每服二錢水煎消毒散治痘疹初起煩熱或痘後餘毒瘡腫牛蒡子炒荊芥穗甘草各五分上水煎服甘桔防風湯治痘後餘熱咽膈不利或咽舌生瘡等症桔梗炒甘草防風各一錢上水煎服甘露飲子治積熱及痘後咽喉腫痛口舌生瘡等症生地黃炒麥門冬去心焙熟地黃天門冬去心黃芩炒石斛枳殼麩炒枇杷葉茵陳甘草炙各等分上每服二錢水煎穀精草散治痘疹已靨翳膜遮障瞳子等症穀精草一兩蛤粉二兩黑豆二兩上為末用雄豬肝一葉竹刀批開摻藥在內以麻線縛定砂罐內水煮熟任兒食之化黴丹治胎毒及痘後頭面生瘡眼目腫痛或口舌生瘡口乾作渴大便堅實等症生地黃杵膏熟地黃自制杵膏天門冬麥門冬玄參各三兩甘草甜硝各二兩青黛一兩五錢上為末煉蜜丸芡實大每服一丸白湯化下大如聖飲子治瘡疹斑痘毒攻咽嗌腫痛熱渴或成腫毒不消等症桔梗甘草鼠黏子炒各一兩麥門冬五錢上每服二錢水煎宣風散治驚風檳榔二個陳皮甘草各等分牽牛四兩半生半炒上為末每服五分蜜湯調下木香散治小兒腹脹瀉渴等症木香大腹皮人參桂心赤茯苓青皮前胡訶梨勒半夏薑製丁香甘草炙各等分上每服二錢薑水煎雄黃解毒散治痘瘡後牙疳口臭或走馬疳齦頰蝕爛或肢體成痘疳凹陷不愈雄黃一兩銅碌二錢五分上為末用米泔水洗淨乾摻患處口內不可用絲瓜湯治痘瘡毒絲瓜升麻芍藥酒浸甘草黑豆赤小豆犀角鎊上水煎服四聖散治痘疹出不快及倒靨紫草茸木通甘草炙枳殼麩炒黃耆各等分上每服二錢水煎獨聖散治痘瘡倒靨陷伏用穿山甲取前足嘴上者燒存性為末以木香湯入少酒服之快透散治痘瘡出不快等症紫草蟬蛻人參木通芍藥甘草炙各等分上每服二錢水煎鼠黏子湯治斑疹稠密身熱等症鼠黏子炒當歸甘草炙各一錢柴胡連翹黃芩黃耆各一錢半地骨皮二錢上每服二錢水煎紫草散治痘疹黑陷氣血虛弱瘡疹不起紫草甘草黃耆炙糯米各一錢半上水煎服益元散治痘疹初起煩躁作渴等症滑石六兩甘草一兩上各另為末每服五六分白湯調下粉紅丸治心虛困臥驚動痰涎不利或發熱痰嗽等症天南星硃砂一錢五分天竺黃五錢龍腦一錢胭脂一錢上用牛膽汁和丸芡實大每服一丸沙糖湯下製附子法附子重一兩三四錢有蓮花瓣頭圓底平者先備童便五六碗將附子先放在灶上煙匱中間良久乘熱投入童便浸五七日候潤透揭皮切四塊仍浸二三日用粗紙數層包之浸濕埋灰火半日取出切片檢視有白星者乃用瓦上炙熟至無白星為度如急用即切大片用童便煮二三沸熱瓦熟用之
