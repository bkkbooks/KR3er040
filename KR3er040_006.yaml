body:
  text: 卷之六附方補中益氣湯治中氣不足或誤服克伐四肢倦怠口乾發熱飲食無味或飲食失節勞倦身熱脈洪大而無力或頭痛惡寒自汗或氣高而喘身熱而煩脈微細軟弱自汗體倦少食或中氣虛弱而不能攝血或飲食勞倦而患瘧痢或瘧痢等症因脾胃虛而不能愈者或元氣虛弱感冒風寒不勝發表宜用此代之或入房而後勞役感冒或勞役感冒而後入房者急加附子愚謂人之一身以脾胃為主脾胃氣實則肺得其所養肺氣既盛水自生焉水升則火降水火既濟而成天地交泰之令矣脾胃一虛四臟俱無生氣故東垣先生著脾胃內外傷等論諄諄然皆以固脾胃為本所制補中益氣湯又冠諸方之首觀其立方本旨可知矣故曰補腎不若補脾正此謂也前所言治症概舉其略余當仿此而類推之是以附方之首並注以表明之人參黃耆炒白朮炒甘草炙各一錢五分當歸一錢陳皮五分柴胡升麻各三分上薑棗水煎空心午前服八珍湯治肝脾傷損血氣虛弱惡寒發熱或煩躁作渴或寒熱昏憒或胸膈不利大便不實或飲食少思小腹脹痛等症人參白朮白茯苓當歸川芎白芍藥熟地黃各一錢甘草炙五分上薑棗水煎服十全大補湯治氣血俱虛發熱惡寒自汗盜汗肢體倦怠或頭痛眩暈口乾作渴又治久病虛損口乾食少咳而下利驚悸發熱或寒熱往來盜汗自汗晡熱內熱遺精白濁或二便見血小腹作痛小便短少大便乾澀或大便滑泄肛門下墜小便頻數陰莖癢痛等症即八珍湯加黃耆肉桂各一錢四物湯治血虛發熱或寒熱往來或日晡發熱頭目不清或煩躁不寐胸膈作脹或脅作痛尤當服之當歸熟地黃各三錢芍藥二錢川芎一錢五分上水煎服加味四物湯即前方加山梔柴胡牡丹皮四君子湯治脾胃虛弱飲食少思或大便不實體瘦面黃或胸膈虛痞痰嗽吞酸或脾胃虛弱善患瘧痢等症人參白朮茯苓各二錢甘草炙一錢上薑棗水煎服六君子湯治脾胃虛弱飲食少思或久患瘧痢若覺內熱或飲食難化作酸屬虛火須加炮姜其功甚速即前方加半夏陳皮香砂六君子湯即六君子加香附藿香砂仁歸脾湯治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗或心脾作痛嗜臥少食或大便不調或肢體腫痛或思慮傷脾而患瘧疾大凡懷抱鬱結而患諸症或因用藥失宜克伐傷胃變諸別症者最宜用之人參白朮白茯苓黃耆龍眼肉各二錢遠志一錢酸棗仁二錢木香五分甘草炙五分當歸二錢上薑棗水煎服加味歸脾湯治脾經血虛發熱等症即前方加牡丹皮山梔各一錢加味逍遙散治脾肝血虛發熱或耳內及胸乳腹脹小便不利當歸白朮茯神芍藥甘草柴胡各一錢牡丹皮山梔各七分上薑水煎服逍遙散即前方去山梔牡丹皮六味丸一名地黃丸一名腎氣丸治腎虛作渴小便淋祕氣壅痰涎頭目眩暈眼花耳聾咽燥舌痛齒痛腰腿痿軟等症及腎虛發熱自汗盜汗便血諸血失音水泛為痰之聖藥血虛發熱之神劑又治腎陰虛弱津液不降敗濁為痰或致咳逆又治小便不禁收精氣之虛脫為養氣滋腎制火導水使機關利而脾土健實熟地黃八兩杵膏山茱萸肉乾山藥各四兩牡丹皮白茯苓澤瀉各三兩上各另為末和地黃加煉蜜丸桐子大每服七八十丸空心食前滾湯下八味丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實或下元冷憊臍腹疼痛夜多漩溺即前方加肉桂附子各一兩經云益火之源以消陰翳即此藥也加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰蝕咽喉作痛或形體憔悴寢汗發熱五臟齊損即六味丸加肉桂一兩五味子四兩加減金匱腎氣丸治脾腎虛腰重腳腫小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱症其效如神此症多因脾胃虛弱治失其宜元氣復傷而變症者非此藥不能救白茯苓三兩附子五錢川牛膝桂澤瀉車前子山茱萸山藥牡丹皮各一兩熟地黃四兩掐碎酒拌杵膏上為末和地黃加煉蜜丸桐子大每服七八十丸空心米飲下還少丹治脾腎虛寒飲食少思發熱盜汗遺精白濁又治真氣虧損肌體瘦弱等症肉蓯蓉遠志茴香巴戟乾山藥枸杞子熟地黃石菖蒲山茱萸牛膝杜仲薑製楮實子五味子白茯苓各二兩上各另為末用棗肉百枚並煉蜜丸桐子大每服五七十丸空心溫酒或鹽湯下日三服十補丸治腎臟虛冷面黑足寒耳聾膝軟小便不利等症附子炮五味子各二兩山茱萸山藥牡丹皮鹿茸制桂心茯苓澤瀉各一兩上為末煉蜜丸桐子大每服六七十丸鹽湯下當歸補血湯治血氣損傷或妄服峻劑致氣血益虛肌熱大渴引飲目赤面紅脈洪大而虛重按全無此病多得於飢飽勞役者黃耆炙一兩當歸三錢酒製上水煎服人參養榮湯治脾肺俱虛發熱惡寒肢體瘦倦食少作瀉等症又治久病虛損口乾食少咳而下痢心驚悸熱而自汗等症白芍藥一錢五分人參陳皮黃耆蜜炙桂心當歸白朮甘草炙各一兩熟地黃五味子炒茯苓各七分半遠志五分上薑棗水煎服參朮膏治中氣虛弱諸藥不應或因用藥失宜耗傷元氣虛症蜂起但用此藥補其中氣諸症自愈人參白朮各等分上水煎稠湯化服之濟陰地黃丸治足三陰虧損虛火上炎致目睛散大視物不的或昏花澀緊作痛畏明或卒見非常之處等症其功效與六味還少丹相似五味子麥門冬當歸熟地黃肉蓯蓉山茱萸乾山藥枸杞子甘菊花巴戟肉各等分上為末煉蜜丸桐子大每服七八十丸空心白湯下滋陰補腎丸治肝腎陽虛陰弱虛火上炎目視昏花或至夜昏暗緊澀仍治六味丸所主之症熟地黃三兩牡丹皮五錢生地黃四兩澤瀉茯苓各二兩半當歸尾山茱萸柴胡五味子乾山藥各五錢上為末煉蜜丸桐子大每服五七十丸鹽湯下益氣聰明湯治飲食不節勞役形體脾胃不足內障耳鳴或多年目昏暗視物不能此藥能令人目光大久服無內障耳鳴耳聾之患又令精神過倍元氣自益身輕體健耳目聰明黃耆甘草人參各五錢升麻葛根各三錢蔓荊子一錢五分芍藥黃柏酒炒各一錢上每服三錢水煎服神效黃耆湯治渾身麻木不仁或左右身麻木或頭面手臂腿腳麻木不仁者並皆服之如兩目緊急縮小及羞明畏日或癮澀難開或視物無力睛痛手不得近或目中如火等症蔓荊子一錢橘紅五分人參八錢甘草炙白芍藥各一兩黃耆二兩上每服五錢水煎臨臥服助陽活血湯治眼發之後猶有上熱白睛赤色癮澀難開而多眵淚等症蔓荊子二分香白芷三分柴胡黃耆甘草炙當歸酒洗防風各五分升麻七分上水煎服芍藥清肝散治眵多眊燥緊澀羞明赤脈貫晴臟腑祕結者白朮甘草川芎防風荊芥桔梗羌活各三分芍藥柴胡前胡薄荷黃芩各二分半山梔知母滑石石膏各二分大黃四分芒硝二分半上水煎服黃連天花粉丸治症同上黃連菊花川芎薄荷各一兩天花粉連翹黃芩梔子各四兩黃柏六兩上為末丸桐子大每服五十丸加至百丸茶湯下連翹飲子治目赤隱澀緊小久視昏花迎風有淚等症蔓荊子生甘草連翹各三分柴胡二分黃芩五分生地黃當歸紅葵花人參各三分黃耆防風羌活各五分升麻一錢上水煎服若中氣不足而致前症用神效黃耆湯或補中益氣湯地芝丸治目不能遠視能近視或妨近視乃陰氣不足陽氣有餘也宜用此方生地黃焙乾四兩天門冬枳殼麩炒甘菊花各二兩上為末煉蜜丸桐子大每服百丸茶清或溫酒下定志丸治目不能近視反能遠視乃陽氣不足而陰血有餘也宜此主之白茯苓人參各二兩遠志菖蒲各一兩上為末煉蜜丸桐子大以硃砂為衣每服十丸至三十丸米飲下決明夜光散治目夜昏雖有燈月亦不能睹石決明夜明砂各二錢豬肝一兩生用上為末以竹刀切肝二片鋪藥於內合之用麻皮縛定米泔水一碗砂罐煮至半碗臨臥連肝藥汁服柴胡清肝散治肝膽二經風熱怒火頸項腫痛結核不消或寒熱往來嘔吐痰水又治婦人暴怒肝火內動經水妄行胎氣不安等症柴胡黃芩炒各一錢黃連炒山梔炒各七分當歸一錢川芎六分生地黃牡丹皮各一錢升麻八分甘草三分上水煎服若脾胃弱去芩連加苓術左金丸治肝火脅肋刺痛或發寒熱或頭目作痛泄瀉淋祕一切肝火之症並皆治之黃連六兩吳茱萸一兩湯煮片時用上為末粥丸白朮陳皮煎湯下小柴胡湯治肝膽經風熱或寒熱往來或晡熱潮熱或怒火口苦耳聾咳嗽瀉利脅腹作痛諸症柴胡二錢黃芩一錢五分人參半夏各七分甘草炙五分上水煎服加味小柴胡湯即前方加山梔牡丹皮犀角升麻湯治風熱頭面腫痛或咽喉不利時毒等症犀角鎊七錢升麻五錢防風羌活各五錢半白芷黃芩白附子各二錢半甘草一錢五分上每服七錢水煎越鞠丸治六郁飲食少思或胸滿吐酸齒痛瘡疥等症蒼朮炒神麯炒香附子山楂山梔炒撫芎麥芽炒各等分上為末水調神麯糊丸桐子大每服五七十丸白滾湯下平胃散治胃氣壅滯胸膈不利或飲食停滯吞酸噯腐或嘔吐不食等症蒼朮厚朴制陳皮各一錢甘草四分水煎服異功散治脾胃虛弱飲食少思或久患咳嗽面浮氣逆腹滿等症人參白朮炒甘草炒茯苓陳皮各一錢上薑棗水煎服二陳湯治脾胃虛弱中脘停痰或嘔吐噁心或頭目不清飲食少思等症陳皮半夏茯苓各一錢甘草炙上薑水煎服小半夏湯治嘔吐風痰水飲半夏薑製五錢茯苓三錢上入薑汁水煎服丁香茱萸湯治胃氣虛寒致嘔吐噦咽膈不通等症丁香橘皮柴胡甘草炙各五錢吳茱萸蒼朮人參各一錢升麻七分黃柏三分草蔻仁黃耆各二錢當歸一錢五分上每服五錢水煎理中化痰丸治脾胃虛寒痰涎內停嘔吐少食或大便不實飲食難化咳唾痰涎此屬中氣虛弱不能統涎歸源也人參白朮炒乾薑甘草炙茯苓半夏薑製上為末丸桐子大每服四五十丸白滾湯下牛黃抱龍丸治風痰壅盛或咳嗽發熱或發驚搐等症牛黃雄黃辰砂天竺黃各四錢麝香一錢牛膽南星上為末甘草湯糊丸皂子大每服二丸薑湯下柴芍參苓散治脾胃不和飲食少進或嘔吐泄瀉凡病後宜用此調理柴胡芍藥人參白朮茯苓陳皮當歸各五分甘草丹皮山梔炒各三分上為末每服一錢白湯下或作丸服五味子湯治咳嗽皮膚乾燥唾中有血胸膈疼痛等症五味子炒桔梗炒紫菀甘草炒續斷各五分竹茹一錢赤小豆一撮生地黃二錢桑白皮炒二錢上水煎服人參平肺散治心火克肺咳嗽喘嘔痰涎壅盛胸膈痞滿人參橘紅甘草炙地骨皮各五分茯苓知母炒各七分五味子炒青皮天門冬各四分桑白皮炒一錢上水煎服麥門冬湯治火熱乘肺咳嗽有血胸膈脹滿五心煩熱等症麥門冬桑白皮炒生地黃各一錢半夏紫菀桔梗淡竹葉麻黃各七分五味子甘草各五分上薑水煎服金沸草散治肺經受風頭目昏疼咳嗽聲重涕唾稠黏等症荊芥穗一錢前胡麻黃旋覆花各七分甘草炙赤芍藥半夏各五分上薑棗水煎服柴胡桂枝湯治傷風發熱自汗或痰氣上攻等症桂枝二錢黃芩炒人參白芍藥炒各錢半甘草炙半夏薑製生薑各一錢柴胡四錢大棗二枚上作二劑水煎服竹葉歸耆湯治胃氣虛熱口乾作渴惡冷飲食者竹葉一錢五分當歸一錢黃耆二錢白朮人參各一錢麥門冬七分甘草炒五分上水煎服竹葉石膏湯治胃火作渴石膏人參甘草各一錢半夏一錢五分竹葉麥門冬各五分上薑水煎服七味白朮散一名白朮散治中氣虧損津液不足舌乾口燥不喜飲冷或吐瀉後作渴最宜服之人參白朮木香白茯苓甘草藿香各五分乾葛一錢上水煎服涼膈散治上焦積熱煩渴面赤頭昏咽燥喉痛口瘡便溺赤澀並宜服之大黃朴硝甘草各一兩連翹四兩山梔黃芩薄荷葉各