body:
  text: 卷之三續醫論喘脹喘與脹二症相因必皆小便不利喘則必生脹脹則必生喘但要識得標本先後先喘而後脹者主於肺先脹而後喘者主於脾何則肺金司降外主皮毛經曰肺朝百脈通調水道下輸膀胱又曰膀胱者州都之官津液藏焉氣化則能出矣是小便之行由於肺氣之降下而輸化也若肺受邪而上喘則失降下之令故小便漸短以致水溢皮膚而生脹滿焉此則喘為本而脹為標治當清金降火為主而行水次之脾土惡濕外主肌肉土能剋水若脾土受傷不能制水則水濕妄行浸漬肌肉水既上溢則邪反侵肺氣不得降而生喘矣此則脹為本而喘為標治當實脾行水為主而清金次之苟肺症而用燥脾之藥則金得燥而喻愈加脾病而用清金之藥則脾得寒而脹愈甚矣近世治二症但知實脾行水而不知分別脾肺二症豫故為發明之愚按前症若肺中伏熱不能生水而喘且渴者用黃芩清肺飲以治肺用五淋散以清小便若脾肺虛弱不能通調水道者宜用補中益氣湯以培元氣用六味地黃丸以補腎水若膏粱厚味脾肺積熱而喘者宜清胃散以治胃用滋腎丸以利小便若心火克肺金而不能生腎水者用人參平肺散以治肺用滋陰丸以滋小便若腎經陰虧虛火爍肺金而小便不生者用六味地黃丸以補腎水用補中益氣湯以培脾土若脾氣虛弱不能相制而喘者用補中益氣湯以培元氣用六味地黃丸以生腎水若肝木克脾土不能相制而喘者用六君柴胡升麻以培元氣六味地黃丸以補腎水若脾胃虛寒不能相制而脹者用八味丸以補脾肺生腎水若脾腎虛寒不能通調水道而脹者宜用金匱加減腎氣丸補脾肺生腎水若酒色過度虧損足三陰而致喘脹痰湧二便不調或大小便道相牽作痛者亦宜用此丸多有生者一富商飲食起居失宜大便乾結常服潤腸等丸後胸腹不利飲食不甘口乾體倦發熱吐痰服二陳黃連之類前症益甚小便滴瀝大便泄瀉腹脹少食服五苓瞿麥之類小便不通體腫喘嗽用金匱腎氣丸補中益氣湯而愈一儒者失於調養飲食難化胸膈不利或用行氣消導藥咳嗽喘促用行氣化痰肚腹漸脹用行氣分利睡臥不能兩足浮腫小便不利大便不實肺腎脈浮大按之微細兩寸皆短朝用補中益氣湯加薑附夕用金匱腎氣丸加骨脂肉果各數劑諸症漸愈再佐以八味丸兩月乃能步履卻服補中八味半載而康氣虛血虛氣虛補氣用四君子湯血虛補血用四物湯虛甚者俱加熟附子蓋四君四物皆和平寬緩之劑須得附子健悍之劑行之方能成功附子熱藥本不可輕用但當病雖在暑熱時月亦可用也豫嘗治一僕人五月間病熱口渴唇乾譫語診其脈細而遲用四君子湯加黃耆當歸芍藥熟附子進一服熱愈甚狂言狂走或曰附子差矣診其脈如舊仍增附子進一大服遂汗出而熱退脈還四至矣又嘗治一婦人亦夏間病熱初用平調氣血兼清熱和解之劑服二三服不應熱愈甚舌上焦黑膈間有火漱水不咽診其脈兩手皆虛微而右手微甚六七日內譫語撮空循衣摸床惡症俱見後用四物湯加黃耆人參白朮陳皮麥門知母熟附子服之一二時汗出而熱退次日復熱再服仍退又次日復發知其虛極也遂連進十服皆加附子而安愚按前論正所謂舍時從症舍症從脈真有定見者也一男子發熱煩渴頭痛誤行發汗喘急腹痛自汗譫語用十全大補加附子治之熟睡喚而不醒及覺諸症頓退再劑而痊黃武選飲食勞倦發熱惡寒誤用解表神思昏憒胸發赤斑脈洪數而無力余曰此內傷元氣非外邪也急用溫補之劑彼不從後果歿飲食過傷飲食過傷變為異常急暴之症人多不識嘗有一壯年人忽得暴病如中風狀口不能言語目不識人四肢不舉急投蘇合香丸不效豫偶過聞之因詢其由曰適方陪客飲食後忽得此症遂教以煎生薑淡鹽湯多飲探吐之吐出數碗而醒後服白朮陳皮半夏麥芽調理而愈大抵此等症多因飲食醉飽之後或感風寒或著氣惱而致飲食填塞胃氣不行內傷特重若誤作中風中氣症而用驅風解表行氣散氣之藥則胃氣重傷死在旦夕內經雖有暴病暴死之症但恐多有因於食者前輩不曾明言故人不識耳今後遇有此等急症須要審問明白若方飲食醉飽或纍傷飲食重復受傷但覺胸膈有食滯只作傷食治之愚嘗治趙吏部患吐物出皆酸味其脈氣口大於人迎者二三倍僚友速余投劑余曰此實邪在上候其吐盡酸味不藥自愈翌早吐止而安一婦人飲食後因怒忽患血崩四肢逆冷抽搐口噤如發痙然吐痰如湧灌以二陳柴胡山梔枳殼吐出酸味神思稍醒藥止次日進薄粥少許但乳脅脹痛寒熱欲嘔四肢倦怠余以為悉屬肝火熾盛致脾氣不能運化先用六君柴胡山梔鉤藤鉤諸症頓退惟四肢不遂血崩如初或又以為肝火未息欲投清肝涼血之劑余以為肝脾氣血俱弱先用補中益氣湯培其脾土而血氣歸經又用四物參朮柴胡養肝筋而四肢便利余見異症名要頭痛久頭痛病略感風寒便發寒月須重綿厚帕包裹者此屬鬱熱本熱而標寒世人不識率用辛溫解散之藥暫時得效誤認為寒殊不知因其本有鬱熱毛竅常疏故風寒易入外寒束其內熱閉逆而為痛辛熱之藥雖能開通閉逆散其標之寒邪以熱濟熱病本益深惡寒愈甚矣惟當瀉火涼血為主而佐以辛溫散表之劑以從法治之則病可愈而根可除也愚按前症多主於痰痛甚者乃風毒上攻有血虛者有諸經氣滯者有氣虛者有四氣外傷有勞役所傷有可吐者有可下者當分虛實寒熱兼變而治之若夫偏正頭風久而不愈乃內挾痰涎風火鬱遏經絡氣血壅滯甚則目昏緊小二便祕澀宜砭出其血以開鬱解表余嘗治尚寶劉毅齋但怒則兩太陽作痛先用小柴胡加茯苓山梔後用六味丸以生腎水而不再發談侍御每頭痛必吐清水不拘冬夏吃薑便止余作中氣虛寒用六君當歸黃耆木香炮薑而瘥商儀部勞則頭痛余作陽虛不能上升以補中益氣加蔓荊子而痊眼赤腫痛眼赤腫痛古方用藥內外不同在內湯散用苦寒辛涼之藥以瀉其火在外點洗則用辛熱辛涼之藥以散其邪故點藥莫要於冰片而冰片大辛熱以其性辛甚故藉以拔出火邪而散其熱氣古方用燒酒洗眼或用乾薑末生薑汁點眼者皆此意也蓋赤眼是火邪內炎上攻於目故內治用苦寒之藥是治其本如鍋底之去薪也然火邪既客於目從內出外若外用寒涼以阻逆之則鬱火內攻不得散矣故點眼用辛熱而洗眼用熱湯是火鬱則發因而散之從治法也世人不知冰片為劫藥而誤認為寒常用點眼遂致積熱入目而昏暗障翳故云眼不點不瞎者此也又不知外治忌寒涼而妄將冷水冷物冷藥挹洗致昏瞎者有之愚按前症若體倦少食視物昏花或飲食勞倦益甚者脾胃虛也用補中益氣湯眵多緊澀赤脈貫睛或臟腑祕結者用芍藥清肝丸若赤翳布白畏日羞明或痛如刺者上焦風熱也用黃連飲子若久視生花畏日遠視如霧者神氣傷也用神效黃耆湯大凡午前甚而作痛者東垣助陽活血湯午後甚而作痛者黃連天花粉丸午後甚而不痛者東垣益陰腎氣丸能近視不能遠視地芝丸能遠視不能近視定志丸故東垣先生云五臟六腑之精氣皆稟受於脾上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所並而損血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本是不明正理也若概用辛涼苦寒之劑損傷真氣促成內障之症矣給事張禹功目赤不明服祛風散熱藥反畏明重聽脈大而虛此因勞心過度飲食失節以補中益氣湯加茯神酸棗山藥山茱五味頓愈又勞役復甚用十全大補湯兼以前藥漸愈卻用補中益氣湯加前藥而痊耳鳴如蟬耳鳴證或鳴甚如蟬或左或右或時閉塞世人多作腎虛治不效殊不知此是痰火上升鬱於耳中而為鳴郁甚則壅閉矣若遇此症但審其平昔飲酒厚味上焦素有痰火只作清痰降火治之大抵此症多先有痰火在上又感惱怒而得怒則氣上少陽之火客於耳也若腎虛而鳴者其鳴不甚其人多欲當見在勞怯等症愚按前症若血虛有火用四物加山梔柴胡若中氣虛弱用補中益氣湯若血氣俱虛用八珍湯加柴胡若怒便聾而或鳴者屬肝膽經氣實用小柴胡加芎歸山梔虛用八珍湯加山梔若午前甚者陽氣實熱也小柴胡加黃連山梔陽氣虛用補中益氣湯加柴胡山梔午後甚者陰血虛也四物加白朮茯苓若腎虛火動或痰盛作渴者必用地黃丸經雲頭痛耳鳴九竅不利腸胃之所生也脾胃一虛耳目九竅皆為之病少宰李蒲汀耳如蟬鳴服四物湯耳鳴益甚余以為足三陰虛五更服六味地黃丸食前服補中益氣湯頓愈少司馬黎仰之因怒耳鳴吐痰作嘔不食寒熱脅痛用小柴胡合四物加山梔茯神陳皮而瘥鼻塞鼻塞不聞香臭或但遇寒月多塞或略感風寒便塞不時舉發者世俗皆以為肺寒而用解表通利辛溫之藥不效殊不知此是肺經素有火邪火鬱甚則喜得熱而惡見寒故遇寒便塞遇感便發也治法清肺降火為主而佐以通氣之劑若如常鼻塞不聞香臭者再審其平素只作肺熱治之清金瀉火清痰或丸藥噙化或末藥輕調緩服久服無不效矣此豫所親見而治驗者其平素原無鼻塞舊症一時偶感風寒而致窒塞聲重或流清涕者自作風寒治愚按前症若因飢飽勞役所傷脾胃發生之氣不能上升邪害空竅故不利而不聞香臭者宜養脾胃使陽氣上行則鼻通矣按東垣云膽移熱於腦則辛頞鼻淵治之以防風湯大抵胃氣不和之所致者多矣一男子房勞兼怒風府脹悶兩脅脹痛余作色欲損腎怒氣傷肝用六味地黃丸料加柴胡當歸一劑而安一男子面白鼻流清涕不聞香臭三年矣余以為肺氣虛用補中益氣加麥門山梔而愈牙床腫痛牙床腫痛齒痛搖動或黑爛脫落世人皆作腎虛治殊不知此屬陽明經濕熱蓋齒雖屬腎而生於牙床上下床屬陽明大腸與胃猶木生於土也腸胃傷於美酒厚味膏粱甘滑之物以致濕熱上攻則牙床不清而為腫為痛或出血或生蟲由是齒不得安而動搖黑爛脫落也治宜瀉陽明之濕熱則牙床清寧而齒自安固矣愚按齒痛若因手足陽明經濕熱用東垣清胃散若因風寒入腦腦痛齒亦痛用羌活附子細辛湯若因思慮傷脾用歸脾湯若因鬱火所致用越鞠丸若因酒面炙爆而發用清胃散若因飲食傷脾用六君子湯若因勞傷元氣用補中益氣湯若因脾胃素弱用六君當歸升麻若因腎經陰虛用六味丸若因腎經陽虛用八味丸若陰陽俱虛用十補丸若脾腎虛寒用安腎丸徐用誠先生云凡齒病惡寒熱等症屬手足陽明經齒搖斷脫屬足少陰經齒蝕腫痛出血皆胃火所致也亦有諸經錯雜之邪與外因為患者廷尉張中梁齒動搖用安腎丸考功楊仲玉齒動用補中益氣湯侍御王濟川齒搖齦露用承氣湯文選鄭伯興齒腦痛用羌活附子湯顏僉憲齒痛用涼膈散郭職方過飲用清胃散黨吏部風熱用犀角升麻湯朱工部血氣虛用十全大補湯沈大尹頭腦齒痛頭重手足厥冷此風寒入腦用麻黃附子細辛湯並愈小便不禁小便不禁或頻數古方多以為寒而用溫澀之藥殊不知屬熱者蓋膀胱火邪妄動水不得寧故不能禁而頻數來也故年老人多頻數者是膀胱血少陽火偏旺也治法當補膀胱陰血瀉火邪為主而佐以收澀之劑如牡蠣山茱萸五味子之類不可用溫藥也病本屬熱故宜瀉火因水不足故火動而致小便多小便既多水益虛矣故宜補血瀉火治其本也收之澀之治其標也愚按經云膀胱不約為遺溺小便不禁常常出而不覺也人之旋溺賴心腎二氣之所傳送蓋心與小腸為表裡腎與膀胱為表裡若心腎氣虧傳送失度故有此症治宜溫暖下元清心寡欲又有産褥不順致傷膀胱若內虛寒者祕元丹韭子丸之類若內虛濕熱者六味地黃丸或加五味杜仲補骨脂年老者八味丸産褥收生不謹損破尿胞者參朮補胞湯加豬羊胞煎之竊謂肝主小便若肝經血虛用四物山梔若小便澀滯或莖中作痛屬肝經濕熱用龍膽瀉肝湯若小便頻數或勞而益甚屬脾氣虛弱用補中益氣湯加山藥五味子若小便無度或淋瀝不禁乃陰挺痿痹也用六味地黃丸若小便澀滯或補而益甚乃膀胱熱結也用五淋散其脾肺燥不能化生者黃芩清肺飲膀胱陰虛陽無所生者滋腎丸膀胱陽虛陰無所化者六味丸若陰痿思色精不出莖道澀痛如淋用加減八味丸料加車前牛膝若老人精竭復耗大小便牽痛如淋亦用前藥不應急加附子多有生者劉大參年逾六旬形氣瘦弱小便不禁或頻數內熱口乾或咳痰喘暈余以為肺腎氣虛用六味丸益氣湯以滋化源彼不信反服補陰降火澀精之劑陰竅作痛或小便不利仍服前藥不兩月而愈大尹劉天錫內有濕熱大便滑利小便澀滯服淡滲之劑愈加滴瀝小腹腿膝皆腫兩眼脹痛此腎經虛熱在下反服淡滲導損陽氣陰無以化遂用地黃滋腎二丸小便如故更以補中益氣湯加麥門五味兼服而愈州守王用之肚腹膨脹飲食少思服二陳枳實及淡滲之類小便不利大便不實咳嗽腹脹手足俱冷余謂足三陰虛寒用金匱腎氣丸而康男子陰痿男子陰痿不起古方多雲命門火衰精氣虛冷固有之矣然亦有鬱火甚而致痿者經云壯火食氣譬如人在暑熱而倦怠痿弱遇冬寒而堅強也豫嘗親見一二人腎經鬱火而有此症令服黃柏知母清火堅腎之藥而效故須審察不可偏認作火衰也愚按陰莖屬肝之經絡蓋肝者木也如木得湛露則森立遇酷熱則萎悴若因肝經濕熱而患者用龍膽瀉肝湯以清肝火導濕熱若因肝經燥熱而患者用六味丸以滋腎水養肝血而自安學士徐崦西口乾有痰欲服瓊玉膏余曰此沉陰降火之劑君面白口乾而有痰屬脾肺氣虛也當用溫補之劑不信仍服兩月餘大便不實飲食少思且兼陰痿始信余言先用補中益氣加茯苓半夏二味以溫補脾胃飲食漸加大便漸實乃去二味服月餘而痊更服六味丸三月餘陰道如常矧瓊玉膏固本丸坎離丸此輩俱是沉寒瀉火之劑非腸胃有燥熱者不宜服若足三陰經陰虛發熱者久而服之令人無子蓋謂損其陽氣則陰血無所生故也屢驗夢遺精滑夢遺精滑世人多作腎虛治而用補腎澀精之藥不效殊不知此症多屬脾胃飲酒厚味痰火濕熱之人多有之蓋腎藏精精之所生由脾胃飲食化生而輸歸於腎今脾胃傷於濃厚濕熱內郁中氣濁而不清則其所化生之精亦得濁氣腎主閉藏陰靜則寧今所輸之精既有濁氣則邪火動於腎中而水不得寧靜故遺而滑也此症與白濁同丹溪論白濁為胃中濁氣下流滲入膀胱而云無人知此也其有色心太重妄想過用而致遺滑者自從心腎治但兼脾胃者多須要審察愚按遺精有四有用心過度心不攝腎而致者有因色欲不遂精氣失位輸精而出者有色欲太過滑泄不禁者有年壯氣盛久無色欲精氣滿溢者有小便出多不禁者或不出小便而自出或莖中出而癢痛常如欲小便者宜辰砂妙香散或威喜丸大抵調補元氣為主聖人教人收心養性厥有旨哉少宰汪涵齋白濁用補中益氣湯加茯苓半夏倍白朮愈而復作肌體消瘦不時眩暈用八味丸而痊司廳陳石鏡屬脾虛用補中益氣六味地黃而愈光祿柴黼庵因勞赤白濁如注用歸脾湯而愈司廳張檢齋小腹不時作痛莖出白淫用小柴胡加山梔龍膽草山茱芎歸而愈婦人女子經脈不行婦人女子經脈不行有脾胃損傷而致者不可便認作經閉血死輕用通經破血之藥遇有此症便須審其脾胃如何若因飲食勞倦損傷脾胃少食惡食泄瀉疼痛若因誤服汗下攻伐藥傷其中氣以致血少而不行者只宜補養脾胃用白朮為君茯苓芍藥為臣佐以黃耆甘草陳皮麥芽川芎當歸柴胡等藥脾旺則能生血而經自行矣又有飲食積滯致損脾胃者亦宜消積補脾若脾胃無病果有血塊凝結方宜行血通經愚按經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行又曰二陽之病發心脾有不得隱曲女子不月二陽謂陽明胃與大腸也故心脾平和則百骸五臟皆潤澤而經候如常苟或心脾受傷則血無所養亦無所統而月經不調矣是故調經者當理心脾為主丹溪先生亦曰先期而至者血熱也後期而至者血虛也竊謂先期而至者有因脾經血燥有因脾經鬱火有因肝經怒火有因血分有熱有因勞役火動過期而至者有因脾經血虛有因肝經血虛有因氣虛血弱主治之法脾經血燥者加味逍遙散脾經鬱火者歸脾湯肝經怒火者加味小柴胡湯血分有熱者加味四物湯勞役火動者補中益氣湯脾經血虛者人參養榮湯肝經血虛者六味地黃丸氣虛血弱者八珍湯蓋血生於脾土故云脾統血凡血病當用苦甘之劑以助陽氣而生陰血大凡肝脾血燥四物為主肝脾血弱補中益氣為主肝脾鬱火歸脾湯為主肝經怒火加味逍遙散為主病因多端不能悉舉治當臨症制宜可也一婦人晡熱肢體瘦倦食少無味月經不行或鼻衄或血崩半載矣或用順氣清熱止血等劑不應更加寒熱且時欲作嘔余以為鬱怒虧損脾胃虛火錯經妄行而然耳遂朝用補中益氣湯夕用六味地黃丸各數劑半載而痊一婦人素沉靜晡熱內熱月經不調後每一二月或齒縫或舌下或咽間出血碗許如此年餘服清熱涼血調理之藥益甚問治於余余謂肝脾氣鬱血熱上行先用加味歸脾湯後用加味逍遙散攝血歸源而經自調前症頓愈一室女年十七腿外臁忽腫起一紅點作癢搔破日出鮮血如注及飛小蟲甚多審其由每先寒熱兩耳下或結核蓋外臁耳下俱屬膽經膽為肝之腑肝主風熱生蟲血得風而妄行肝火旺而血出其肝膽陰陽俱虛矣凡病虛則補其母腎乃肝之母用六味丸滋腎水以生肝木四物柴胡山梔鉤藤生肝血以抑風熱而瘥婦人半産婦人半産多在三個月及五月七月除跌撲損傷不拘外若前次三個月而墮則下次必如期復然蓋先於此時受傷故後至期必應乘其虛也遇有半産者産後須多服養氣血固胎元之藥以補其虛損下次有胎先於兩個半月後即用固胎藥十數服以防三月之墮至四個半月後再服八九服防過五月又至六個半月後再服以防七月及至九個月內服丹溪達生散十數服可保無虞其有連墮數次胎元損甚者服藥須多久則可以留方用四物湯加白朮人參陳皮茯苓甘草阿膠艾葉條芩多氣加香附縮砂有痰加薑製半夏調理妊娠在於清熱養血條實黃芩為安胎聖藥清熱故也暑月宜加用之養胎全在脾胃譬如鍾懸於梁梁軟則鐘下墜折則墮矣故白朮補脾為安胎君藥若因氣惱致胎不安者宜用川芎陳皮茯苓甘草多加縮砂少佐木香以行氣愚按半産重於大産大産如瓜熟自落栗熟自脫半産如生採其皮殼斷其根蒂豈不重於大産但人輕忽致死者多矣治法宜補形氣生新血去瘀血若未足月痛而産芎歸補中湯倍加知母止之若産而血不止人參黃耆湯補之若産而心腹痛當歸川芎湯主之胎氣弱而小産者八珍湯固之若下血過多而發熱聖愈湯汗不止急用獨參湯發熱煩躁肉瞤筋惕八珍湯大渴面赤脈洪而虛當歸補血湯身熱面赤脈沉而微四君子薑附一婦人胎已六月每怒氣便見血甚至寒熱頭疼脅脹腹痛少食作嘔余謂寒熱頭疼肝火上衝也脅脹腹痛肝氣不行也少食作嘔肝侮脾胃也小便見血肝火下流也用小柴胡加芍藥炒黑山梔茯苓白朮而愈一婦人胎及六月形體倦怠飲食少思勞役便血胎動不安用六君生熟地升麻柴胡而愈一婦人每胎三四月作痛欲墮余以為痛胎用當歸二錢熟地黃三錢而愈東垣丹溪治病方論東垣丹溪治病多自制方蓋二公深明本草藥性洞究內經處方要法故能自制自宋以來局方盛行人皆遵用不敢輕率自為局方論症治病雖多差謬丹溪曾辨論之然方皆名醫所制其君臣佐使輕重緩急大小多寡之法則不瘥也近見東垣丹溪之書大行世醫見其不用古方也率皆效顰治病輒自制方然藥性不明處方之法莫究鹵莽亂雜反致生無甚有變症多端遂難識治耳且夫藥之氣味不同如五味子之味厚故東垣方少者五六粒多者十數粒今世醫或用二三錢石膏味淡薄故白虎湯用半兩今世醫不敢多用補上治上劑宜輕小今不論上下率用大劑丸散湯液各有攸宜今不論緩急率用湯煎如此類者多矣今之醫者若不熟讀本草深究內經而輕自制方鮮不誤人也愚按方仿也仿彼而準此也至於應用更貴權宜非曰確然不可移而山厄然不可動者也是以素問無方難經亦無方漢時才有方蓋仿病因以立方也或問東垣丹溪治病之法或問今人有言東垣之法宜用於北丹溪之法可行於南如何曰東垣北醫也羅謙甫傳其法以聞於江浙丹溪南醫也劉宗厚世其學以鳴於陝西果如人言則本草內經皆神農皇帝岐伯之説亦止宜施於北方耶夫五方所生異病及治之異宜內經異法方宜論五常政大論已詳言之矣又如北方多寒南方多熱江湖多濕嶺南多瘴謂其得此氣多故亦多生此病非謂北病無熱南病無寒也至於治寒以熱治熱以寒則五方皆同豈有南北之異耶但人之臟腑火各居二天之六氣熱居三分又半故天下之病熱多而寒少觀內經至真要大論病機一篇可見又濕熱相火致病甚多自太僕注文湮沒以致局方偏用濕熱之藥故丹溪出而闡內經之旨辨局方之偏論濕熱相火之病以補前人之未備耳後人不識見其多用芩連梔柏等苦寒之藥遂以為宜於南淺矣哉愚按前論內云火症固多但虛實不同治法亦異故王太僕先生曰大寒而甚熱之不熱是無火也大熱而甚寒之不寒是無水也晝見夜伏夜見晝止不時而動是無火也大抵病熱作渴飲冷便祕此症屬實為熱故也或惡寒發熱引衣蜷臥或四肢逆冷大便清利此屬真寒或躁擾狂越欲入水中不欲近衣此症屬虛外假熱而內真寒也故虛勞發熱之症治以寒藥而不愈者為此故也由此觀之則熱症常少而寒症常多矣故無火者當用八味丸益火之源以消陰翳無水者用六味丸壯水之主以鎮陽光然其所以致疾者皆由氣血方長而勞心虧損或精血未滿而縱情恣欲根本不固火不歸經以致見症難名雖宜常補其陰以制其火然而二尺各有陰陽水火互相生化當於二臟中各分陰陽虛實求其所屬而平之若左尺脈虛弱而細數者是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絶者是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛用十補丸此皆滋其化源也設使概服黃柏知母沉陰瀉火之藥反戕脾胃多致不起詳見玉機微義治驗見內科方暑病第一卷內備用治暑方併入於此以便觀覽夏至日後病熱為暑暑者相火行令也夏月人感之自口齒而入傷心包絡之經其脈虛或浮大而散或弦細芤遲蓋熱傷氣則氣消而脈虛弱其為症汗煩則喘喝靜則多言身熱而煩心痛大渴引飲頭疼自汗倦怠少氣或下血發黃生斑甚者火熱致金不能平木搐搦不省人事治暑之法清心利小便最好暑傷氣宜補真氣為要又有惡寒或四肢逆冷甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛瀉痢此則非暑傷人乃因暑而自致之病也以其因暑而得故亦謂之暑病治法不同若行人或農夫於日中勞役得之者是動而得之陽症也其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渴引飲汗泄無氣以動乃天熱外傷元氣也宜清暑益氣用香薷黃連扁豆人參黃耆五味知母石膏之類暑熱發渴脈虛宜用人參白虎湯人參一錢五分知母二錢石膏五錢甘草二錢竹葉石膏湯亦好石膏一兩半夏二錢五分甘草二錢人參二錢麥門冬五錢入竹葉水煎東垣清暑益氣湯治長夏濕熱蒸人人感之四肢困倦精神短少胸滿氣促肢節作痛或氣高而喘身熱而煩心下痞悶小便黃數大便溏而頻或痢或渴不思飲食自汗體重黃耆升麻蒼朮各一錢人參白朮神麯陳皮各五分甘草炙黃柏麥門冬當歸各三分葛根澤瀉青皮五味各二分若暑熱之時無病之人或避暑熱納涼於深堂大廈涼臺冷館大扇風車得之者是靜而得之陰證也其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗此為陰寒所遏使周身陽氣不得伸越宜用辛溫之劑以解表散寒用厚朴紫蘇乾葛藿香羌活蒼朮之類若外既受寒內復傷冰水生冷瓜果之類前藥再加乾薑縮砂神麯之類此非治暑也治因暑而致之病也若外不受寒止是內傷冰水冷物腹痛泄瀉或霍亂吐逆宜縮脾飲砂仁草果甘草扁豆乾薑烏梅或理中湯加神麯麥芽縮砂蒼朮此專治內溫中消食也若吐瀉脈沉微甚者不可用涼藥可用附子大順散熟附子甘草乾薑杏仁桂或附子理中湯加芍藥夏月多食冷物及過飲茶水致傷脾胃吐瀉霍亂故治暑藥多用溫脾消食治濕利小便醫者要識此意若既傷暑熱復傷生冷外熱內寒宜先治其內溫中消食次治其外清暑補氣而以理脾為主於前陰陽二條內相兼取用東垣清暑益氣湯已兼此意其用黃耆升麻人參白朮甘草麥門冬當歸五味黃柏葛根是清暑補氣也蒼朮神麯陳皮澤瀉青皮是治內補脾也愚按前症又當分別中暑中暍脈虛脈沉無汗有汗發熱不熱作渴不渴或瀉不瀉飲寒飲熱辨其陰陽虛實不可泛投寒涼之劑蓋為夏月伏陰在內古人用附子大順散之類溫補陽氣厥有旨哉何今之老弱至夏月患食少體倦發熱作渴或吐瀉腹痛頭痛諸症反服香薷飲復傷元氣無不招引暑症以致不起至若清暑益氣湯內用豬苓澤瀉之類必審其果有濕熱壅滯方可用之否則虧損其陰而傷其目矣用當審察儀部李北川仲夏患腹痛吐瀉兩手足捫之則熱按之則冷其脈輕診則浮大重診則微細余曰此陰寒之症也急服附子理中湯不應仍服至四劑而愈注夏病屬陰虛元氣不足宜補中益氣湯去柴胡升麻加黃柏炒白芍藥挾痰者加半夏陳皮愚按丹溪先生云天地以五行更迭衰旺而成四時人之五臟六腑亦應之而衰旺四月屬巳五月屬午為火太旺火為肺金之夫火旺則金衰六月屬未土大旺土為水之夫土旺則水衰況腎水嘗藉肺金為母以補其不足古人於夏月必獨宿而淡味保養金水二臟經曰冬藏精者春不病溫十月屬亥十一月屬子正火氣潛藏必養其本然之真而為來春發生之本若於此時不恣欲以自戕至春升之際根本壯實何病之可言哉文選姚海山仲夏頭痛發熱氣高而喘肢體倦怠兩手麻木余謂熱傷元氣用人參益氣湯頓安又用補中益氣湯加麥門五味而痊若夏月傷暑發熱汗大泄無氣力脈虛細而遲此暑傷元氣也服後方人參黃耆蜜炙麥門冬去心白芍藥陳皮白茯苓各一錢黃連炒甘草炙各五分黃柏三分白朮一錢五分香薷知母各七分上薑水煎食前溫服愚按前症有熱傷元氣而汗出者有勞傷元氣而汗出者有因元氣素虛腠理不密而汗出者治法暑傷元氣者清暑益氣湯勞傷元氣者補中益氣湯元氣素虛而自汗者十全大補湯如兼盜汗佐以六味丸加五味子前云大汗無力脈虛細遲屬陽氣虛弱納黃柏知母恐復損陽氣芍藥茯苓恐導損陰氣也治者審之若夏秋暑熱因過用冷物茶水傷其內又過取涼風傷其外以致惡寒發熱胸膈飽悶飲食不進或兼嘔吐泄瀉此內外俱傷寒冷也人參乾薑炒紫色厚朴薑水炒陳皮羌活枳實白茯苓各一錢白朮一錢五分甘草炙五分上薑水煎食前溫服愚按前症宜用此方如未應宜用藿香正氣散若內外已解寒熱未退或飲食不進宜用六君子保命集云霍亂屬陽明症宜用和中平胃建中湯輩或四君子湯脈浮自汗四君子加桂枝主之脈浮無汗四君子加麻黃吐利轉筋脅下痛脈弦者木剋土也用平胃散加木瓜或建中加柴胡木瓜吐利轉筋腹痛體重脈沉而細四君子加白芍藥良薑吐利四肢拘急脈沉而遲屬少陰四君加薑附厚朴吐利四肢厥冷脈微緩屬厥陰建中加歸附吐利頭痛而身熱熱多欲飲水者五苓散寒多不欲水者理中丸主之元戎云太陰症霍亂者理中加橘紅下腹痛手足逆冷理中加熟附子吐利後轉筋者理中加火煅石膏一兩上舍徐民則夏月入房及食冰果麵食而患腹痛余曰此陰寒之症也急用附子理中湯以回陽不信別用二陳枳實黃連香薷飲之類而死進士劉華甫夏月食生冷果品患前症余用附子理中湯一鍾頓安凡方內用木瓜者俱用砂器煎炒惡鐵故也余方仿此若夏暑在途中常服以壯元氣清熱驅暑服之免中暑霍亂泄瀉痢疾等症人參一錢二分白朮一錢五分五味子十粒杵碎麥門冬去心白芍藥炒白茯苓各一錢知母炒陳皮香薷各七分黃芩炒三分甘草炙五分上薑水煎食前溫服愚按前症若人元氣虛弱宜用補中益氣去柴胡升麻加麥門五味或少加炒黑黃柏人參益氣湯亦可用若遇勞倦辛苦用力過多即服後方二三服免生內傷發熱之病此方主於補氣黃耆一錢半蜜炙人參麥門冬去心陳皮各一錢白朮一錢甘草炙七分上薑棗水煎食前溫服勞倦甚加熟附子四五分愚按前論開世俗之蒙瞶濟無窮之夭枉納附子若素畏寒飲食者尤宜用若素喜寒飲食者以肉桂或炮薑代之亦可若因暑熱傷氣而四肢困倦或手足麻木者先用人參益氣湯後用補中益氣湯若人過勞心思慮損傷精神頭眩目昏心虛氣短即服後方補血為主人參一錢五味子十五粒杵當歸一錢酒洗麥門冬去心五分白芍藥炒一錢山梔子炒五分茯神去心一錢酸棗仁炒一錢生地黃酒洗五分甘草陳皮川芎各五分上水煎服愚按前症宜用此方不宜多服其麥門冬芍藥山梔生地苦寒恐復損脾氣若脾胃素虛熱而患前證但以補中益氣湯加麥門五味亦可若因飢渴勞役或因誤行攻伐以致氣高而喘身熱而煩或自汗此為陽氣內傷宜用補中益氣湯若因飢飽勞役或因誤出汗以致肌熱大渴引飲目赤面紅脈洪大按之如無此為血脫煩躁宜用當歸補血湯附滑伯仁先生診家樞要脈者氣血之先也氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈治又長人脈長短人脈短性急人脈急性緩人脈緩左大順男右大順女男子尺脈常弱女子尺脈常盛此皆其常也反之者逆左右手配臟腑部位左手寸口心小腸脈所出左關肝膽脈所出左尺腎膀胱脈所出命門與腎脈通右寸肺大腸脈所出右關脾胃脈所出右尺三焦心包絡脈所出五臟平脈心脈浮大而散肺脈浮澀而短肝脈弦而長脾脈緩而大腎脈沉而軟滑心合血脈心脈循血脈而行持脈指法如六菽之重按至血脈而得者為浮稍稍加力脈道粗者為大又稍加力脈道闊軟者為散肺合皮毛肺脈循皮毛而行持脈指法如三菽之重按至皮毛而得者為浮稍稍加力脈道不利為澀又稍加力不及本位曰短肝合筋肝脈循筋而行持脈指法如十二菽之重按至筋而脈道如箏弦相似稍加力脈道迢迢者為長脾合肌肉脾脈循肌肉而行持脈指法如九菽之重按至肌肉如微風輕颭柳梢之狀為緩次稍加力脈道敦實者為大腎合骨腎脈循骨而行持脈指法按至骨上而得者為沉次重以按之脈道無力者為軟舉指來疾流利者為滑凡此五臟平脈要須察之久久成熟一遇病脈自然可曉經曰先識經脈而後識病脈此之謂也四時平脈春弦夏洪秋毛冬石長夏四季脈遲緩呼吸浮沉定五臟脈呼出心與肺吸入腎與肝呼吸之間脾受穀味其脈在中心肺俱浮浮而大散者心浮而短澀者肺腎肝俱沉牢而長者肝濡而來實者腎脾為中州其脈在中因指下輕重以定五臟即前所謂三菽五菽之重也三部所主九候附寸為陽為上部主頭項以下至心胸之分也關為陰陽之中為中部主臍腹肚脅之中也尺為陰為下部主腰足脛股之分凡此三部之中每部又各有浮中沉三候三而三之為九候也浮主皮膚候表及腑中主肌肉以候胃氣沉至筋骨候里及臟也持脈凡診脈之道先須調平自己氣息男左女右先以中指定得關位卻齊下前後二指初輕按以消息之次中按以消息之次重按以消息之然後自寸關至尺逐部尋究一呼一吸之間要以脈行四至為率閏以太息脈五至為平脈也其有太過不及則為病脈看在何部各以其部斷之凡診脈須要先識時脈胃脈與腑臟平脈然後及於病脈時脈謂春三月六部中俱帶弦夏三月俱帶洪秋三月俱帶浮冬三月俱帶沉胃脈謂中按得之脈和緩腑臟平脈已見前章凡人腑臟脈既平胃脈和又應時脈乃無病者也反此為病凡診脈之際人臂長則疏下指臂短則密下指三部之內大小浮沉遲數同等尺寸陰陽高下相符男女左右強弱相應四時之脈不相戾命曰平人其或一部之內獨大獨小偏遲偏疾左右強弱之相反四時男女之相背皆病脈也凡病之見在上曰上病在下曰下病左曰左病右曰右病左脈不和為病在表為陽主四肢右脈不和為病在裡為陰主腹臟以次推之凡取脈之道理各不同脈之形狀又各非一凡脈之來必不單至必曰浮而弦浮而數沉而緊沉而細之類將何以別之大抵提綱之要不出浮沉遲數滑澀之六脈也浮沉之脈輕手重手而取之也遲數之脈以己之呼吸而取之也滑澀之脈則察夫往來之形也浮為陽輕手而得之也而芤洪散大長濡弦皆輕手而得之之類也沉為陰重手而得之也而伏石短細牢實皆重手得之之類也遲者一息脈二至而緩結微弱皆遲之類也或曰滑類乎數澀類乎遲何也然脈雖似而理則殊也彼遲數之脈以呼吸察其至數之疏數此滑澀之脈則以往來密察其形狀也數為熱遲為寒滑為血多氣少澀為氣多血少所謂提綱不出乎六字者蓋以其足以統夫表裡陰陽冷熱虛實風寒濕燥臟腑氣血也浮為陽為表診為風為虛沉為陰為里診為濕為實遲為在臟為寒為冷數為在腑為熱為燥滑為血有餘澀為氣獨滯也人一身之變不越乎此能於是六脈之中以求之則疢疾在人者莫能逃焉持脈之要有三曰舉曰按曰尋輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋初持脈輕手候之脈見皮膚之間者陽也腑也亦心肺之應也重手得之脈附於肉下者陰也臟也亦肝腎之應也不輕不重中而取之其脈應於血肉之間者陰陽相適沖和之應脾胃之候也若浮中沉之不見則委曲而求之若隱若見則陰陽伏匿之脈也三部皆然察脈須識上下來去至止六字不明此六字則陰陽虛實不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰也上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮膚之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止也明脈須辨表裡虛實四字表陽也腑也凡六淫之邪襲於經絡而未入於胃腑及臟者皆屬於表也里陰也臟也凡七情之氣鬱於心腹之內不能越散飲食五味之傷流於腑臟之間不能通泄皆屬於里也虛者元氣之自虛精神耗散氣力衰竭也實者邪氣之實由正氣本虛邪得乘之非元氣之自實也故虛者補其正氣實者瀉其邪氣經曰所謂邪氣盛則實精氣奪則虛此大法也凡脈之至在筋肉之上出於皮膚之間者陽也腑也行於肌肉之下者陰也臟也若短小而見於皮膚之間者陰乘陽也洪大而見於肌肉之下陽乘陰也寸尺皆然脈貴有神東垣云不病之脈不求其神而神無不在也有病之脈則當求其神之有無謂如六數七極熱也脈中此中字浮中沉之有有力言有胃氣即有神矣為泄其熱三遲二敗寒也脈中有力説並如上即有神矣為去其寒若數極遲敗中不復有力為無神也將何所恃耶苟不知此而遽泄之去之神將何以依而主耶故經曰脈者氣血之先氣血者人之神也善夫脈陰陽類成浮不沉也按之不足輕舉有餘滿指浮上曰浮為風虛動之候為脹為風為痞為滿不食為表熱為喘浮大傷風鼻塞浮滑疾為宿食浮滑為飲左寸浮主傷風發熱頭疼目眩及風痰浮而虛遲心氣不足心神不安浮散心氣耗虛煩浮而洪數心經熱關浮腹脹浮而數風熱入肝經浮而促怒氣傷肝心胸逆滿浮大胸脅脹滿尺浮膀胱風熱小便赤澀浮大而芤男子小便血婦人崩帶浮而遲冷疝臍下痛右寸浮肺感風寒咳喘清涕自汗體倦浮而洪肺熱而咳浮而遲肺寒喘嗽關浮脾虛中滿不食浮大而澀為宿食浮而遲脾胃虛尺浮風邪客下焦大便祕浮而虛元氣不足浮而數下焦風熱大便祕沉不浮也輕手不見重手乃得為陰逆陽郁之候為實為寒為氣為水為停飲為癥瘕為脅脹為厥逆為洞泄沉細為少氣沉遲為痼冷沉滑為宿食沉伏為霍亂沉而數內熱沉而遲內寒沉而弦心腹冷痛左寸沉心內寒邪為痛胸中寒飲脅疼關沉伏寒在經兩脅刺痛沉弦痃癖內痛尺沉腎臟感寒腰背冷痛小便濁而頻男為精冷女為血結沉而細脛酸陰癢溺有餘瀝右寸沉肺冷寒痰停蓄虛喘少氣沉而緊滑咳嗽沉細而滑骨蒸寒熱皮毛焦乾關沉胃中寒積中滿吞酸沉緊懸飲尺沉病水腰腳疼沉細下利又為小便滑臍下冷痛遲不及也以至數言之呼吸之間脈僅三至減於平脈一至也為陰盛陽虧之候為寒為不足浮而遲表有寒沉而遲里有寒居寸為氣不足居尺為血不足氣寒則縮血寒則凝也左寸遲心上寒精神多慘關遲筋寒急手足冷脅下痛尺遲腎虛便濁女人不月右寸遲肺感寒冷痰氣短關遲中焦寒及脾胃傷冷物不食沉遲為積尺遲為臟寒泄瀉少腹冷痛腰腳重數太過也一息六至過平脈兩至也為煩滿上為頭疼上熱中為脾熱口臭胃煩嘔逆右為頰熱目赤左下為小便黃赤大便祕澀浮數表有熱沉數里有熱虛不實也散大而軟舉按豁然不能自固氣血俱虛之診也為暑為虛煩多汗為恍惚多驚為小兒驚風實不虛也按舉不絶逼逼而長動而有力不疾不遲為三焦氣滿之候為嘔為痛為氣塞為食積為氣聚為痢為伏陽在內左寸實心中積熱口舌瘡咽痛實大頭面熱風煩躁體疼面赤關實腹脅痛滿實而浮大肝盛目暗赤痛尺實少腹痛小便澀實而滑淋瀝莖痛溺赤實大膀胱熱溺難實而緊腰痛右寸實胸中熱痰嗽煩滿實而浮肺熱咽燥痛喘咳氣壅關實伏陽蒸內脾虛食少胃氣滯實而浮脾熱消中善飢口乾勞倦尺實臍下痛便難或時下痢洪大而實也舉按有餘來至大而去且長騰上滿指為榮絡大熱血氣燔灼之候為表裡皆熱為煩為咽乾為大小便不通左寸洪心經積熱眼赤口瘡頭痛內煩關洪肝熱及身痛四肢浮熱尺洪膀胱熱小便赤澀右寸洪肺熱毛焦唾黏咽乾洪而緊喘急關洪胃熱反胃嘔吐口乾洪而緊為脹尺洪腹滿大便難或下血微不顯也依稀輕細若有若無為血氣俱虛之候為虛弱為泄為虛汗為崩漏敗血不止為少氣浮而微者陽不足必身惡寒沉而微者陰不足主臟寒下利左寸微心虛憂惕榮血不足關微四肢惡寒拘急尺微敗血不止男為傷精尿血女為崩帶右寸微上焦寒痞冷痰不化中寒少氣關微胃寒氣脹食不化脾虛噫氣心腹冷痛尺微臟寒泄瀉臍下冷痛弦按之不移舉之應手端直如絲絃為血氣收斂為陽中伏陰或經絡間為寒所入為痛為瘧為拘急為寒熱為血虛盜汗為寒凝氣結為冷痹為疝為飲為勞倦弦數為勞瘧雙弦脅急痛弦長為積左寸弦頭疼心惕勞傷盜汗乏力關弦脅肋痛痃癖弦緊為疝瘕為瘀血弦小寒癖尺弦少腹痛弦滑腰腳痛右寸弦肺受寒咳嗽胸中有寒痰關弦脾胃傷冷宿食不化心腹冷痛又為飲尺弦臍下急痛不安下焦停水緩不逮也往來迂緩呼吸徐徐以氣血向衰故脈體為之徐緩爾為風為虛為痹為弱為痛在上為項強在下為腳弱浮緩為風沉緩血氣虛左寸緩心氣不足怔忡多忘亦主項背急痛關緩風虛眩暈腹脅氣結尺緩腎虛冷小便數女人月事多右寸緩肺氣浮言語氣短關緩胃弱氣虛浮緩脾氣虛弱不沉不浮從容和緩乃脾家本脈也尺緩下寒腳弱風氣祕滯浮緩腸風泄瀉沉緩小腹感冷滑不澀也往來流利如珠走盤不進不退為血實氣壅之候蓋血不勝於氣也為嘔吐為痰逆為宿食為經閉滑而不斷經不閉其斷者經閉上為吐逆下為氣結滑數為結熱左寸滑心熱滑而實大心驚舌強關滑肝熱頭目為患尺滑小便淋瀝尿赤莖中痛右寸滑痰飲嘔逆滑而實肺熱毛髮焦膈壅咽乾痰嗽頭目昏涕唾黏關滑脾熱口臭及宿食不化吐逆滑實胃熱尺滑因相火炎而引飲多臍冷腹鳴或時下利婦人主血實氣壅月事不通若和滑為孕澀不滑也虛細而遲往來極難參伍不調如雨沾沙如輕刀刮竹然為氣多血少之候為少血為亡汗為血痹痛為傷精女人有孕為胎痛無孕為敗血病左寸澀心神虛耗不安及冷氣心痛關澀肝虛血散肋脹脅滿身痛尺澀男子傷精及疝女人月事虛敗若有孕主胎漏右寸澀榮衛不和上焦冷痞氣短臂痛關澀脾弱不食胃冷而嘔尺澀大便澀津液不足小腹寒足脛逆冷經云滑者傷熱澀者中霧露金革長不短也指下有餘而過於本位氣血皆有餘也為陽毒內蘊三焦煩郁為壯熱短不長也兩頭無中間有不及本位氣不足以前導其血也為陰中伏陽為三焦氣壅為宿食不消大不小也浮取之若洪而浮沉取之大而無力為血虛氣不能相入也經曰大則病進小不大也浮沉取之悉皆損小在陽為陽不足在陰為陰不足前大後小則頭疼目眩前小後大則胸滿短氣緊有力而不緩也其來徑急按之長舉之若牽繩轉索之狀為邪風激搏伏於榮衛之間為痛為寒浮緊為傷寒身疼沉緊為腹中有寒為風癇左寸緊頭熱目痛項強緊而沉心中氣逆冷痛關緊心腹滿痛脅痛肋急緊而盛傷寒渾身痛緊而實痃癖尺緊腰腳臍下痛小便難右寸緊鼻塞膈壅緊而沉滑肺實咳嗽關緊腹痛吐逆緊盛腹脹傷食尺緊下焦築痛弱不盛也極沉細而軟怏怏不前按之欲絶未絶舉之即無由精氣不足故脈息痿弱而不振也為元氣虧耗為痿弱不前為痼冷為哄熱為泄精為虛汗老得之順壯得之逆左寸弱陽虛心悸自汗關弱筋痿無力婦人主産後客風面腫尺弱小便數腎虛耳聾骨肉痠痛右寸弱身冷多寒胸中短氣關弱脾胃虛食不化尺弱下焦冷痛大便滑動其狀如大豆厥厥動搖尋之有舉之無不往不來不離其處多於關部見之動為痛為驚為虛勞體痛為崩脫為泄痢陽動則汗出陰動則發熱伏不見也輕手取之絶不可見重取之附著於骨為陰陽潛伏關膈閉塞之候為積聚為瘕疝為食不消為霍亂為水氣為榮衛氣閉而厥逆關前得之為陽伏關後得之為陰伏左寸伏心氣不足神不守常沉憂抑鬱關伏血冷腰腳痛及脅下有寒氣尺伏腎寒精虛疝瘕寒痛右寸伏胸中氣滯寒痰冷積關伏中脘積塊作痛及脾有停滯尺伏臍下冷痛下焦虛寒腹中痼冷促陽脈之極也脈來數時一止復來者曰促陽獨盛而陰不能相和也或怒逆上亦令脈促促為氣湧為狂悶為瘀血發狂又為氣為血為飲為食為痰蓋先以氣熱脈數五者或一有留滯乎其間則因之而為促非惡脈也雖然加即死退即生亦可畏哉結陰脈之極也脈來緩時一止復來者曰結陰獨盛而陽不能相入也為癥結為積聚為七情所郁浮結為寒邪滯經沉結為積氣在內又為氣為血為飲為痰蓋先以氣寒脈緩而五者或一有留滯於其間則因而為結故張長沙謂結促皆病脈芤浮大而軟尋之中空傍實傍有中無診在浮舉重按之間為失血之候大抵氣有餘血不足血不能統氣故虛而大若芤之狀也左寸芤主心血妄行為吐為衄關芤主脅間血氣痛或腹中瘀血亦為吐血目暗尺芤小便血女人月事為病右寸芤胸中積血為衄為嘔關芤腸癰瘀血及嘔血不食尺芤大便血又云前大後細脫血也非芤而何革沉伏實大如按鼓皮曰革氣血虛寒革易常度也婦人則半産漏下男子則亡血失精又為中風寒濕之診濡無力也虛軟無力應手散細如綿絮之浮水中輕手乍來重手卻去為氣血俱不足之候為少氣為無血為疲損為自汗為下冷為痹左寸濡心虛易驚盜汗短氣關濡榮衛不和精神離散體虛少力尺濡男為傷精女為脫血小便數自汗多右寸濡關熱憎寒氣乏體虛關濡脾軟不化物胃虛不進食尺濡下元冷憊腸虛泄瀉牢堅牢也沉而有力動而不移為裡實表虛關中氣促為勞傷痿極大抵其脈近乎無胃氣者故諸家皆為危殆之脈云亦主骨間疼痛氣居於表疾盛也快於數為疾呼吸之間脈七至熱極之脈也在陽猶可在陰為逆細微眇也指下尋之往來微細如線蓋血冷氣虛不足以充故也為元氣不足乏力無精內外俱冷痿弱洞泄為憂勞過度為傷濕為積為痛在內及在下代更代也動而中止不能自還因而復動由是復止尋之良久乃復強起為代主形容羸瘦口不能言若不因病而人羸瘦其脈代止是一臟無氣它臟代之真危亡之兆也若因病而氣血驟損以至元氣不續或風家痛家脈見止代只為病脈故傷寒家亦有心悸而脈代者腹心痛亦有結澀止代不勻者勿以為凶蓋凡痛之脈不可準也又妊娠或有脈代者此必三月餘之胎也亦無慮焉散不聚也有陽無陰按之滿指散而不聚來去不明漫無根柢為氣血耗散腑臟氣絶在病脈主虛陽不斂又主心氣不足大抵非佳脈也
