body:
  text: 卷之五臍風小兒初生百日內臍風方書率用南星殭蠶等風藥多不效當作胎毒瀉陽明火邪馬牙亦是胎毒用針挑破桑樹白汁塗之桑汁主小兒鵝口及口瘡舌上瘡神效初生小兒時時與看頻敷桑汁不然舌硬緊漸至撮口難治愚按曾世顯云嬰兒一七之內腹肚脹硬臍畔浮腫口撮不開攢眉而叫名臍風或因剪臍帶少短或因束縛不緊牽動風入臍中或因鐵器斷臍冷氣入內傳於脾絡致舌強唇青手足微搐不能吮乳啼聲似鴉喉痰潮響急掐破口泡去其毒水以艾灸臍中亦有復生者治法多端無如灸法或以天南星一錢生薑自然汁調灌為妙變蒸小兒不時變蒸變者異常也蒸者發熱也所以變換五臟蒸養六腑須待變蒸多遍氣血方榮骨脈始長愚按錢仲陽先生云小兒在母腹中乃生骨氣五臟六腑成而未全自生之後即長骨脈五臟六腑之神智自內而長自下而上故生後三十二日一變蒸始即智意異前蓋人有三百六十五骨除手足中四十五碎骨外有三百二十數自生下骨一日十段而上之十日百段三十二日計三百二十段為一變亦曰一蒸骨之餘氣一自腦分入齦中作三十二齒則齒數當與變日相合然而齒有不及三十二數者由變不足其常也有或二十八日即止長二十八齒以下仿此但不過三十二之數凡一周遍乃生虛熱諸病如是十周則小蒸畢也計三百二十日生骨氣乃全而未壯也故初三十二日一變生腎生志六十四日再變生膀胱其發耳與骫冷腎與膀胱俱生於水水數一故先變主之九十六日三變生心喜一百二十八日四變生小腸其發汗出而微驚心為火火數二一百六十日五變生肝哭一百九十二日六變生膽其發目不開而赤肝主木木數三二百二十四日七變生肺聲二百五十六日八變生大腸其髮膚熱而汗或不汗肺者金金數四二百八十八日九變生脾智三百二十日十變生胃其發不食腹痛而吐乳此後乃齒生能言知喜怒故云始全也太倉云氣入四肢長碎骨於十變後六十四日長其經脈手足受血故能持物能立能行也經云變且蒸謂蒸畢而足一歲之日也師曰不汗而熱者發其汗大吐者微止不可余治全嬰方云變蒸者長氣血變者上氣蒸者發熱也輕則體熱虛驚耳冷微汗唇生白泡三日可愈重者寒熱脈亂腹疼啼叫不能乳食食而即吐哯五日方愈其候與傷寒相似但以唇上白泡驗之亦有受胎氣壯實不熱不驚或無證候而暗變者竊謂此症小兒所不能免不必服藥古方以黑散子紫丸子主之非惟臟腑不能勝受抑且反傷氣血慎之慎之嘗見一小兒至二變發熱有痰或治以抱龍丸一粒卒至不救可以驗矣然父母愛子之心勝稍有疾病急於求醫而醫者不究病情率爾投劑殊不知病因多端見症相類難以卒辨況古人稟厚方多峻厲之劑緩服可也潮熱小兒潮熱或壯熱不退多是變蒸及五臟相勝不必用藥又多是飲食停積鬱熱由中發外見於肌表只理其中清陽明之熱而表熱自除不可認作外感輕易發汗用小柴胡輕利等藥重傷其內又潮熱不退恐是出痘亦當審察勿便用藥愚按前症若因飲食停積或腹痛吐瀉或肚腹膨脹宜用保和丸以消導健脾若飲食既消或腹痛不食或肚腹膨脹宜用四君子以保養胃氣若因誤行汗下損傷元氣宜用參耆歸朮陳皮甘草以補中氣大凡傷食脾胃必損宜固胃氣庶無變症若寅卯辰時熱者屬肝經也巳午未時熱者屬心經也申酉戌時熱者屬肺經也亥子丑時熱者屬腎經也當詳其虛實而治之凡屬虛熱實熱投以攻補之劑其病既不增減乃是病根深固而藥力未能及耳須宜多服功力既至諸病悉退切不可改為別治設或藥不對症禍在反掌慎之李閣老子患潮熱飲食如故自申酉時甚至子丑時方止遍身似疥大便祕結小便赤澀熱渴飲冷余以為脾胃實熱傳於肺與大腸先用清涼飲四劑結熱始退又用四物湯加柴胡黃連數劑其瘡漸愈彼欲速效另用槐角丸之類諸症益甚遂求於施院長亦用四物湯加柴胡黃連加桃仁赤芍藥至百劑而愈施院長名鑑字銀臺弟大小便白小兒大小便時時審看小便如米泔或澄停少頃變作泔濁此脾胃濕熱也若大便泔白色或如魚凍或帶紅或色黃黑此積滯濕熱也宜理脾消滯清中宮去濕熱節飲食若忽然變青此是變蒸也不必用藥若久不愈用補脾制肝藥一二服亦不宜多用愚按小便如泔或大便泔白宜用肥兒丸若積滯黃黑宜用四君子加黃連木香若色青日久不復或兼泄瀉或兼腹痛當用六君子加木香芍藥若肌體色黃小便不利發黃脫落鼻下瘡痍嗜土少食大便青褐色者須用梔子茯苓湯詳見治疳要藥下小兒病多屬肝脾二經小兒病大率屬脾土肝木二經肝只是有余有餘之病似重急而為治卻易見效亦速脾只是不足不足之病似輕緩而為治卻難見效亦遲二經為病惟脾居多用藥最要分別若肝木自旺則為急驚目直視或動搖手足搐搦風痰上壅等症此為有餘宜伐木瀉肝降火清心若脾胃虛而肝木來侮亦見驚搐動搖諸症但其勢微緩名曰慢驚宜補養脾胃不可錯認將脾經誤作肝經治也愚按急驚乃風火之症脾土受制肝經實熱者用瀉青丸徑伐其肝或導赤散以瀉其子肝經虛熱者用六味地黃丸以滋腎水補中益氣湯以養脾土則風木自息脾土自安矣若因乳食不調脾胃虧損木來侮土似慢驚而見抽搐搖頭札目咬牙等症宜用六君子加鉤藤鉤若脾胃虧損寒水反來侮土成慢驚而見前症用前藥加薑桂如未應更加附子多有復蘇者舉人杜克宏子發熱抽搐口噤痰湧此肝膽經實火之症即急驚風也先用瀉青丸一服又用六味丸二服諸症頓退乃以小柴胡湯加芎歸山梔鉤藤鉤而安卻用補中益氣湯而愈急驚急驚是有餘之症屬肝木心火陽邪太旺宜直瀉之降火下痰是也五臟俱有陰陽如肝氣為陽為火肝血為陰為水肝氣旺則肝之血衰矣火妄動則水被煎沸不寧矣陽旺陰消風火相搏陰血走散勢所必至也故亦宜養血急驚雖屬肝心然木火旺則肺金受虧不能平木木來剋土斯損矣故亦宜養脾況治驚諸藥大率祛風化痰瀉火峻厲及腦麝辛散之味易於消陰血損脾胃者故治有餘急驚之症先須降火下痰一二服後加養血安神之藥若飲食少大便溏或吐瀉則當兼補脾胃若脾胃原虛當於直瀉藥中加補脾藥若屢作屢服利驚驅逐之藥便宜認作脾虛血散治驚藥內加養血補脾藥不可用溫熱丁香等藥恐助胃火宜參朮芍藥等以補脾中氣血麥門冬黃連以清金制木愚按前症若肝經風熱抽搐目瞤筋急痰盛等症用四物湯以生肝血鉤藤鉤以清肝火更用四君子以補脾土若肝經血燥發熱驚搐眼瞤痰盛筋攣用六味丸以滋腎水生肝血用四君子加芍藥以補脾土生肺金若肺金克肝木用六君子以實脾土芍藥木香以平肺金若屢服利驚之藥而脾胃虛寒者須用六君子以補脾胃加丁香木香以培陽氣若脾土虛寒腎水反來侮土而致中寒腹痛吐瀉少食等症者用益黃散以補脾土而瀉寒水庶幾不致慢驚矣治當審察虛實凡症屬有餘者病氣也不足者元氣也故有餘當認為不足思患預防斯少失矣急驚變慢驚急驚屢發屢治用直瀉藥既多則脾損陰消變為慢驚當主以補脾養血佐以安心清肺制肝之藥愚按前症多因吐利脾胃虛損肝木所乘或腎水反來侮土所致故似搐而不搐先用鉤藤飲子如發搐少退乃用寶鑑天麻散若吐利不食急用木香異功散實其脾土其病自已如未應用六君子加木香炮姜溫補脾土更不應急加附子以回陽蓋慢驚之症外虛熱而內真寒也無風可逐無痰可驅但溫補脾胃為主太凡發搐因風則目青面赤因驚則叫呼搐搦因食則噯吐氣悶肺脾虛則生黏痰喉間作鋸聲乃心火不能生脾土脾土不能生肺金以致肺不能主氣脾不能攝涎故涎氣泛上而喉中作聲耳若用祛風治痰理氣之劑則氣散陰消而促其危矣太平王職坊子患瘧疾恪用化痰之劑虛症悉至殊類驚風謂余曰何也余曰小便頻數肝經陰虛也兩目連札肝經風熱也作嘔懶食胃氣虛弱也泄瀉後重脾氣虛弱也用補中益氣湯六味地黃丸而痊舉人余時正子傷食發丹毒服發表之劑手足抽搐服抱龍丸目瞤氣喘痰盛余謂此脾胃虧損而變慢驚也無風可祛無痰可逐乃虛象也遂用六君子加附子一劑而安再劑而愈一小兒病後遇驚即痰盛咬牙抽搐搖頭作瀉卻服腦麝硃砂等劑以致慢驚而卒驚搐小兒驚搐之症必有痰或因驚而痰聚或因痰而致驚古人治驚方中俱兼痰藥必須先治其痰然後瀉火清神若痰壅塞胸膈不去則瀉火清神之藥無所施其功也二陳湯加竹瀝入少薑汁最穩痰重者滾痰丸白餅子利驚丸下之滾痰丸下熱痰白餅子利驚丸下痰積在上者宜吐之重則用藥吐輕則探吐之若不必吐下以二陳為主脾虛有熱痰加白朮芩連風痰稠結加南星貝母枳實胃虛生痰加白朮麥芽竹瀝愚按前症若因心肝二經風熱熾盛兩目連札四肢抽搐宜治肝清心若因心經蘊熱叫呼戰栗宜清熱安神若因肺感風邪氣急喘促宜治痰理肺若因飲食停滯噯吐困睡宜消導健脾若因脾肺虛弱而風痰壅盛以致前症但宜補中益氣為主若執用祛風治痰理氣之劑則氣散陰消而促其危矣大尹劉應昌子患瘰癧恪用化痰之劑虛症悉至殊類驚風又服祛風至寶丹小便頻數肢體抽搐或兩目連札咬牙呵缺或作嘔懶食大便重墜或泄瀉此土傷而木勝也用補中益氣湯六味地黃丸而痊冬官朱小溪子項間結核面色痿黃肌體消瘦咬牙抽搐頭搖目札此肝木克脾土也用六君子湯九味蘆薈丸而愈憲幕顧斐齊玄孫二周項結核兩臂反張索敗毒之藥余意其症屬風熱傷肝血燥筋攣未敢敷藥翌早請治果系前症遂與六味丸一服侵晨灌之午後肢體如常儒者王文遠子患瘰癧痰盛發搐服金石香燥之劑手足筋攣此肝血復傷而致急驚風也遂用加味小柴胡加鉤藤山梔芎歸一劑又以六味丸料加五味麥門煎服而安小兒忽然驚搐目上視搖頭咬牙症候怪異世俗多作肝經有餘之症投以驚藥豈知飲食停滯痰涎壅積亦多類驚者便須審察有無傷積腹痛胸滿嘔吐惡食輕則消滯化痰重則探吐滯積而後調之又有因感冒吐瀉而發熱氣血虛為熱所迫雖見驚症不可即服驚藥但調治吐瀉感冒則氣自定熱自退而驚自除矣愚按前症若因肝木侮脾土用六君子加芍藥木香柴胡若因脾土虛而自病用五味異功散大凡飲食停滯痰積壅滿而見驚症實因脾土虛弱不能運化所致但健脾胃則食自消痰自化若輕用驚藥風藥反所以成其風而重其病也況脆嫩臟腑安能受峻厲之劑耶若專治其病則誤矣姚儀部子每停食身發赤暈用清中解鬱湯而愈後患搖頭咬牙痰盛發搐吐出酸味待其吐盡翌日少以七味白朮散後日以參苓白朮散調理脾胃遂不復患大抵吐後兒安不必更服藥也一小兒停食服通利之劑作嘔腹脹此脾胃復傷也用補中益氣湯而愈一小兒兩目動札手足發搐數服天麻防風丸之類以祛風化痰前症不愈其痰益甚得飲食諸症稍愈視其準頭及左頰色青黃余曰脾主涎此肝木製脾土不能統攝其涎非痰盛也遂用六君子湯加升麻柴胡鉤藤二劑飲食漸進諸症漸愈又用補中益氣而安小兒用藥不宜峻厲小兒驚藥皆些小丸散多峻厲取其易於成功以之治肝心有餘之症對病則可中病宜即止不可以為常也病勢輕淺只用輕劑病退便宜和中調理如牛黃丸三四十味亂雜殊甚涼驚丸非氣壯實肝火旺者不宜抱龍丸亦多不見效且麝腦香辛太甚走散真氣又傷脾胃元氣虛則病愈生矣愚按小兒之症有餘便屬肝經不足便屬脾經蓋有餘是病氣也不足是元氣也凡病氣有餘元氣不足當補不當瀉況脆嫩臟腑安能受峻厲之藥前論厥有旨哉一小兒數歲每停食輒服峻厲之劑後患肚腹膨脹或嘔吐泄瀉余先用六君子湯諸症漸愈又用補中益氣湯胃氣漸復驚後目動咬牙驚後目微動及咬牙固為肝虛亦虛中有熱虛者血不足熱者氣有餘水不足無以制火而火動故也但牙床屬胃脾胃虛而有熱亦見微咬不可專歸肝腎當以補脾為主加黃連芍藥川芎便是瀉肝氣補肝血也生地黃涼心血故導赤散宜用之熟地黃補腎血故地黃丸宜用之凡肝腎虛症見者於脾胃藥加地黃可也或以目札咬牙為肝腎虛專服地黃丸豈不泥膈生痰適有以妨於脾胃也愚按前症亦有肝熱生風風入於目目系牽動則目連札熱入於目筋脈拘緊則目直視若面赤仰臥搖頭咬牙此則心熱之所致也又當別其虛實肝實則瀉青丸虛則地黃丸心實則導赤散虛則粉紅丸若脾胃虛熱補中益氣湯加芍藥山梔以實脾土制肝木若肝腎虛熱用六味地黃丸以補腎水生肝木奚氏女六歲忽然發驚目動咬牙或睡中驚搐痰涎壅盛或用化痰祛風等藥益甚余曰面青而見前症乃屬肝木剋制脾土不能攝涎而上湧也當滋腎水生肝血則風自息而痰自消矣遂用六味丸而愈一小兒患前症痰涎自流用驚風之藥其症益甚脾胃益虛視其面色痿黃口吐痰涎用六君子補中益氣而愈小兒好睡小兒時時好睡乃脾虛困倦也不必用溫膽湯睡中驚動不安是心血虛而火動也蓋心虛則驚動宜清心安神養血降痰又胸膈有痰亦作驚動又脾胃有傷鬱滯不清亦驚動不安此又脾胃與痰所致非由心血也宜消食化痰食去痰除則補脾胃愚按前症若因心脾氣虛有痰宜用參朮茯苓五味以補心氣當歸芍藥棗仁以養心血橘紅半夏以開痰滯若脾肺氣虛胸膈有痰用補中益氣湯以補中氣用膽星天竺黃以化痰涎若因飲食停滯而作用四君子湯以健脾胃用山楂神麯以消飲食若因脾虛而好睡用五味異功散以補脾氣當歸芍藥以生脾血若因母飲酒致兒醉好睡者以甘草乾葛煎湯解之不應用四君子湯楊永興子七歲停食吐瀉後好睡睡中兼驚久治不愈余曰好睡是脾氣虛困也善驚是心血虛怯也蓋心為母脾為子也此心火不能生脾土用補中益氣湯及六味丸加鹿茸治之而愈出痘發搐小兒若因出痘而生驚搐不必治驚若身熱耳冷骫冷疑似未明古方服升麻葛根湯痘已出及出完調理氣血只依丹溪痘瘡法分氣血虛實看紅紫淡白稠密稀疏及參時令用藥常以脾胃為主虛寒用陳文秀溫補法實熱用解毒法全在活法通變愚按小兒痘瘡未出則補托之已出及出完則調理之更當察色聽聲辨其多寡表裡虛實而治之庶不有誤世皆宗丹溪錢氏陳氏三家之論又必會而通之與時宜之不致膠柱而鼓瑟也竊謂黑陷耳骫冷咬牙吐瀉者乃脾土虛敗寒水反來侮土歸腎之惡候也用百祥丸瀉之急以四君子丁香陳皮木香厚朴炮姜以溫補脾土身熱飲水黑陷復起十救一二蓋此症因脾土虛敗寒水乘侮故陳文秀先生云若治寒水於既侮之後何不保脾土於未敗之先此發前人之未發救後世之誤妄況痘瘡發出成膿收靨即癰疽起發腐潰生肌皆脾土元氣使然若黑陷寒戰咬牙泄瀉喘嗽即癰疽陽氣脫陷寒氣內淫之陰症急用異功散倍參耆歸朮薑附溫補脾胃不可泥其日期而行解毒托裡等法但見其虛弱便宜滋補脾胃以顧收靨觀丹溪先生治一叟發熱而昏倦其脈大而似數與參耆歸朮陳皮大料二十劑而痘出又二十劑而膿泡成身無全膚又六十劑而安其義可見益黃散治病益黃散治脾胃虛冷故用丁香暖胃二皮理胃消食化痰訶子澀腸胃止泄固氣甘草和中仍加白朮為當若非虛冷泄瀉清白及無食積者去青皮丁香加白朮茯苓可也溫膽湯除痰止吐加白朮芍藥黃連便是制肝補脾之藥愚按益黃散乃溫補脾胃之劑也若嘔吐腹痛泄痢清白口鼻氣冷者乃寒水反來侮土也宜用錢氏益黃散若因熱藥巴豆之類或因暑熱傷乳食損其脾胃而成吐瀉口鼻氣熱者乃胃中氣虛風熱也宜用東垣安胃散傷風流涕小兒八歲以下無傷寒雖有感冒傷風鼻塞流涕發熱咳嗽以降痰為主略加微解凡散利敗毒非幼稚所宜或冒輕者不必用藥候二三日多有自愈愚按前症若手足冷或腹脹脾虛也用六君子湯加升麻柴胡若腹脹或氣喘肺虛也用四君子湯加柴胡升麻經云肺主氣而司皮毛肺虛則腠理不密外邪易感凡發表之後其邪既去用補脾肺以實其表庶風邪不能再入往往表散之後熱嗽不退復行發表多變壞症吳江史玄年子傷風用表散化痰之藥痰盛咳嗽肚腹膨大面色㿠白此脾土虛不能生肺金也余用六君子湯加桔梗一劑頓愈至三日前症仍作鼻中流涕此復傷風寒所致用前藥加桑皮杏仁桔梗而愈史少參季子喘嗽胸腹膨脹泄瀉不食此飲食傷脾土而不能生肺金也用六君子湯一劑諸症悉愈史木川子六歲感冒咳嗽發散過度喘嗽不食用六君子湯加桔梗而愈時四月隨其父巡視耕種忽發寒戰仍復咳嗽或用發表之劑痰中有血余曰此成肺癰也次日吐痰兼膿用桔梗湯而愈後元氣未復大便似痢或用五苓黃連枳實之類痰喘目札四肢抽搐余曰此脾氣敗而變慢脾風也辭不治果然驚搐等症誤用藥餌小兒或因驚搐或變蒸或食積或寒熱往來誤服解表瀉利之藥傷損脾胃氣血難以發生面黃肌瘦目動咬牙發稀足弱不能行步此屬胃虛非肝腎也當長緩調理復全胃氣可也愚按藥餌偏勝之味脾胃非所宜也況小兒之疾多因乳食不調寒溫失節虧損脾胃元氣根本不固而邪得以致之亦有因乳母六淫七情飲食起居所致苟不明其本末辨其緩急而誤用峻厲之藥重傷脾胃生生之氣變症百出促其夭亡誰之咎也丹溪先生慈幼論言之詳矣風斑及腳指常腫小兒身常發風斑及腳指常紅腫此脾經風熱也用防風通聖散去硝黃加鼠黏子酒炒黃連為末服之亦用防風白芷薄荷黃連黃芩黃耆黃柏煎湯避風而浴愚按前症若因脾氣不足濕熱下注宜用參耆歸術以補脾氣升麻柴胡以升陽氣茯苓澤瀉以導濕熱若因食鬱內熱宜用四君子湯以健脾胃山楂神麯以消飲食山梔川芎以清肝熱若因風邪收斂腠理或浴出見風而患者宜用補中益氣湯以補元氣加芎芷羌活以散風邪潔古先生云斑發於膚外而多痛疹隱於膚內而多癢大抵安里之藥為主發表之藥為佐一小兒瘙癢發熱體倦少食此脾肺氣虛外邪相搏先用消風散二劑隨用補中益氣湯加茯苓芍藥而愈一小兒患此作痛熱渴服發表之劑其症益甚形氣倦怠脈浮而數此邪在經絡誤散表而損其真也用人參安胃散補中益氣湯而愈一小兒作癢發熱用犀角消毒散頓作吐瀉此邪氣上下俱出也其疹果消勿藥自愈一小兒陰囊赤腫余作胎毒治之而瘥後患發熱痰喘等症診其母有鬱火血熱用解鬱涼血之藥子母俱服而愈又患吐瀉小便赤澀兩目瞤動視其寅卯關脈赤此屬風熱用柴胡清肝散加鉤藤鉤木賊草一劑即愈一小兒腿如霞遊走不定先以麻油塗患處砭出惡血其毒即散用九味解毒散一劑而安一小兒患之外勢雖輕內苦便祕此患在臟也服大連翹飲敷神功散而瘥小兒無補腎法小兒無補腎法蓋稟父精而生此天一生水化生之源腎之根也此根日賴脾胃乳食水穀長養男至十六而腎始充滿既滿之後婚媾妄用虧損則可用藥補之若受胎之時稟之不足則無可補稟之原足又何待於補耶愚按小兒行遲齒遲解顱囟填五軟鶴膝腎疳齒豁睛白多愁凡此皆因稟受腎氣不足當以六味地黃丸加鹿茸補之若因精氣未滿而御女以通多致頭目眩暈作渴吐痰或發熱足熱腰腿痠軟或自汗盜汗二便澀痛變生諸疾難以名狀余常用六味八味二丸及補中益氣之劑加減用之無不奏效一小兒九歲解顱足軟兩膝漸大不能行履屬腎稟不足用六味丸加鹿茸三月而能步履一小兒十四歲肢體倦怠發熱晡熱口乾作渴吐痰如湧小便淋瀝或面目赤色身不欲衣此亦稟賦不足也用補中益氣湯及前丸而愈一小兒十五歲而御女大小便道牽痛服五苓散之類虛症蜂起與死為鄰余用補中益氣湯加減八味丸而愈一小兒十三歲內熱晡熱形體倦怠食少作渴或用清熱等藥治之虛症悉具余以為所稟怯弱用六味丸加鹿茸補之不越月而痊蓋古今元氣虛實不同故也擬定諸方治小兒肝經火旺目睛頻動痰氣上升或壯熱驚搐面色紅脈有力脾胃無傷宜瀉肝火川芎八分當歸酒洗柴胡橘紅枳殼炒天麻各六分甘草四分茯苓白芍藥炒各八分黃連四分酒炒薄荷三分上每服二錢薑水煎服愚按前症若肝經風熱而自病宜用本方若肝經血燥而自病宜用六味丸若肝木克脾土宜用四君子湯加升麻柴胡若肺金克肝木宜用瀉白散若腎水不能生肝木宜用六味丸若愈後驚悸不寐或寐中發搐咬牙宜用歸脾湯加茯苓五味蓋有餘者邪氣實也不足者真氣虛也凡病有餘當認為不足經云邪之所湊其氣必虛少參王陽湖孫八歲傷股骨正體科續之余視其面青而兼黃口角微掣動此乃肝木侮脾症也且氣血筋骨皆資脾土而生但壯脾氣則所傷自愈遂用六君子湯加鉤藤鉤當歸三十餘劑諸症悉愈一小兒三歲因驚抽搐發熱痰盛久用抱龍丸等藥以清風痰反致面色或赤或青余謂此心肝二經血虛風熱而生痰不足之象也先用六味地黃丸以滋養肝腎佐以六君子湯少加柴胡升麻以調補脾胃諸症頓退而痊治小兒脾經不足土敗木侮目睛微動四肢微搐或潮熱往來脾胃有傷飲食少進或泄瀉嘔吐面色黃脈無力宜補脾胃白朮一錢三分黃耆蜜炙川芎當歸酒洗陳皮人參肉豆蔻煨神麯乾葛各五分白芍藥一錢酒炒黃連甘草炙各四分半夏白茯苓各七分上薑水煎服愚按前症若因脾胃虛弱用五味異功散補之虛寒者加木香或再加炮姜溫之若因脾氣下陷用補中益氣湯舉之作渴者用七味白朮散主之若因脾胃虛弱寒水侮土用六君子加木香炮姜溫之若因脾胃虛弱肝木侮土用補中益氣湯加苓芍半夏調之若因肝木太過脾土受制用小柴胡湯加炒山梔平之若因傷魚肉等物宜六君子湯更加山楂砂仁消之若因傷生冷腹痛或瀉利清白宜六君子湯加砂仁木香炮姜溫之若因傷辛熱停滯嘔吐酸水或大便積利不快用六君子湯加黃連吳茱萸木香和之若食積去而泄瀉不止用四君子湯加肉豆蔻補骨脂木香煨姜以補脾腎若泄瀉止而飲食少思宜用白朮散以補脾胃一小兒傷食發熱面赤或用養胃湯枳實黃連山楂治之更加腹脹午後發熱按其腹不痛余以為飲食雖化而脾胃復傷用六君子湯數劑而痊一小兒傷食發熱嘔吐面赤服消導清熱之劑飲食已消熱赤如故余曰此胃經虛熱耳用四君子湯加升麻柴胡各二分四劑而痊一小兒傷食發熱面赤抽搐嘔吐氣喘吐痰余以為飲食傷脾發熱肺氣虛弱所致耳用六君子湯再加炒黑黃連山梔各二分一劑頓安余見各類治小兒心血虛睡中驚動不安或受驚嚇而作主清心安神降痰人參半夏湯泡酸棗仁去殼炒茯神去心各一錢當歸酒洗橘紅赤芍藥各七分五味子五粒杵甘草炙三分上水煎入薑汁竹瀝少許入牛黃半分尤妙若溫暖之月心經多熱加生地黃山梔仁各五分麥門冬七分淡竹葉若方飲食因驚而停滯者須先消飲食然後治驚驚藥內仍加白朮麥芽以理脾胃蓋驚則氣散宜收補其氣驚則痰聚宜消化其痰愚按前症若心血不足而心神驚悸者宜用本方若木火太過而心神不寧者宜用導赤散若木火翕合風熱相搏而病者用柴胡梔子散若肝火虛弱木火未濟而病者用六味丸若因脾胃食鬱生痰驚動不安者宜用四君子湯以健脾神麯半夏麥芽以化痰山梔芍藥以清熱若因飲食停滯肚腹膨脹或嘔吐泄瀉宜用六君子湯以健脾用厚朴神麯以消食如有痰搐驚症仍用本方調治如見肝經之症加鉤藤鉤方內赤芍藥易以白芍藥治驗見各症類治小兒食積鬱熱發於肌表潮熱往來主理中清陽明之熱白朮炒山楂白芍藥炒各一錢黃連炒枳實麩炒川芎香附米炒升麻各七分乾葛一錢二分甘草炙草各三分上用薑水煎服若食積去後潮熱未除減山楂枳實香附川芎加人參黃耆陳皮各五分再加白朮二三分有痰加半夏六分愚按前症若食積去而熱不退用五味異功散以補胃氣若作嘔少食用四君子加藿香半夏以安中氣若泄瀉不食宜用六君子湯加升麻柴胡以升補脾氣若久瀉不已宜用補中益氣湯以升補陽氣若虛寒加炮薑木香如不應佐以四神丸以補脾腎若體瘦潮熱口渴大便不調宜用肥兒丸以消疳積若不分脾氣虛實有無食積概用克伐消導寒涼清熱之劑復傷脾胃生氣反為難治之症儒者薛衡甫子年七歲身羸發熱面黃皆以為內傷瘀血欲下之余謂乃脾臟受傷投以六君子湯加煨姜兩服飲食頓進數服諸症全愈一小兒飲食停滯服消導之劑余曰此脾胃氣虛故飲食不能克化也法當調補為善若數用克伐之劑脾氣益傷飲食愈停矣已而腹內又結一塊寒熱潮熱食少作渴大便不實余用四君子湯飲食漸增又用補中益氣湯而愈一小兒肚腹膨脹飲食即瀉手足逆冷余以為脾氣虛寒先用人參理中丸後用六君子湯而愈一小兒常患停滯數服克伐消導之劑以致脾胃虛甚患吐瀉慢脾風而卒余見各症類治小兒發熱感冒鼻流清涕或咳嗽吐痰輕者且勿藥候一二日多自愈重者用輕和之劑橘紅半夏炮桔梗川芎各五分白茯苓桑皮蜜炙各七分甘草炙防風各四分薄荷枯黃芩炒各三分白朮一錢上每服二錢薑水煎服愚按前症若腠理不密外邪所感鬱於肺而為患者宜用本方若脾胃氣虛不能生肺金而致患者用補中益氣湯若脾胃氣實肺氣壅滯而大腸不利者用瀉黃散若心火上炎消爍肺金而致咳嗽者用六味丸大凡元氣素弱或患病日久宜用補中益氣湯為主加以半夏茯苓桔梗若見發搐咬牙等症皆虛熱所迫亦宜用之若痰盛少佐以抱龍丸若風邪既退而熱痰未已但健中氣則痰自化而病自愈若用化痰利氣之藥則中氣愈虛痰熱愈甚矣一小兒傷風咳嗽發熱服解表之劑更加喘促出汗余以為肺脾氣虛欲用補中益氣湯加五味子補之不信乃服二陳桑皮杏仁枳殼桔梗之劑前症益甚又加發搐痰壅余仍用前藥更加鉤藤鉤而痊蓋小兒臟腑脆嫩氣血易虛所用之藥雖為平和亦有偏勝之味須審察病氣形氣虛實在表在裡之不同而治之可也治法見傷風鼻流涕條治小兒大便色泔白及小便濁或澄之如米泔者此疳病也白朮黃連姜水炒白茯苓澤瀉山楂白芍藥炒各一錢青皮四分甘草三分上薑水煎服愚按前症若因脾氣虛而兼濕熱者宜用四味肥兒丸若兼泄瀉當以白朮散間服治疳丸小兒要藥胡黃連蘆薈使君子黃連各五錢炒神麯炒一兩阿魏青黛二錢另研麝香少許另研上為末稀糊丸黍米大每服十丸清湯下愚按前方乃肝脾疳症之藥也或內疳或瘡發於外亦效蓋疳干也或因哺食太早或因恣食甘肥或因峻劑重亡津液虛火上炎或因乳母飲食起居七情勞逸所致若口內生瘡身體壯熱腮唇赤色或咽乾飲水掌熱便赤盜汗煩熱齧齒虛驚此心經內外疳也宜用安神丸主之若鼻瘡目爛體瘦瘡癬或耳前後項腋小腹內股玉莖陰丸腫潰小便不調搖頭側目白膜遮睛羞明畏日肚大青筋口渴下痢此肝經內外疳也用地黃蘆薈二丸主之若頭髮稀少生瘡成穗人中口吻赤爛或腹大腳細嘔吐泄瀉飲食不思口乾嗜土瀉下酸臭小便白濁合目昏睡惡聞木音此脾經內外疳也用肥兒丸主之若鼻外生瘡咽喉不利頸腫齒痛咳嗽寒熱皮膚皺錯缺伸少氣鼻癢出涕鼻衄目黃小便頻數此肺經內外疳也用地黃清肺飲主之若腦熱身瘦手足如冰寒熱往來滑泄肚痛口臭乾渴齒齦潰爛面黧爪黑遍身生瘡耳內出水此腎經內外疳也用地黃丸主之大凡虛火上炎或痘毒上攻名曰走馬疳為患甚速敷雄黃散服大蕪荑湯此症輕則牙齦腐爛唇吻腫痛重則牙齒蝕落腮頰透爛飲食不入者為不治一小兒二歲莖痿濕癢後陰囊焮腫莖中作痛時出白津余以為肝火用龍膽瀉肝湯六味地黃丸而痊一小兒睪丸作痛小便赤澀寒熱作嘔乃肝脾之症用小柴胡湯加山梔車前子茯苓而愈一小兒睪丸腫硬小便黃澀用小柴胡湯加山梔車前子並蘆薈丸而消一小兒腹內結塊或作痛或上攻小便不調用龍膽瀉肝湯蘆薈丸而愈後形氣消鑠發熱作渴此肝木製伏脾土用補中益氣湯及蘆薈丸而愈一小兒自脫胎時兩目赤腫或作癢或生翳此胎內之肝火也用蘆薈六味二丸而愈一女子十五歲患瘰癧身發赤暈形氣倦怠此肝火血虛所致用加味逍遙散而赤暈愈用益氣湯六味丸而瘰癧消一小兒下疳潰爛發熱作痛一小兒莖中作癢不時搔捻一小兒莖中潰痛小便祕澀日晡尤甚一小兒目癢出水或項間結核或兩眼連札或陰囊瘙癢俱屬肝火皆用九味蘆薈丸並愈余見各類治小兒大病後面黃肌瘦目時動齒微咬發稀少未能大行因誤服解表瀉利傷克諸藥而致者宜長緩調理復全胃氣白朮一錢二分白芍藥酒炒白茯苓各八分人參陳皮川芎各六分甘草炙黃耆蜜炙當歸酒洗各四分半夏山楂各六分上用薑棗水煎服安神鎮驚丸驚退後調理安心神養氣血和平預防之劑天竺黃另研人參茯神南星薑製各五錢酸棗仁炒麥門冬當歸酒洗生地黃酒洗赤芍藥炒各三錢薄荷木通黃連薑汁炒山梔炒辰砂另研牛黃另研龍骨火煅各二錢青黛一錢另研上為末蜜丸緑豆大淡薑湯送下每服三五丸愚按前二方根本之治防微杜漸之法也但鎮驚丸內多苦寒辛散分利之味病後不宜輕用恐復傷胃氣而變生他症也若飲食停滯而見他症當消導為主若脾胃損傷而見他症當健中氣大凡病後元氣未復或因克伐之劑元氣復傷而見前症但用升補陽氣為主諸症自愈若專攻其病則誤矣一小兒七歲患急驚將愈而發熱驚悸或用祛風化痰之劑更加驚搐吐痰喘嗽腹膨少食惡寒又用抱龍等丸更加大便似痢寒熱往來殊類風症先君視之以為脾氣虧損諸經無所資養而然用四君子湯為主少用升麻柴胡以升補陽氣而愈治小兒齒腫流涎腮腫馬牙主陽明之熱升麻川芎白芍藥半夏炒各七分乾葛生甘草防風黃連酒炒各五分石膏火煅過白朮各一錢白芷三分上水煎每服二錢若能漱藥者則含藥漱而吐之漱藥不用白朮半夏愚按馬牙重舌因胎毒胃熱所致若用線針刺破出血即愈不必服藥若因飲食所傷脾胃虛熱而致宜用七味白朮散若服熱藥損傷脾胃發熱而致或口舌生瘡宜用人參安胃散若久病脾胃虛熱口內如無皮狀宜用七味白朮散若脾經陰血不足午後益甚宜用四物湯加白朮茯苓炙草若脾經陽氣下陷午後益甚宜用補中益氣湯並用茱萸塗腳心若疳積虛火炎上齦齒腐爛當從疳治亦有滯頤口角流涎此由脾氣虛冷不能制其津液也宜用溫脾散若脾經實熱舌縱涎下宜用瀉黃散大凡小兒四時皆以養元氣健脾胃為主若屢有痰症屢服驅風瀉火之藥多患前症其輕者能節飲食慎調理不藥自愈序次丹溪小兒痘瘡治法小兒瘡疹大抵與傷寒相似發熱煩躁臉赤唇紅身痛頭疼乍寒乍熱噴嚏呵缺嗽喘痰涎始發之時有因傷風傷寒而得有因時氣傳染而得有因傷食嘔吐而得有因跌撲驚恐蓄血而得或為竄眼驚搐如風之證或口舌咽喉肚腹疼痛或煩躁狂悶昏睡或自汗或下痢或發熱或不發熱證候多端卒未易辨亦須以耳冷骫冷足冷驗之蓋瘡疹屬陽腎臟無症耳與骫足俱屬於腎故腎之所部獨冷又不若視其耳後有紅脈赤縷為真於此可以稽驗矣調護之法首尾俱不可汗下但溫涼之劑兼而濟之解毒和中安表而已虛者益之實者損之冷者溫之熱者平之是為權度借喻而言亦如庖人籠蒸之法但欲其松耳蓋毒發於表如苟妄汗則榮衛一虛重令開泄轉增瘡爛由是風邪乘間變症者有之毒根於裡如苟妄下則內氣一虛毒不能出而返入焉由是土不勝水變黑歸腎身體振寒耳骫反熱眼合肚脹其瘡黑陷十無一生汗下二說古人深戒以此觀之瘡疹症狀雖與傷寒相似而其治法實與傷寒不同傷寒從表入里瘡疹所發從里出表故也如欲解肌乾葛紫蘇可也其或氣實煩躁熱熾大便祕結則與犀角地黃湯或人參敗毒散又或紫草飲多服亦能利之故雖云大便不通者少與大黃尤宜仔細斟酌之若小便赤少者分利小便則熱氣有所滲而出凡熱不可驟遏但輕解之若無熱則瘡又不能發也凡瘡疹春夏為順秋冬為逆瘡疹分人清濁就形氣上取勇怯凡已發未發並與紫蘇飲但覺身熱症似傷寒若未見瘡疑似未明且先與惺惺散參蘇飲或人參羌活輩熱甚則與升麻葛根湯人參敗毒散但一見紅點便忌葛根湯恐發得表虛也凡痘瘡初欲出時身發熱鼻尖冷呵缺咳嗽面赤方是痘出之候便宜服升麻葛根湯加山楂大力子其瘡稀疏而易愈凡痘初出時或未見時宜服後方多者令少重者令輕方以絲瓜近蒂三寸連瓜子皮燒灰存性為末砂糖拌干吃入硃砂末亦可又方硃砂為末蜜水調服多者可減少者可無凡痘瘡發熱之時便以惡實子為末蜜調貼囪門上免有患眼之疾凡初出之際須看胸前若稠密急宜消毒飲加山楂黃芩酒洗紫草減食加人參初出之時色白者便大補氣血參耆芎朮升麻乾葛甘草木香丁香酒洗當歸白芍藥若大便瀉加訶子肉豆蔻初起時自汗不妨蓋濕熱熏蒸而然故也有初起煩躁譫語狂渴引飲若飲水則後來靨不齊急以涼藥解其標如益元散之類亦可用凡瘡已出可少與化毒湯出不快者加味四聖散紫草飲子紫草木香湯紫草木通湯或快斑散絲瓜湯出太甚者人參敗毒散犀角地黃湯疏則無毒密則有毒以涼藥解之雖數帖亦不妨無害眼之患爐灰色白靜者作寒看齊湧者燥者焮發者作熱看黑屬血熱涼血為主白屬氣虛補氣為主中黑陷而外白起得遲者則相兼而治凡痘瘡分表裡虛實吐瀉少食為裡虛不吐瀉能食為裡實裡實而補則結癰毒陷伏倒靨為表虛灰白者亦表虛或用燒人屎紅活綻凸為表實表實而復補表則要潰爛不結痂痘瘡分氣虛血虛用補藥氣虛者人參白朮加解毒藥血虛者四物湯中加解毒藥痘瘡分氣血虛實多帶氣血不足虛則黃耆生血活血之劑助之略佐以風藥實則白芍藥為君黃芩亦為君佐以白芷連翹續斷之類調解之法活血調氣安表和中輕清消毒溫涼之劑兼而治之二者得兼而已溫如當歸黃耆木香輩涼如前胡乾葛升麻輩佐之以川芎白芍藥枳殼桔梗羌活木通紫草之屬則可以調適矣黑陷二種因氣虛而毒氣不能盡出者酒炒黃耆紫草人參輩黑陷甚者亦用燒人屎蜜水調服出子和方癢塌者於形色脈上分虛實實則脈有力氣壯虛則無力虛癢以實表之劑加涼血藥實癢如大便不通者以大黃寒涼之藥少與之下其結糞氣怯輕者用淡蜜水調滑石末以羽潤瘡上瘡乾者宜退火止用輕劑荊芥升麻葛根之類濕者用瀉濕乃肌表間濕宜用風藥白芷防風之類上引用升麻葛根下引用檳榔牛膝助以貝母忍冬草白芷栝蔞之類若咽喉痛者大如聖散鼠黏子湯喘滿氣壅者麻黃黃芩湯煩渴者甘草散烏梅湯下痢嘔逆者木香理中湯顏色正者如上治將欲成就卻色淡者宜助血藥用當歸川芎酒洗芍藥之類或加紅花將成就之際卻紫色者屬熱用涼藥解其毒升麻葛根酒炒黃芩黃連及連翹之類甚者犀角大解痘毒灰白色將靨時如豆殼者蓋因初起時飲水多其靨不齊俗呼倒靨不好但服實表之劑消息他大小便如大便祕通大便小便祕通小便小便赤澀者大連翹飲甘露飲大便祕結內煩外熱者小柴胡湯加枳殼最當或少用四順清涼瘡疹用藥固有權度大小二便一或祕焉則腸胃壅遏脈絡凝滯毒氣無從發泄眼閉聲啞肌肉黧黑不旋踵而告變矣陷入者加味四聖散更以胡荽酒薄敷其身厚敷其足噴其衣服並以厚綿蓋之若猶未也獨聖散入木香煎湯若其瘡已黑乃可用錢仲陽宣風散加青皮主之錢氏云黑陷青紫者百祥丸下之不黑者謹勿下余知其所下者瀉膀胱之邪也又云下後身熱氣溫欲飲水者可治水穀不消或寒戰者為逆余知其脾強者土可以治水也百祥丸太峻當以宣風散代之瀉後溫脾則用人參茯苓白朮等分厚朴木香甘草各半為妙蓋瘡發肌肉陽明主之脾土一溫胃氣隨暢獨不可消勝已泄之腎水乎此錢氏不刊之祕旨也其壞瘡者一曰內虛泄瀉二曰外傷風冷三曰變黑歸腎近時小兒痘瘡止宗陳文中木香散異功散殊不知彼時立方之時為運氣在寒水司天時令又值嚴冬大寒為因寒鬱遏痘瘡不紅綻故用辛熱之劑發之今人不分時令寒熱一概施治誤人多矣時值溫熱山野農家貧賤之人其或偶中也丹溪痘瘡治法最為明備近世通用陳文中木香異功等方乃一偏之術若痘瘡虛怯淡白色癢塌此屬虛寒宜用陳文中方若發熱壯盛齊湧紅紫色瘙癢此屬熱毒急宜涼血解毒自陳文中方盛行後屬虛寒者率得生屬熱毒者悉不救痘是胎毒古人治法只解毒然氣血虛則逆毒氣不出及不能成就故陳文中之法亦千載妙訣補前人之未備者但溫補之法既行而解毒之旨遂隱故救得一邊又害了一邊今必詳究丹溪二法通用斯無弊也痘瘡屬虛寒者直可延至十數日後方死屬毒盛轉紫色者不過七八日蓋痘是胎毒自內出外二三日方出齊毒氣尚在內出至六日則當盡發於表七八九日成膿而結痂矣若毒氣盛不能盡出過六日毒反內入臟腑故須於六日以前毒氣該出之時急服涼血解毒之藥以驅出之六日以後醫無及矣故其死最急若虛弱毒氣少者只是氣血不足不能貫膿成就故綿延日久而後死此虛實輕重之分也痘瘡多者是毒氣多便先宜解毒然多則恐氣血周貫不足故隨後亦宜兼補藥以助成膿血愚按痘疹之疾乃胎稟之熱毒由內發外雖為有餘之症當瀉不當補然兒體有虛實積毒有輕重又在變而通之考之錢陳二先生雖俱名家然就而折衷之則陳為較優蓋錢之用藥偏於清涼而陳之治法溫涼並行以其深究陰陽造化之妙故於病之真寒假熱與夫真熱假寒罔不知之真而見之定隨症異宜未嘗執泥假如病屬虛熱而元氣未至虧損者施之以錢氏之法則固當矣若病氣元氣俱虛或俱實者而不以陳法治之鮮不致誤且小兒之痘疹譬即大人之癰疽治法無異其熱毒蘊於內臟致二便不利煩熱作渴脈沉實須用托裡疏通和榮衛三法觀陳氏異功散人參白朮散前胡枳殼湯等方其藥品深為得宜治者詳訂而遵之可也
