body:
  text: 注序鄞人王節齋集明醫醫方而著以己見覺世濟物之心偉矣蘇立齋薛翁大闡節齋所未盡而為之注凡起病傳經之因一覽之如見肺肝間有損益節齋而直指原委豫雖未暢於醫要之立齋歷試既效之言雖節齋復生亦當視為忠告友矣嘗聞姑蘇傳劉張醫學乃是葛應雷始自後王安道趙良仁輩各著會同醫韻藥要等書世所寶藏則蘇固有玄妙醫派也立齋崛起於後淵源有自矣況仕孝廟歷今上三朝視篆南北兩太醫院必盡閲中祕奇方遍交寰海名士聞見益宏矣豫昔釋褐時知立齋素以著述為志而仕宦之足以妨之也於時致政歸吳徜徉林丘上下今古研精覃思垂二十年宜其視色望氣察見脈理而所投立效也今天下為醫者鄉無淵源之承進無中祕之聞退無研覃之思而立齋有此三者宜其富於著述今所注明醫雜著乃屢試屢驗焉如吾叔東墟公八十又二病肩疽衆以消治翁以補腎效又病痰喘衆以散治翁以補脾效蓋因病立方而不執方雖立齋所自注有不能盡立齋所自用者若求立齋者止以所注方焉則亦剪剪矣後漢郭玉曰醫言意也奏理至密隨氣用巧而神存乎心手之間意可得而解口不可得而言蓋意也者活法也注也者大意也因立齋所注之大意而求立齋所不容注之活法則得心應手所存者神矣昔節齋為雜著而不詳盡如今立齋所注或亦如是意云嘉靖歲己酉正月六日賜同進士出身原任禮科右給事中徵仕郎海鹽海石錢薇拜撰補注明醫雜著序先朝都憲節齋王翁自秀才時便存心天下以為吾即不得致君澤民當以醫藥壽斯世夭札耳及登第任歷中外皆得人心至於人之疢疾治無不驗古人所謂良相良醫蓋兼體之矣所著發熱等篇名明醫雜著刊行有年矣厥問答擬議悉本醫學綱目中來其淵源心力可想見也然猶不自滿假當其友之請梓辭以政余草集未及成書疆而後可且云俟豫晚年林下更須增損惜乎其未果也己輒不自分竊以先生引而未發之意漫為補注附以治驗焉或曰脈之不知病安從識於是之書何獨略於診法邪乃更入滑伯仁先生診家樞要共六卷末則續備方餌以便初學覽用稿雖苟完頗多簡贅之失適總憲及齋魏翁備兵我吳而翁亦素通於醫蓋今日之節齋也每過余談及率嘆民命之當重而藥之不可不講也辱就鄙稿加之筆削行吳邑宋尹陽山梓之但愧芻蕘枝葉弗足採擇耳大方其教之勿以老拙而棄之曰不足與之言大明嘉靖辛亥冬仲吉日前奉政大夫太醫院院使後學薛己謹序
