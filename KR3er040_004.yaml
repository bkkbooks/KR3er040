body:
  text: 卷之四風症問左手臂攣縮不能伸舉手指拳縮肩背重墜有似筋牽引作痛伸縮間骨節處筋作痛左足大指中指常欲反張難屈左手指掌時常作麻指縫近掌處但覺有物夾於其間左足底近前高突處如腫硬急脹摸之無形步履時只多如一氈墊者語言短澀拜起頭暈口眼喎斜舌根痰纏胸膈痰礙咽中有痰核左肋下有痰核不時打寒噤嚏噴呵欠便牽動手足之病左耳左面左體使手或粗衣摸擦則皮膚痛左腮左項左脅肋皆時常木而急如有物黏貼其上左體或頭項或手足作癢左眼時常淚流凝不幹左口角似寬縱左面上似蟲蟻遊行被風吹襲左鼻孔清涕出即打嚏噴等症答大經小絡貫串一身謂之脈脈者血之隧道也血隨氣行周流無停筋者周布四肢百節絡聯而束縛之此屬肝木得血以養之則和柔緩而不急脈皆起於手足指端故十二經皆以手足名之而筋則無處無之皮毛者屬肺主外而易於感冒人身之血行於脈絡而外充於皮毛滲透肌肉滋養筋骨故百體和運動無礙若氣滯則血滯氣逆則血逆得熱則瘀濁得寒則凝泣衰耗則運行不周滲透不遍而外邪易侵矣津液者血之餘行乎脈外流通一身如天之清露若血濁氣滯則凝聚而為痰痰乃津液之變如天之露也故云痰遍身上下無處不到蓋即津液之在周身者津液生於脾胃水穀所乘濁則為痰故痰生於脾土也所以古人論中風偏枯麻木痠痛不舉諸症以血虛死血痰飲為言是論其致病之根源至其得病則必有所感觸或因風或因寒或因濕或因酒或因七情或勞力勞心房勞汗出因感風寒濕氣遂成此病此血病痰病為本而外邪為標其病中於皮毛血脈經絡肌肉筋骨之間而未入臟腑故邪在皮毛肌肉則不知痛癢麻木不仁如有一物重貼於其上或如蟲遊行或灑灑寒栗或腫脹或自汗遇熱則或癢遇陰虛則沉重痠痛邪入血脈經絡則手足指掌肩背腰膝重硬不遂難於屈伸舉動或走注疼痛所陳諸症皆外自皮毛以至筋骨之病凡脈所經所絡筋所會所結血氣津液所行之處皆凝滯郁遏不得流通而致然也亦何必一一強度某病屬某經某病屬某臟而雜治之哉若邪入臟腑則為危病而難於用藥東垣書論之明矣經云知其要者一言而終不知其要流散無窮此之謂也愚按難經曰邪在氣氣為是動邪在血血為所生病經云陽之氣以天地之疾風名之此風非外來風邪乃本氣病也故諸方多言皆由氣體虛弱榮衛失調或七情過度以致真氣耗散腠理不密邪氣乘虛而入及其中也然左半體者肝腎所居之地肝主筋腎主骨肝藏血腎藏精精血枯稿不能滋養故筋骨偏廢而不用也河間曰風病多因熱甚俗云風者言末而忘其本也經云汗出偏沮使人偏枯如樹木一枝津液不到則此枝枯稿被風所害由此觀之實因肝腎二經精血枯稿之所致也前症云云亦當察其形症審其兼變而治之尤不可泥執於風經曰三陰三陽發病為偏枯痿易四肢不舉亦未嘗必指於風也其真中者當辨其中臟中腑而治之眼瞀者中於肝舌不能言者中於心唇緩便祕者中於脾鼻塞者中於肺耳聾者中於腎此五者病深多為難治中血脈者外無六經之形症內無便溺之阻隔肢不能舉口不能言用大秦艽湯主之中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤頭目眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脈浮洪面赤汗多惡風心神顛倒言語謇澀舌強口乾忪悸恍惚此中小腸兼中心也用麻黃散之類如右關脈浮緩或浮大面唇黃汗多惡風口歪語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹脹不食此中胃兼中脾也用防風散之類如右寸脈浮澀而短必鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味子湯之類如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風之症治也其間亦有氣血之分焉氣虛而中者右手足不仁用六君子湯加鉤藤薑汁竹瀝血虛而中者左手足不仁用四物湯加鉤藤竹瀝薑汁氣血俱虛而中者左右手足皆不仁用八珍湯加鉤藤薑汁竹瀝其與中風相類者不可不別如中於寒謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊用麻黃桂枝理中湯之類中於暑謂夏月卒冒炎暑昏冒痿厥吐瀉喘滿用十味香薷飲之類中於濕丹溪所謂因濕土生痰痰生熱熱生風也用清燥湯之類加竹瀝薑汁因於火者河間謂五志過極火盛水衰熱氣怫鬱昏冒而卒僕也用六味丸四君子湯獨參湯之類內有恚怒傷肝陰火上炎者用小柴胡湯之類中於氣者由七情過極氣厥昏冒或牙關緊急用蘇合香丸之類食厥者過於飲食胃氣不能運行故昏冒也用六君子加木香勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也用補中益氣湯房勞者因腎虛耗氣不歸源故昏冒也用六味丸此皆類於中風者也夫中風者內經主於風此真中風也若河間主於火東垣主於氣丹溪主於濕皆是因火因氣因濕而為暴病暴死之症類中風而非真中風也治者審之卒中昏憒口眼歪斜痰氣上湧咽喉有聲六脈沉伏此真氣虛而風邪所乘以三生飲一兩加人參一兩煎服即蘇若遺尿手撒口開鼾睡為不治用前藥亦有得生者三生飲乃行經絡治寒痰之藥有斬關奪旗之功每服必用人參兩許以祛其邪而補助真氣否則不惟無益適足以取敗矣觀先哲用耆附參附等湯其義可見大尹劉孟春素有痰兩臂頑麻兩目流淚服祛風化痰藥痰愈甚臂反痛不能伸手指俱攣余曰麻屬氣虛誤服前藥肝火熾盛肝血乾涸筋無所養虛而攣耳當補脾肺滋腎水則風自息熱自退痰自清遂用六味地黃丸補中益氣湯不三月而痊一儒者素勤苦惡風寒鼻流清涕寒噤噴嚏屬脾肺氣虛反服祛風之藥肢體麻倦痰涎自出殊類風症余以為風劑耗散元氣陰火乘其土位以補中益氣湯加麥門五味子治之而愈舉人於尚之素腎虛積勞足痿不能步履後舌喑不能言面色黧黑余謂腎氣虛寒不能運及所發用地黃飲子治之而愈後不慎調攝而復作或用牛黃清心丸之類發熱痰甚誠似中風用祛風化痰之類小便祕澀口舌乾燥仍用前飲及加減八味丸漸愈又用補中益氣湯而痊一膏粱之人素不慎起居忽失音不能語神思昏憒痰涎上湧余謂河間云夫喑屬腎經虛寒其氣厥不至醫學綱目云少陰氣至則齧舌少陽氣至則齧頰今失音腎氣不能上接清陽之氣也不信仍用風藥後齧舌始信余言先用地黃飲子及六味地黃丸而愈儀部袁補之患前症不信余言數服祛痰之劑後齧舌而歿一男子體肥善飲舌本強語澀痰壅口眼歪斜肢體不遂余謂脾虛濕熱痰涎所致用六君子煨乾葛山梔神麯而愈外舅年六十餘素善飲兩臂作痛余曰此脾虛有濕也不信恪服祛風治痰之藥更加麻木發熱體軟痰壅腿膝拘痛口噤語澀頭目暈重口角寬縱痰涎流出兩月後遍身如蟲行搔起白屑始信余曰臂麻體軟脾無用也痰涎湧出脾不能攝也口斜語澀脾氣傷也頭目暈重脾氣不升也癢起白屑脾氣不能營也遂用補中益氣湯加神麯半夏茯苓三十餘劑諸症悉愈又用參朮膏而痊一男子元氣素弱或頭目眩暈或肢體倦熱仲夏因勞役飲食不時兩手麻木肢體倦怠余以為暑熱傷元氣用人參益氣湯而愈一男子卒中口眼歪斜言語不出惡見風寒四肢拘急脈浮而緊此屬脾胃受症故舌本強而不能言用秦艽升麻湯治之稍愈乃以補中益氣湯加山梔治之而痊一婦人懷抱鬱結筋攣骨痛喉間似有一核服烏藥順氣等藥口眼歪斜臂難伸舉痰涎愈多內熱晡熱食少體倦余以鬱火傷脾血燥生風用加味歸脾湯加丹皮山梔二十餘劑形體漸健飲食漸加又用加味逍遙散十餘劑痰熱少退喉核少消更用升陽益胃湯數劑諸症漸愈但臂不能伸此肝經血少而筋攣耳用地黃丸而愈一産婦兩手麻木服愈風丹天麻丸遍身皆麻神思倦怠晡熱作渴自汗盜汗余謂氣血俱虛用十全大補湯數劑諸症悉退又數劑而全愈但內熱用加味逍遙散而痊一産婦筋攣臂軟肌肉抽掣皆屬氣血虛用十全大補湯而痊問兩腿自膝以下或時內熱或骨中覺熱或有一點痠痛熱者何答此血熱也但是風病其血必熱惟其血熱故風寒之氣一襲之則外寒束內熱而為痛丹溪論痛風謂血熱得寒汙濁凝滯所以作痛遇夜痛甚行於陰也遇風雨陰寒痛甚寒濕勝也又風病必血燥風木生火故血熱而燥愚按前論最為切當臨川陳先生云醫風先醫血血行風自滅蓋肝藏血而主風又肝氣為陽為火肝血為陰為水若肝火旺則肝血必虛故凡風病多因肝經風火為患當推五臟相勝相生以益其血經云腎藏精而主骨故腎虛者則骨中熱或湧泉穴或兩脛兩足內熱多患骨痿以致不起屬足三陰虧損之虛熱耳滋其化源庶可保其生也僉憲高如齋兩腿逸則筋緩痿軟而無力勞則作痛如針刺脈洪數而有力余曰此腎肝陰虛火之象也用六味地黃丸而愈知州韓廷儀先患風症用疏風化痰養血之藥而痊其腿膝骨內發熱作痛服十味固本丸天麻丸益甚兩尺脈數而無力余以為腎水虛不能生肝木虛火內動而作非風邪所致也不信又服羌活愈風丹之類四肢痿軟遍身麻木痰涎上湧神思不清余曰皆脾氣虧損不能營養周身又不能攝涎歸源先用六君子加芎歸木香數劑壯其脾氣以攝涎歸源又以八珍湯數劑以助五臟生化之氣以榮養周身而諸證漸愈乃朝以補中益氣湯培養脾肺夕以六味地黃丸滋補肝腎如此三月餘而安一婦人因怒患痰厥而蘇左手臂不能伸手指麻木口喎眼斜痰氣上攻兩腿骨熱或骨中痠痛服烏藥順氣散之類諸症益甚不時昏憒更加內熱晡熱余以為肝經血虛內熱生風前藥復耗肝血虛火熾盛而益甚也先以柴胡梔子散調養肝經氣血數日後用八珍湯加鉤藤鉤散諸症稍愈又用加減八味丸料少加酒炒黃柏知母黑色者數劑諸證頓退乃服八珍湯柴胡梔子散半載而痊後勞役即有復作之意服柴胡梔子散隨安問有醫教以四物湯二陳湯間服後惑於南星半夏不可輕服之言二陳通不入口專用四物而痰藥亦少用枳朮丸可專服否答此少瘥耳用血藥而無行痰開經絡達肌表之藥以佐之血藥屬陰性頗凝滯焉能流通經絡驅逐病邪以成功也故古人以烏頭為半身不遂行經絡者此也蓋風疾原於血虛血熱挾火與痰經絡肌表之間病根在矣後因感冒涼風寒氣或因過飲助痰火或因惱怒逆肝氣遂成半身不遂之症世謂之風病其病成於肌表皮毛筋骨經絡之間未入五臟六腑故治之亦兼在外而不專於內若只用四物湯是專補內也此病之痰亦在經絡若只用枳朮丸是亦專治內也須補養其內以固本攻治其外以去邪斯為可耳愚按前症若因腎虛陰火而肝燥者宜用六味地黃丸生腎水滋肝血若因怒動肝火而血耗者用四物加柴梔丹皮茯苓以清肝火生肝血若因脾經鬱結而血耗者用歸脾四物二湯以補脾氣生肝血若脾氣虛而痰滯者用二陳加白朮柴胡健脾氣以化痰若因脾虛濕而風痰不利者用二陳加南星蒼朮防風勝濕以化痰脾經濕而為痰者用二陳加白朮防風脾氣鬱而滯者用歸脾湯加柴胡半夏腎經敗液而為痰者用六味丸顧憲幕年六十不慎飲食起居左半身手足不遂汗出痰壅或用參耆之類汗止神清左腿自膝至足指仍舊腫墜痰多作痛肝腎脾脈洪大而數重按則軟澀余以為足三陰虛朝用補中益氣湯加黃柏知母數劑諸症悉退但自弛守禁不能全愈靳閣老夫人先胸脅脹痛後四肢不收自汗如水小便自遺大便不實口緊目瞤飲食頗進十餘日或以為中臟公甚憂余曰非也若風既中臟真氣既脫惡症既見禍在反掌焉能延之乃候其色面目俱赤而或青診其脈左三部洪數惟肝尤甚余曰胸乳脹痛肝經血虛肝氣痞塞也四肢不收肝經血虛不能養筋也自汗不止肝經風熱津液妄泄也小便自遺肝經熱甚陰挺失職也大便不實肝木熾盛克脾土也遂用犀角散四劑諸症頓愈又用加味逍遙散調理而安後因鬱怒前症復作兼發熱嘔吐飲食少思月經不止此木盛剋土而脾不能攝血也用加味歸脾湯為主佐以逍遙散調補肝脾之氣清和肝脾之血而愈後每遇怒或睡中手足搐搦復用前藥即愈大參朱云溪母於九月內忽仆地痰昧不省唇口喎斜左目緊小或用治痰調血之劑其勢稍緩至次年四月初其病復作仍進前藥勢亦漸緩至六月終病乃大作小便自遺或謂風中於臟以為不治余診之左關弦洪而數此屬肝火血燥也遂用六味丸加五味麥冬芎歸一劑而飲食頓進小便自調隨用補中益氣加茯苓山梔鉤藤丹皮而安至十月復以傷食腹痛作瀉左目仍小兩關尺脈弦洪鼓指余以六君加木香吳茱升麻柴胡一劑而痛泄俱緩復以六君加肉果補脂一劑諸脈頓平痛泄俱止余謂左關弦洪由肝火血燥故左目緊小右關弦洪由肝邪乘脾故唇口歪斜腹痛作瀉二尺鼓指由元氣下陷設以目緊口喎誤作風中投以風藥以腹痛泄瀉誤作積滯投以峻劑復耗元氣為害甚矣後臥火箱熱蒸太過致痰喘誤服寒涼之劑益甚後請診辭不治果歿一婦人因怒仆地語言謇澀口眼喎斜四肢拘急汗出遺尿六脈洪大肝脈尤甚皆由肝火熾盛肝主小便因熱甚而自遺也用加味逍遙散加鉤藤及六味丸尋愈一老婦兩臂不遂語言謇澀服祛風之藥反致筋攣骨痛余謂此肝火血虛所致用八珍湯補氣血用地黃丸補腎水佐以排風湯年餘而愈一婦人經行口眼歪斜痰涎上湧此血虛而肝火動用加味逍遙散加牡丹皮治之尋愈後因飲食停滯日吐痰涎此脾氣虛而不歸經也用六君子二十餘劑而安一婦人因怒口眼歪斜痰涎上湧口噤發搐此脾肺氣虛而肝木旺用六君子加木香鉤藤鉤柴胡治之漸愈又用加味歸脾湯調理而安一産婦勤於女工忽仆地牙關緊急痰壅氣喘四肢不遂此氣血虛而發痙朝用補中益氣湯加茯苓半夏夕用八珍湯加半夏各三十餘劑不應此虛之未復藥力之未及也仍用前二湯各五十餘劑尋愈一婦人素有內熱月經不調經行後四肢不能伸舒臥床半載或用風濕痰火之劑不效其脈浮緩按之則澀名曰瘛症屬風寒所乘用加味逍遙散加肉桂防風四劑頓愈更以八珍湯調理兩月餘而瘥一婦人素經水過期因勞怒四肢不能屈曲名曰瘲症此血虛而風熱所乘先用八珍湯加鉤藤柴胡漸愈更佐以加味逍遙散調理而痊一婦人四肢攣屈煩痛自汗小便短少畏見風寒脈浮弦緩此氣血虛而風寒濕熱相搏先用東垣清燥湯漸愈再用加味逍遙散及八珍湯加牡丹皮而痊一婦人素有痰火忽然昏憒瘛瘲抽搐善伸數欠四肢筋攣痰涎上升此肺金燥甚血液衰少而然也用清燥湯六味丸兼服尋愈一婦人肢節作痛不能轉側惡見風寒自汗盜汗小便短少雖夏亦不去衣其脈浮緊此風寒客於太陽經用甘草附子湯一劑而瘥一婦人因怒發搐嘔吐痰涎口噤昏憒氣口脈大於人迎此氣滯而食厥用平胃散加茯苓半夏木香治之而蘇更以六君子加木香漸愈乃去木香又二十餘劑而痊問或謂二陳湯南星半夏一切燥藥止能治痰飲濕痰其於陰虛火動之痰殊無相干且與補陰藥相反答陰虛火動之痰不宜用南星半夏若中風偏枯麻木症之痰必用南星半夏也蓋其感病在肌表經絡筋骨之間耳愚按丹溪先生云痰病之原有因熱而生痰者亦有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因食積而得者有脾虛不能運化而生者若熱病則多煩熱風痰多成癱瘓奇症冷痰多成骨痹濕痰多怠惰軟弱驚痰多成心痛癲疾飲痰多脅痛臂痛食積痰多成癖塊痞滿其為病種種難名竊謂前症若因腎水虛弱陰虧難降使邪水上溢故多痰唾宜滋其化源其痰自消若因肝木侮脾土而風痰壅滯者先用南星半夏清其痰後用六君子之類調胃氣痰自不生若概用風藥耗其陽氣而絶陰血之源適足以成其風益其病也冢宰劉紫岩因勞下體軟痛發熱痰盛用清燥湯入竹瀝薑汁服之熱痛減半再劑而全愈庠生陳時用素勤苦復因勞怒口斜痰甚脈滑數而軟余謂勞傷中氣怒傷肝火用補中益氣湯加山梔茯苓半夏曲桔梗數劑而愈錦衣楊永興筋骨軟痛氣粗痰盛作渴喜水或用愈風湯天麻丸更加痰甚體麻余以為脾腎俱虛用補中益氣湯加減八味丸三月餘而痊陶天爵妾媵素多時患頭暈痰甚勞則肢體痿軟筋骨作痛殊類風症余以為腎虛不能納氣歸源用加減八味丸而痊後因房勞氣惱頭暈項強耳下作痛此肝火之症仍用前藥滋腎水生肝血制風火而愈問倒倉吐痰不盡病根痰又甚作胸膈之上咽喉之下居多夜間更為所苦吐甚難出後服蘿蔔子欲吐之因空腹遂入大腸作痢答病在腸胃者宜用之腸胃如倉格致餘論説明倒倉二字宜玩倉中有陳腐敗谷須倒之腸胃中有痰血積滯須滌蕩之牛肉屬坤土本補脾胃之物非吐下藥也特飲之過多滿而致吐下耳此借補以為瀉故病去之後胃得補而氣發生乃巧法也若病不屬腸胃者豈可輕用古人治風初病時痰涎壅塞胸膈阻礙經絡藥無所施故先吐去其痰方可施法今既倒倉之後豈可復行吐下哉吐下之後再行吐而行下是虛虛也痰久積在胸膈腸胃者固宜吐下之但痰日逐生豈倒倉可盡其根但恐倒倉之後胃虛而痰易生故丹溪先生云宜補中氣以運痰也又皮膚經絡隧道之間俱為邪所客而阻滯少通則津液行於其間者亦聚而為痰於是日逐飲食入胃所生之津液不得流散而化為痰飲聚於胸膈上升於咽喉宜其多也此亦因外而傷內愚按前症若因脾氣虧損痰客中焦閉塞清道以致四肢百骸發為諸病者理宜壯脾氣為主兼佐以治痰則中氣健而痰涎自化若倒倉之後而痰反甚此脾氣愈虛則津液反為痰者理宜補中益氣非參朮二陳之類不能治最忌行氣化痰及倒倉之法州判蔣大用年五十形體魁梧中滿吐痰勞則頭暈所服皆清痰理氣余曰中滿者脾氣虧損也痰盛者脾氣不能運也頭暈者脾氣不能升也指麻者脾氣虛而不能周也遂以補中益氣加茯苓半夏以補脾土八味丸以補脾母而愈乾坤生意方云凡人手指麻軟三年後有中風之疾可服搜風順氣丸天麻丸秦艽湯之類以預防之彼惑此而恪服之以致大便不禁飲食不進而歿竊謂預防之理當養氣血節飲食戒七情遠幃幕若服前藥以為預防適所以反招風而取中也秀才劉允功形體魁梧素不慎酒色因勞怒氣頭暈仆地痰涎上湧手足麻痹時或面赤口乾引飲六脈洪而無力甚數余曰肺主氣腎藏氣今腎虛不能納氣歸源陽獨居上故作頭暈又不能攝水歸源飲停於中故化而為痰陽氣虛熱而麻痹虛火上炎而作渴當滋化源用補中益氣合六味地黃丸料一服而愈後勞役或入房即作用前藥隨愈問自倒倉後常覺口中痰甚而有熱頗易飢有痰常少用石膏瀉之稍可答倒倉後胃虛不可用石膏脾胃陰血虛則陽火旺火能消食故易飢暫用石膏瀉胃火故覺效然非正法只以白朮補脾而用白芍藥生血甘草緩中瀉火陳皮茯苓行痰則王道之治也愚按倒倉之後而火反旺者乃脾胃虛寒之假疰也設認為實熱則誤矣東垣先生脾胃論言之最詳若人氣高而喘身熱而煩或揚手擲足口中痰甚者屬中氣虛弱而變症也宜用補中益氣湯若人形怯氣弱畏惡風寒或肢體蜷攣而痰上湧者屬脾氣虛弱而不能援涎也宜用六君子湯若兼口角流涎者屬脾氣虛寒而不能主涎也用張氏溫脾散如不應急用六君子加附子若因命門火衰不能生脾土者急用八味丸若人素腎虛發熱或腎虛有痰者兼以六味丸料若人素陽虛惡寒或腎虛有痰者兼以八味丸料一儒者脾腎素虛而有痰或用導痰之法痰甚作渴頭暈煩熱余謂中氣虛弱而變症用補中益氣湯而愈後勞役發熱頭暈此氣虛不能上升也用前湯加蔓荊子而愈後又勞神畏見風寒四肢逆冷口沃痰涎余以為脾氣虛寒之真病以六君子加炮薑肉桂而愈一男子素腎虛而咳痰亦用導痰之法虛症悉具痰涎上湧小便頻數余謂足三陰虛而復損也朝用補養脾氣湯培養脾肺之氣夕用六味丸加五味子收斂耗散之精而愈問自倒倉後行動頗覺眩暈作痰每暈必於勞役後方作又平日大便常不結實近亦結燥答倒倉非正對病症故諸風病未見退而痰多便結頭眩眼花皆吐下後元氣虛故也倒倉大腸亡陽故結燥黃連苦寒性燥苦能燥濕寒能去熱黃連能實大腸平日大便常不實者乃腸胃中有濕熱因服黃連亦見結實愚按倒倉之後胃氣受傷元氣虧損不能化生陰精而虛火內作以致前症也當甘補之經曰土位之主其瀉以苦其補以甘是也蓋頭暈眼花胃氣不能上升也大便不實脾虛不能約制也大便結燥者血虛不能濡潤也經云腎主大便又云腎主五液若腎氣調和津液滋潤則大便自然通調矣凡此皆宜實脾土補肺金諸病自愈若因大腸火燥而大便祕結者宜用六味地黃丸若因脾胃虛弱而大便不實用六君炮薑若因脾腎虛弱而大便不實者須用四神丸補中益氣湯大尹陳克明異痰後痰益多大便不實喜極熱飲食手足逆冷余謂命門火衰而脾肺虛寒不能攝涎歸源用八味丸而尋愈進士張禹功飲食停滯胸滿唾痰或用藥導之痰涎上湧眩暈熱渴大便祕結喜冷飲食手足發熱余謂腎水虛弱津液難降敗液為痰用六味丸而愈問近有欲為溫針者乃楚人法其法針於穴以香白芷作圓餅套針上以艾針溫之多取效答古者針則不灸灸則不針未有針而加灸者此後人俗法也此法行於山野貧賤之人經絡受風寒致病者或有效只是溫經通氣而已於血於痰無預也古針法妙甚但今無傳恐不得精高之人誤用之則危拙出頃刻惟灸得穴有益無害日後宜行之愚按針灸之法各有所宜亦各有所禁經曰形氣不足病氣不足此陰陽俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣東垣曰脈浮數而發熱咽乾面赤時渴者皆熱在外也不可灸灸之災害立生由此觀之所禁所宜不可不慎溫針之法尤為乖謬若用之於寒氣之腫八風之邪其庶幾乎問酒飲數杯則手足和軟如無病者醫勸煮酒藥服之何如答酒溫行氣活血故飲少覺好但濕熱之味生痰助火實能增病又此等病多有因酒後毛竅開氣血熱因為寒風涼氣所襲而成惟五加皮一味浸酒日逐服數杯於此病有益諸藥浸酒惟五加皮與酒相合且味美煮酒時入五加皮於內泥之滿月後可服愚按前方祛風活血之藥如不應當求其本而治之此病治法活血行痰開經絡通腠理內固根本外散病邪但今倒倉之後中氣未復宜補中氣理痰為重為先人參亦可用也近日之藥重在理脾理痰故今服四物湯雖多而不應蓋血藥陰寒凝滯且下行故損胃氣胃氣者上升之清氣也又春宜升而久服降藥逆天時矣故云中氣虛而痰易生也愚按經云邪之所湊其氣必虛留而不去其病為實若人脾胃充實營氣健旺經隧流行而邪自無所容今倒倉之後脾氣愈虛法當補中益氣則中氣清和而痰自化若因脾土虛寒或命門火衰者須用八味丸若因腎氣虧損水泛為痰或頭暈口乾者用六味丸一婦人元氣素虛勞則體麻發熱痰氣上攻或用烏藥順氣散祛風化痰丸之類肢體痿軟涎自出面色痿黃形體倦怠而脾肺二脈虛甚此虛而類風也朝用補中益氣湯夕用十全大補湯漸愈又用加味歸脾湯調理尋愈一婦人素性急患肝風之症常服搜風順氣丸秦艽湯之類後大怒吐血唇口牽緊小便頻數或時自乏余以為肝火旺而血妄行遂用小柴胡湯加山梔牡丹皮漸愈後大怒吐血誤服降火祛風化痰之劑大便頻數胸滿少食用清氣化痰之劑嘔而不食頭暈口乾不時吐痰用導痰降火之類痰出如湧四肢常冷余曰嘔而不食頭暈口乾胃氣不能升也痰出如湧脾氣不能攝涎也四肢逆冷脾氣不能運行也用補中益氣湯加茯苓半夏治之諸症漸愈又用加味歸脾湯兼服而安鴻臚王繼之室素有癇症遇勞役及怒氣則發良久自省一日因飲食後勞役失宜發而半日方省不能言語或以為風中於臟用祛風化痰順氣之劑及牛黃清心丸病益甚六脈浮大兩寸虛而不及本部且進飲食余曰此脾胃之氣傷也若風中於臟禍在反掌彼不信仍用風藥後果卒常避涼風寒露霧濕氣身熱四肢汗出或脫衣去靴襪之時莫當風取涼最易感也惱怒尤忌之酒後忌當風見涼脫巾襪後便用手多磨擦令毛竅閉此等病寒月固怕寒風暑月外熱毛竅開尤易感也日後若灸火只灸手足上穴治風症者手上如肩髃曲池合谷等是也口歪斜可灸頰車承漿口面上艾炷須小手足上則可粗也灸火須自上灸下不可先灸下後灸上愚治一婦人口眼歪斜四肢拘急痰涎不利而惡風寒其脈浮緊此風寒客於手足陽明二經先用省風湯二劑後用秦艽升麻湯而愈一婦人體肥胖頭目眩暈肢體麻木腿足痿軟自汗聲重其脈滑數按之沉緩此濕熱乘虛脾氣下流於腎肝之部也用清燥湯羌活湯漸愈更佐以加味逍遙散全愈面上木處可將桂枝為末用牛皮膠和少水化開調敷之厚一二分愚按前症若屬肺氣虛弱者補脾土如不應則補其土母腳底硬木處可將牛皮膠熔化入生薑真汁調和仍入南星末五錢和勻用厚紙攤貼二三分乘半熱裹貼腳底上用溫火烘之此外治法也膠和薑汁方出內經用治痹病謂風寒濕三氣合而成病客於皮膚肌肉之間不知痛癢但不仁如木耳後人治腰硬作痛及手足痹木而兼痛者加入乳香沒藥或加羌活南星末用之多效煎調要得法則如膏藥在手足腰者用熱鞋底尉之愚按經云風寒濕三氣雜至合而為痹風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹丹溪先生云大率因血虛受熱其血已自沸騰或加之以涉水寒濕熱血得寒汙濁凝滯不得運行所以作痛治以辛溫佐以辛涼流散寒濕開通鬱結血行氣順無有不安若因足三陰虧損當補元氣為主敷貼是治皮膚肌肉針灸是治血脈經絡滋血是兼治筋骨筋骨無血則不任矣癱瘓痿軟之病此是無血及兼痰火濕熱耳古人云不可作風治而用風藥謂小續命湯西州續命湯排風湯等藥如羌活防風麻黃桂枝烏頭細辛等劑皆發散風邪開通腠理之藥若誤用之陰血愈燥也愚按前症江南之人所致者多屬陰虛氣虛濕熱相火其癱瘓痿軟多屬手足陽明等經陰虛濕熱治者審之擬治諸方治半身不遂手足欠利語言費力呵欠噴嚏面木口眼歪斜寬弛頭目眩暈痰火熾盛筋骨時痛或頭痛心悸川芎一錢二分當歸生地黃薑汁水炒熟地黃牛膝酒洗橘紅鹽水洗黃芩酒炒酸棗仁炒各八分紅花酒洗甘草炙各四分羌活防風柳桂各六分南星制半夏制白芍藥酒炒白茯苓天麻各一錢白朮一錢五分黃柏酒炒三分上水煎入淡竹瀝薑汁二三茶匙侵晨服四物湯加紅花牛膝共六錢二分補血涼血活血二陳湯加南星白朮黃芩治濕痰風痰火痰再加竹瀝薑汁以行肌表經絡之痰共五錢九分羌活防風天麻柳桂皆行經絡肌表辛溫開發之劑引送血藥流散邪滯柳桂橫行手臂牛膝黃柏行腰腿白朮為君佐以茯苓甘草白芍藥橘紅半夏又以固脾胃之氣血以運行諸藥輸送各經酸棗仁佐川芎當歸羌活入肝治筋骨痠疼濕痹又佐地黃當歸入心治心虛振悸四物湯得羌活防風柳桂南星半夏為佐使則經絡肌表筋骨之血皆補其虛而活其滯矣南星半夏二味雖燥共止二錢羌活防風柳桂雖辛溫三味止一錢四分通共三錢四分溫燥之藥加於血藥六錢二分之內況又有黃芩黃柏甘草苦寒甘寒藥共一錢五分多寡懸絶焉得燥吾之血耶此正君臣佐使分兩多少之法痰之為物遍身上下無處不到故古人用二陳湯通治之隨其所在而用藥引導之今用天麻南星竹瀝薑汁導之入手足經加以白朮黃芩降其膈上之火痰冬寒月減黃芩二三分或加炮川烏二分若用川烏減桂只用一二分風病減去可去川烏桂減南星羌活若素有火黃芩不必減羌活風家要藥若寒涼月重有感冒可加至一錢有汗而惡風此真感風症也可加桂枝六七分病減則減去之川烏桂枝羌活防風南星等藥皆行經絡開發腠理之劑故治風家必用之風能燥故必用滋血潤燥藥邪既客於經絡肌表之中則津液不得流通凝滯而為痰飲故必用治痰風也血也痰也三者相因但各有輕重先後之不同或先因中風則治風為重或先因血虛血熱則治血為重或先因痰則治痰為重愚按五臟之病相乘伏匿隱顯莫測參以徐用誠先生五臟治要尤善詳見一卷或問仲景處方藥品條內張仲景小續命湯是論風也劉張丹溪諸説是論血與痰火也要在隨症推移消息之耳愚按前症多因飲食失節起居失宜虧損元氣腠理不致外邪所侵或勞傷元氣怒動肝火皆屬內因所致也前藥亦當審而用之太宜人年七十五遍身作痛筋骨尤甚不能伸屈口乾目赤頭眩痰湧胸膈不利小便赤澀而短少夜間痰熱殊甚遍身作癢如蟲行此肝經氣燥而風動也用六味地黃丸料加山梔柴胡治之而愈一男子時瘡愈後遍身作痛服愈風丹半身不遂痰涎上湧夜間痛甚余作風客淫氣治以地黃丸而愈一老婦兩臂不遂語言謇澀服祛風之藥筋攣骨痛此因風藥虧損肝血用八珍湯補氣血用地黃丸補腎水乃佐以愈風丹而愈一婦人因怒吐痰胸滿作痛服二陳四物芩連枳殼之類不應更加祛風之劑半身不遂筋攣痿軟日晡益甚內熱口乾形氣殊倦此足三陰虧損之症也余用逍遙散補中益氣六味地黃調治喜其謹疾年餘諸症悉愈形體康健倒倉後脾虛痰盛宜先理中治痰且將風藥血藥減去俟中氣復然後通用白朮白芍藥各一錢半陳皮八分白茯苓人參半夏薑製栝蔞仁各一錢甘草炙黃芩酒炒枳實麩炒各五分香附米鹽水炒桔梗麥門冬麥芽炒各七分黃連薑炒四分上水煎入竹瀝三匙薑汁三匙服若寒月覺胃中冷易泄加炒乾薑一二分愚按前云倒倉後脾虛痰盛矣然而方內芩連栝蔞枳實之類苦寒泄氣克滯之劑雖兼六君子之調補恐所益不償所損雖加乾薑一二分亦恐未能濟其寒也蓋痰之為病有因熱而生痰者亦有因痰而生熱者有因飲食積滯而得者有因腎水虧損津液敗濁而似痰者有因腎水不足陰火上炎而生痰者有因脾肺氣虛不能攝涎而似痰者不能枚舉當各推所因而治之然倒倉之後而痰反盛必因中氣復傷所致故治痰用峻厲之劑而痰愈甚者乃脾氣愈傷津液不能運化而然耳前症當補脾胃調中氣則津液各歸其所而為元氣矣倒倉後大便燥結頭暈眼花未除加當歸身尾桃仁去皮尖各一錢川芎五分山藥一錢愚按前方若因酒面炙爆致痰膠固脾氣無虧者宜用之若因腎氣虧損津液不足者宜用六味丸因脾氣虛弱者宜用六君子湯因中氣虛者宜用補中益氣湯因腎氣虧損水泛上而為痰者宜用六味丸曰脾腎虛寒小水不調肚腹膨脹者宜用金匱腎氣丸儒者王録之素痰甚導吐之後大便燥結頭暈眼花等症尺脈浮大按之則澀此腎氣虛而兼血虛也四物送六味丸四劑諸症悉退仍用前丸月餘而康僉憲高如齋素唾痰服下痰藥痰去甚多大便祕結小便頻數頭暈眼花尺脈浮大按之如無余謂腎家不能納氣歸源前藥復耗金水而甚用加減八味丸料煎服而愈儒者楊文魁素唾痰諸藥不應服牛黃清心丸吐痰甚多或頭暈或熱從脅起左脈洪大有力右脈浮大而無力余曰此足三陰虧損虛火不能歸源用補中益氣加麥門五味及加減八味丸補其化源而愈秋官張碧崖面赤作渴痰盛頭暈此腎虛水泛為痰用地黃丸而愈儀制賀朝卿吞酸胸滿痰盛作瀉飲食少思用清氣化痰等藥前症益甚兩膝漸腫寒熱往來余謂脾胃虛濕熱下注用補中益氣倍參術加茯苓半夏炮薑而愈余甥範允迪咳嗽痰盛胸腹不利飲食少思肢體倦怠脈浮大按之微弱服二陳枳殼等藥愈盛余曰脾肺腎虛也用補中益氣六味丸而愈一婦人吐痰發熱遍身作痛小便頻數陰中作癢日晡熱甚余曰此肝脾血虛氣滯而兼濕熱也用加味逍遙散加車前子而愈一婦人懷抱不舒腹脹少寐飲食素少痰涎上湧月經頻來余曰脾統血而主涎此鬱悶傷脾不能攝血制涎歸源用補中益氣濟生歸脾二湯而愈專治痰加味二陳湯胃氣復後間服理痰橘紅八分半夏薑汁炒白茯苓白朮各一錢二分甘草炙連翹黃芩炒前胡各五分香附米鹽水炒七分栝蔞仁杵桔梗各一錢大麥芽炒一錢上水煎入生薑汁三匙竹瀝兩蜆殼半飢溫服蓋治痰藥亦以脾胃為主愚按前方若因脾土太過營氣壅滯宜用之若因脾土不足營氣虛痞者宜補中氣為主若因肝木乘脾土者宜補脾土為主若脾土虛寒者宜補命門火為主侍御談希曾喘咳吐痰或手足時冷此中氣虛寒用補中益氣炮薑而愈職坊盧抑齋飲食素少忽痰壅氣喘頭搖目札揚手擲足難以候脈視其面色黃中見青此肝木乘脾土如小兒慢驚之症先用六君柴胡升麻而安更以補中益氣加半夏而痊考功楊朴庵嘔吐痰涎胸腹膨脹飲食少思左關脈弦長按之無力右關脈弦長按之微弱此木剋土用六君子加柴胡山梔木香而愈一儒者體肥仲夏患痰喘用二陳芩連桔梗痰喘益甚加桑皮杏仁栝蔞盜汗氣促加貝母枳殼不時發熱飲食漸減脈大而無力余以為脾肺虛寒用八味地黃丸以補土母用補中益氣湯以接中氣而愈一婦人早間吐痰甚多夜間喘急不寐夫早間多痰乃脾虛飲食所化夜間喘急乃肺虛陰火上衝用補中益氣加麥門五味而愈加味化痰丸治痰滿胸膈咽喉不利半夏湯泡七次薑汁水拌滲透橘紅鹽水洗各三兩桔梗海蛤粉另研栝蔞仁另研各一兩香附米淡鹽水炒枳殼麩炒連翹枯黃芩炒各五錢貝母去心炒各一兩訶子皮枯礬各二錢五分上為末煉蜜薑汁為丸如黍米大淡薑湯下四五十丸不可過服恐傷上焦元氣愚按前症若因郁傷脾氣脾血虛損用歸脾湯加炒梔柴胡治之若因怒動肝火脾土受克用六君子加炒梔柴胡平之若因飲食傷脾營氣虛弱用六君子湯調之若因勞傷元氣用補中益氣湯主之東垣先生云胃為五臟之根本胃氣益虛脾無所稟五臟皆虛諸症蜂起矣二守陳子忠飲食少思吐痰口乾常服二陳枳實黃連之類脾胃受傷乃問於余余述東垣先生曰脾胃之症實則枳實黃連瀉之虛則白朮陳皮補之彼遂以二味等分為丸常服由是多食而不傷過時而不飢徽州汪商常服二陳枳實黃連青皮厚朴胸腹快利後患腹脹請治脈已脫余曰至暮必歿已而果然故內經千言萬語只在人有胃氣則生又曰四時皆以胃氣為本凡脈促代屋漏之類或暴脫余急用參附等藥多有復生者
