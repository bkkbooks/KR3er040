body:
  text: 卷之一醫論仲景東垣河間丹溪諸書孰優或問仲景東垣河間丹溪諸書孰優學之宜何主曰宜專主內經而博觀乎四子斯無弊矣蓋醫之有內經猶儒道之六經無所不備四子之說則猶學庸語孟為六經之階梯不可缺一者也四子之書初無優劣但各發明一義耳仲景見內經載傷寒而其變遷反復之未備也故著論立方以盡其變後人宗之傳用既久漸失其真用以通治溫暑內傷諸症遂致誤人故河間出而始發明治溫暑之法東垣出而始發明治內傷之法河間之論即內經五運六氣之旨東垣之說即內經飲食勞倦之義仲景非不知溫暑與內傷也特其著書未之及河間東垣之於傷寒則尊用仲景而莫敢違矣至於丹溪出而又集諸儒之大成發明陰虛發熱類乎外感內傷及濕熱相火為病甚多隨症著論亦不過闡內經之要旨補前賢之未備耳故曰外感法仲景內傷法東垣熱病用河間雜病用丹溪一以貫之斯醫道之大全矣處方藥品多少論或問仲景處方藥品甚少及東垣用藥多至二十餘味丹溪云余每治病用東垣之藥效仲景處方庶品味數少則藥力專精丹溪何以不法東垣而效仲景耶曰明察藥性莫如東垣蓋所謂聖於醫者也故在東垣則可多他人而效其多斯亂雜矣東垣如韓信將兵多多益善丹溪不過能將十萬故不敢效其多愚按經云治病必求其本本於四時五臟之根也故潔古張先生云五臟子母虛實鬼邪微正若不達其旨意不易得而入焉徐用誠先生云凡心臟得病必先調其肝腎二臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏此心病先求於肝清其源也五臟受病必傳其所勝水能勝火則腎之受邪必傳於心故先治其腎逐其邪也故有退腎邪益肝氣兩方或診其脈肝腎兩臟俱和而心自主疾然後察其心家虛實治之余仿此詳見玉機微義小兒部異法方宜論或問人言東南氣熱可服寒藥西北氣寒可服溫藥然今東南之人常服胡椒薑桂不見生病而西北之人畏食椒姜辛熱之物何也曰東南雖熱然地卑多濕辛熱食藥亦能劫濕西北雖寒然地高多燥辛熱食藥卻能助燥故耳治病用藥者須識此意愚按異法方宜論云東南之域下卑濕熱其人腠理疏通汗液妄泄陽氣內虛故宜食椒姜辛熱之物以助其陽也西北之域高陵風寒其人腠理致密汗液內固陽氣充實不宜食椒姜辛熱之物反蓋其陽也東坡先生仕黃州其民疫癘流行先生以聖散子治之其功甚效是其地卑濕四時鬱熱腠理疏通汗液妄泄陽氣虛寒是以相宜西北疫癘民用之死者接踵此余之目擊也丹溪治病不出乎氣血痰鬱丹溪先生治病不出乎氣血痰故用藥之要有三氣用四君子湯血用四物湯痰用二陳湯又云久病屬郁立治郁之方曰越鞠丸蓋氣血痰三病多有兼郁者或郁久而生病或病久而生郁或誤藥雜亂而成郁故余每用此方治病時以郁法參之氣病兼郁則用四君子加開鬱藥血病痰病皆然故四法者治病用藥之大要也丹溪又云近世治病多不知分氣血但見虛病便用參耆屬氣虛者固宜矣若是血虛豈不助氣而反耗陰血耶是謂血病治氣則血愈虛耗甚而至於氣血俱虛故治病用藥須要分別氣血明白不可混淆愚按經云脾胃為氣血之本若陽氣虛弱而不能生陰血者宜用六君子湯陽氣虛寒而不能生陰血者亦用前湯加炮姜若胃土燥熱而不能生陰血者宜用四物湯若脾胃虛寒而不能生陰血者宜用八味丸其餘當更推五臟互相生克而調補之一儒者每勞役則食少胸痞發熱頭痛吐痰作渴脈浮大余謂此脾胃氣虛而血病也不信服二陳四物黃柏知母之類腹痛作嘔脈洪數而無倫次先以六君子湯加炮姜痛嘔漸愈又用補中益氣湯而痊一儒者素勤苦因飲食失節大便下血或赤或黯後非便血則盜汗非惡寒則發熱六脈浮大心脾則澀此思傷心脾不能攝血歸源也蓋血即汗汗即血其色赤黯便血盜汗皆火之升降微牛黃抱龍丸治風痰壅盛或咳嗽發熱或發驚搐等症牛黃雄黃辰砂天竺黃各四錢麝香一錢牛膽南星上為末甘草湯糊丸皂子大每服二丸薑湯下柴芍參苓散治脾胃不和飲食少進或嘔吐泄瀉凡病後宜用此調理柴胡芍藥人參白朮茯苓陳皮當歸各五分甘草丹皮山梔炒各三分上為末每服一錢白湯下或作丸服五味子湯治咳嗽皮膚乾燥唾中有血胸膈疼痛等症五味子炒桔梗炒紫菀甘草炒續斷各五分竹茹一錢赤小豆一撮生地黃二錢桑白皮炒二錢上水煎服人參平肺散治心火克肺咳嗽喘嘔痰涎壅盛胸膈痞滿上為末每二錢空心小麥湯調下姜附赤石脂硃砂丹治小便數而不禁怔忡多忘魘夢不已下元虛冷遺尿精滑或陽虛精漏不止或腎氣虛寒脾泄腎泄等症附子生乾薑各半兩赤石脂一兩半水飛上為細末酒糊丸綠豆大每十五至二三十丸大便不和米飲下小便不禁茯苓湯下茯苓丸治心腎俱虛神志不守小便淋瀝不禁或赤或濁或不利並宜服之赤茯苓白茯苓等分上為末以新汲水挪洗澄去新沫控干別取熟地黃汁與好酒同於銀石器內熬成膏搜和丸彈子大空心鹽酒嚼下一丸人參救肺散治咳血吐血等症升麻一錢柴胡一錢當歸尾二錢熟地黃二錢白芍藥一錢蘇木半錢黃耆二錢人參二錢甘草半錢蒼朮一錢陳皮五分上每服五錢水二盞煎至一盞去渣食前溫服麥門冬飲子治吐血久不愈或肺氣虛短氣不足以息要須識此吾妻嘗胎漏忽日血大崩遂暈去服童便而醒少頃復暈急煎服荊芥隨醒隨暈服止血止暈之藥不效忽然嘔吐予以童便藥汁滿於胸膈也即以手探吐之少間吐出米飯及齏菜碗許詢問其由適方午飯後著惱故即崩而不止予悟曰因方飽食胃氣不行故崩甚血既大崩胃氣益虛而不能運化宜乎服藥而無效也急宜調理脾胃遂用白朮五錢陳皮麥芽各二錢煎服之服未半而暈止再服而崩止遂專理脾胃服十數劑胃氣始還然後加血藥服之而安若不審知食滯而專用血崩血暈之藥豈不誤哉愚按人以脾胃為本納五穀化精液其清者入榮濁者入胃陰陽得此是謂之橐籥故陽則發於四肢陰則行於五臟土旺於四時善載乎萬物人得土以養百骸身失土以枯四肢東垣以飲食自傷醫多妄下清氣下陷濁氣不降乃生䐜脹所以胃脘之陽不能升舉其氣陷入中焦當用補中益氣使濁氣得降不治自安竊謂飽食致崩者因傷脾氣下陷於腎與相火協合濕熱下迫而致宜用甘溫之劑調補脾氣則血自歸經而止矣若誤用寒涼復損胃氣則血無所羈而欲其止不亦難哉大凡脾胃虛弱而不能攝血宜調補脾氣為主一婦人崩漏面黃或赤時覺腹間臍下痛四肢困倦煩熱不安其經行先發寒熱兩肋如束此脾胃虧損元氣下陷與相火濕熱下迫所致用補中益氣湯加防風芍藥炒黑黃柏煎服歸脾湯而愈產後發熱凡婦人產後陰血虛陽無所依而浮散於外故多發熱治法用四物湯補陰血而以炙乾姜之苦溫從治收其浮散使歸依於陰然產後脾胃虛多有過於飲食傷滯而發熱者誤作血虛則不效矣但遇產後發熱若胸膈飽悶噯氣惡食泄瀉等症只作傷食治之若發熱而飲食自調者方用補血正法愚按新產陰血暴傷陽無所附而外熱宜用四物炮姜補陰以配陽若因誤服寒涼克伐之劑而外熱此為寒氣隔陽於外宜用四君子加薑桂如不應急加附子若或肌膚髮熱面目赤色煩渴引飲此血脫髮躁宜用當歸補血湯若胸膈飽悶噯腐惡食或吞酸吐瀉發熱此為飲食停滯宜用四君子加厚朴山楂若胸膈飽悶食少發熱或食而難化此為脾氣虛弱宜用六君子加炮姜若用峻厲之劑腹痛熱渴寒熱嘔吐等症此為中氣復傷急用六君子加炮姜若認為熱投以他劑則誤矣傷寒時氣病後調養凡傷寒時氣大病熱退之後先服參耆甘溫之藥一二服以扶元氣隨後便服滋陰生津潤燥之藥蓋大病後汗液外耗水穀內竭必有小便赤澀大便秘結等症須識此意預防之愚按大病後谷消水去精散衛亡多致便利枯竭宜當補中益氣為要蓋脾為中州澆灌四傍為胃行其津液者也況大腸主津小腸主液亦皆稟氣於胃胃氣一充津液自行矣燥甚者別當以辛潤之以苦泄之泄瀉凡泄瀉病誤服參耆等甘溫之藥則病不能愈而或變為黃疸蓋泄屬濕甘溫之藥能生濕熱故反助病邪久則濕熱甚而為疸矣惟用苦寒瀉濕熱苦溫除濕寒則愈泄止後脾胃虛弱方可用參耆等藥以補之愚嘗治少宰李蒲汀庚寅冬濕熱泄瀉因未生子惑於人言淡滲之劑能瀉腎而服參耆等藥後變黃疸小便不利腹脹胸痞余曰有是病必用是藥須以淡滲疏導其濕熱遂用茵陳五苓散諸症頓退至辛卯冬生子勞熱南方人稱發熱為勞發蓋謂勞苦而發熱即東垣內傷之旨也此病輕者一二發自愈重者用東垣法補之甚則加熟附子若因勞力辛苦而發熱切不可誤作外感輕易發汗也愚按內傷發熱者因飲食過時勞役過度而損耗元氣陰火得以乘其土位故翕翕然而發熱宜用補中益氣湯以升其陽若因勞力辛苦入房不節虧損精血虛火妄動而發熱者宜用六味地黃丸以補其陰不可認作有餘之火而用黃柏知母之類也飲食勞倦東垣論飲食勞倦為內傷不足之證治用補中益氣湯溯洄集中又論不足之中又當分別飲食傷為有餘勞倦傷為不足予謂傷飲食而留積不化以致宿食鬱熱熱發於外此為有餘之症法當消導東垣自有枳朮丸等治法具於飲食門矣其補中益氣方論卻謂人因傷飢失飽致損脾胃非有積滯者也故只宜用補藥蓋脾胃全賴飲食之養今因飢飽不時失其所養則脾胃虛矣又脾主四肢若勞力辛苦傷其四肢則根本竭矣或專因飲食不調或專因勞力過度或飲食不調之後加之勞力或勞力過度之後繼以不調故皆謂之內傷元氣不足之症而宜用補藥也但須於此四者之間審察明白為略加減則無不效矣愚按飲食勞倦頗同而理異也王安道先生曰勞倦傷飲食傷二者雖俱為內傷不可混而為一夫飲食受傷而留滯不化則有餘矣有餘者瀉之傷飢失飽致損脾胃非有積滯則不足矣不足者補之如東垣枳朮丸之類雖曰消導固有補益於其間然亦施於不甚傷者耳原非以為通行之藥也蓋停滯之物非枳朮丸之力所能去者若泥於消導而弗知變則不善用前人之意矣內傷發熱內傷發熱是陽氣自傷不能升達降下陰分而為內熱乃陽虛也故其脈大而無力屬肺脾陰虛發熱是陰血自傷不能制火陽氣升騰而為內熱乃陽旺也故其脈數而無力屬心腎經曰脈大而無力為陽虛脈數而無力為陰虛無力為虛有力為實愚按陽虛發熱者宜用補中益氣湯以升補陽氣陰虛發熱者宜用六味地黃丸以培補陰血總論二症雖有陰陽氣血之分實則皆因脾胃陽氣不足所致其發熱屬形病俱虛余故禁服黃柏知母恐復傷陽氣耳閣老李序庵有門生饋坎離丸喜而服之余曰前丸乃黃柏知母恐非所宜服者內經有云壯火食氣少火生氣今公之肝腎二脈數而無力宜滋其化源不宜瀉火傷氣也不信服將兩月脾氣漸弱發熱愈甚小便澀滯兩拗腫痛公以為瘡毒余曰此肝腎二經虧損虛火所致耳當滋補二經為善遂朝用補中益氣湯夕用六味地黃丸諸症悉愈余見脾胃素弱肝腎陰虛而發熱者悉服十味固本丸與黃柏知母之類反泄真陽令人無子可不慎哉傷寒發熱傷寒發熱是寒邪入衛與陽氣交爭而為外熱陽氣主外為寒所傷而失其職故為熱其脈緊而有力是外之寒邪傷衛也治主外愚按前症反復變遷若治失其宜命在反掌蓋寒邪自表入里治法雖有三陽之異然不可拘泥日數亦有其邪終止於一經而不傳他經者嘗治陳湖一男子患傷寒仰臥一月且耳聾余意其病尚在少陽故脅痛不能轉側及耳聾也與小柴胡湯加山梔一劑即能轉側尾閭處內潰皆蛆耳亦有聞蓋少陽屬風木而風木能生蟲也其在少陽明矣傷暑發熱傷暑發熱是火邪傷心元氣耗散而邪熱入客於中故發為熱汗大泄無氣以動其脈虛遲而無力是外之熱邪傷榮也治主內愚按夏月陽氣浮於外陰氣伏於內法當調補陽氣為主而佐以解暑此推內經舍時從症之良法也故前症當究其所因而治之不可泛用香薷飲之類走散陽氣導損真陰而益其病也又有夏間用薄荷煎湯以代茶殊不知散人之真氣即久用川芎湯令人暴死之類也詳見後病有感傷中病有感有傷有中感者在皮毛為輕傷者兼肌肉稍重中者屬臟腑最重寒有感寒傷寒中寒風有感風傷風中風暑有感暑傷暑中暑當分輕重表裡治各不同又如中濕中氣中毒皆雲中中者中也謂邪直入於中也故為重病心腹疼痛凡治心腹疼痛但是新病須問曾何飲食因何傷感有無積滯便與和中消導之藥若日數已多曾多服過辛溫燥熱之藥嘔吐不納胸膈飽悶口舌乾燥大小便澀雖則內有鬱熱或原有舊病因感而發綿延日久見證如前者俱用開鬱行氣降火潤燥之藥如川芎香附炒山梔黃連薑汁之類甚者再加芒硝但治心腹久痛須於溫散藥內加苦寒鹹寒之藥溫治其標寒治其本也愚按腹痛若脾胃虛弱飲食不化或兼腹中作痛用六君子湯若飲食過多停滯未化或兼腹痛用人參養胃湯若飲食既化脾胃受傷或兼腹中作痛用六君子加當歸若胃中有熱心腹中脘作痛嘔吐用二陳湯加黃連山梔若脾胃虛弱少食心腹作痛用六君子湯脾胃虛寒亦用前湯加炮姜大凡腹滿痛按之不痛為虛痛者為實余當臨症制宜副郎李孟卿常患腹痛每治以補中益氣加山梔即愈一日因怒腹痛脈弦緊以前湯吞左金丸三十粒而愈一婦人心腹痛諸藥不應余用炒黑山梔桔梗治之而愈儒者沈尼文內停飲食外感風寒頭痛發熱噁心腹痛用人參養胃湯加芎芷曲蘖香附桔梗一劑諸症悉退次日腹痛甚可畏喜手按痛即止此脾氣虛弱客寒乘之而作是內虛寒而外假熱也用香砂六君子加木香炮姜服之痛減六七又以前藥去二香一鍾而愈府庠徐道夫母胃脘當心痛劇右寸關俱無左雖有微而似絕手足厥冷病勢危篤察其色眼胞上下青黯此脾虛肝木所勝用參朮茯苓陳皮甘草補其中氣用木香和胃氣以行肝氣用吳茱萸散脾胃之寒止心腹之痛急與一劑俟滾先服煎熟再進諸病悉愈病時靜心息慮昔人有云我但臥病即於胸前不時手寫死字則百般思慮俱息此心便得安靜勝於服藥此真無上妙方也蓋病而不慎則死必至達此理者必能清心克己凡百謹慎而病可獲痊否則雖有良藥無救也世人遇病而猶恣情任性以自戕賊者是固不知畏死者矣又有一等明知畏死而怕人知覺諱而不言或病已重而猶強作輕淺態度以欺人者斯又知畏死而反以取死尤可笑哉愚按心之官則思而脾則主于思病者有思則心火妄動而五火翕然隨之脾氣益傷諸臟仍病故書死字以自譬則百慮息而天君泰然雖有疾病勿藥自愈矣故古人謂諱疾忌醫驕恣不論於理之類為不治之疾有由然矣發熱論世間發熱症類傷寒者數種治各不同外感內傷乃大關鍵張仲景論傷寒傷風此外感也因風寒之邪感於外自表入里故宜發表以解散之此麻黃桂枝之義也以其感於冬春之時寒冷之月即時發病故謂之傷寒而藥用辛熱以勝寒若時非寒冷則藥當有變矣如春溫之月則當變以辛涼之藥如夏暑之月則當變以甘苦寒之藥故云冬傷寒不即病至春變溫至夏變熱而其治法必因時而有異也又有一種冬溫之病謂之非其時而有其氣蓋冬寒時也而反病溫焉此天時不正陽氣反泄用藥不可溫熱又有一種時行寒疫卻在溫暖之時時行溫暖而寒反為病此亦天時不正陰氣反逆用藥不可寒涼又有一種天行溫疫熱病多發於春夏之間沿門闔境相同者此天地之癘氣當隨時令參氣運而施治宜用劉河間辛涼甘苦寒之藥以清熱解毒以上諸症皆外感天地之邪者若夫飲食勞倦為內傷元氣此則真陽下陷內生虛熱故東垣發補中益氣之論用人參黃耆等甘溫之藥大補其氣而提其下陷此用氣藥以補氣之不足者也又若勞心好色內傷真陰陰血既傷則陽氣偏勝而變為火矣是謂陰虛火旺勞瘵之症故丹溪發陽有餘陰不足之論用四物加黃柏知母補其陰而火自降此用血藥以補血之不足者也益氣補陰皆內傷症也一則因陽氣之下陷而補其氣以升提之一則因陽火之上升而滋其陰以降下之一升一降迥然不同矣又有夏月傷暑之病雖屬外感卻類內傷與傷寒大異蓋寒傷形寒邪客表有餘之症故宜汗之暑傷氣元氣為熱所傷而耗散不足之症故宜補之東垣所謂清暑益氣者是也又有因時暑熱而過食冷物以傷其內或過取涼風以傷其外此則非暑傷人乃因暑而自致之之病治宜辛熱解表或辛溫理中之藥卻與傷寒治法相類者也凡此數症外形相似而實有不同治法多端而不可或謬故必審其果為傷寒傷風及寒疫也則用仲景法果為溫病及瘟疫也則用河間法果為氣虛也則用東垣法果為陰虛也則用丹溪法如是則庶無差誤以害人矣今人但見發熱之證一皆認作傷寒外感率用汗藥以發其表汗後不解又用表藥以涼其肌設是虛證豈不死哉間有頗知發熱屬虛而用補藥則又不知氣血之分或氣病而補血或血病而補氣誤人多矣故外感之與內傷寒病之與熱病氣虛之與血虛如冰炭相反治之若差則輕病必重重病必死矣可不畏哉凡酒色過度損傷脾腎真陰咳嗽吐痰衄血吐血咳血咯血等症誤服參耆等甘溫之藥則病日增服之過多則不可治蓋甘溫助氣氣屬陽陽旺則陰愈消前項病症乃陰血虛而陽火旺宜服苦甘寒之藥以生血降火世人不識往往服參耆以為補予見服此而死者多矣愚按前論治驗見於各類補陰丸論人之一身陰常不足陽常有餘況節欲者少過欲者多精血既虧相火必旺火旺則陰愈消而勞瘵咳嗽咯血吐血等症作矣故宜常補其陰使陰與陽齊則水能制火而水升火降斯無病矣故丹溪先生髮明補陰之說謂專補左尺腎水也古方滋補藥皆兼補右尺相火不知左尺原虛右尺原旺若左右平補依舊火勝於水只補其左制其右庶得水火相平也右尺相火固不可衰若果相火衰者方宜補火但世之人火旺致病者十居八九火衰成疾者百無二三且少年腎水正旺似不必補然欲心正熾妄用太過至於中年欲心雖減然少年所喪既多焉得復實及至老年天真漸絕只有孤陽故補陰之藥自少至老不可缺也丹溪先生髮明先聖之旨以正千載之訛其功盛哉今立補陰丸方備加減法於後黃柏去皮酒拌炒褐色知母去皮毛酒拌炒忌鐵敗龜板酥炙透各三兩鎖陽酥炙乾枸杞子各二兩熟地黃酒拌蒸忌鐵五兩五味子一兩白芍藥酒炒天門冬去心各二兩乾薑炒紫色三錢寒月加至五錢上為末入煉蜜及豬脊髓三條和藥末杵勻丸桐子大每服八九十丸空心淡鹽湯送下寒月可用溫酒下愚按前症設若腎經陰精不足陽無所化虛火妄動以致前症者宜用六味地黃丸補之使陰旺則陽化若腎經陽氣燥熱陰無以生虛火內動而致前症者宜用八味地黃丸補之使陽旺則陰生若脾肺虛不能生腎陰陽俱虛而致前症者宜用補中益氣湯六味地黃丸培補元氣以滋腎水若陰陽絡傷血隨氣泛行而患諸血症者宜用四君子加當歸純補脾氣以攝血歸經太僕先生云大寒而盛熱之不熱是無火也大熱而盛寒之不寒是無水也又云倏忽往來時發時止是無水也晝見夜伏夜見晝止不時而動是無火也當求其屬而主之無火者宜益火之源以消陰翳無水者宜壯水之主以鎮陽光不可泥用沉寒之劑若有夢遺精滑病者加牡蠣童便煅白朮各一兩山茱萸肉椿根白皮炒各七錢若有赤白濁病者加白朮白茯苓各一兩半山梔仁黃連炒各五錢愚按前症屬足三陰虧損所致蓋腎主閉藏肝主疏泄若肝腎虛熱者用四物加柴胡山梔山茱萸山藥脾胃氣虛者用補中益氣加山茱山藥思慮傷脾者兼用歸脾湯和山茱山藥肝腎虧損者六味丸真陽虛敗八味丸心腎不交用萆薢分清飲心氣虛熱者清心蓮子飲朱工部素陰虛勞則遺精齒痛用補中益氣湯加半夏茯苓芍藥山茱山藥治之少愈更以十全大補加五味麥冬悉愈一儒者患此兼腳跟作痛口乾作渴大便乾燥午後熱甚用補中益氣加芍藥玄參並加減八味丸而愈若腳軟弱無力者加牛膝酒洗二兩虎脛骨酥炙透一兩防己酒洗木瓜各五錢愚按前症多因足三陰虛虧損若脾腎不足而無力者用還少丹肝腎虛熱而足無力者用六味丸如不應急用八味丸大尹徐克明因飲食失宜日晡發熱口乾體倦小便赤澀兩腿痠疼彼知醫自用四物黃柏知母之劑反頭眩目赤耳鳴唇燥寒熱痰湧大便熱痛小便赤澀又用四物芩連枳實之類胸膈痞滿飲食少思汗出如水再用二陳芩連黃柏知母麥門五味言語譫妄兩手舉拂余謂汗多亡陽神無所依用參耆各五錢歸術各三錢遠志茯神酸棗仁炙草各一錢服之熟睡良久四劑稍安又用八珍湯調補而愈一儒者因累婚腳軟痛面黑食減惡寒足腫小腹脹痛上氣痰喘余以為少陰虧損陽氣虛寒之症用八味丸料煎服諸症頓除又服丸劑半載元氣漸充形體如故一婦人發熱口乾月經不調半載後兩腿無力服祛風散濕之劑腿益腫痛體更倦怠經事不通余作肝脾腎虛寒用六味八味二丸兼服兩月諸症漸愈若有疝氣病者加蒼朮鹽水炒一兩半黃連薑汁炒山梔炒各六錢川芎一兩吳茱炒青皮去瓤各五錢愚按疝症專主肝經者多如運氣或在泉寒勝木氣攣縮禁於此經或司天燥勝木氣抑鬱於此經或忿怒悲哀憂抑頓挫結於此經或藥淋外固閉尾縮精壅於此經其病差別如此且夫遺溺閉癃陰痿脬痹精滑白淫皆男子之疝也不可妄歸之腎冷血涸不月月罷腰膝上熱足躄嗌乾癃閉少腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而為之瘕若年少而得之不計男子婦人皆無子故隱蔽委曲之事了不幹脬腎小腸之事乃足厥陰之症也竊謂前症若因肝經濕熱當用炒山梔茯苓黃柏澤瀉川芎當歸吳茱萸黃連山楂若肝腎二經濕熱當用六味地黃丸料加柴胡山梔若肝脾二經陰虛濕熱宜補中益氣加炒山梔炒黑黃連吳茱萸蓋疝名有七形症所因不同治法亦異當詳玉機微義若脾氣虛弱畏寒易泄者加白朮三兩陳皮一兩乾薑炒加至七錢愚按前症亦有脾胃虛弱有脾胃虛寒有命門火衰者脾胃虛弱畏寒易泄者用六君子加補骨脂肉豆蔻治之脾胃虛寒畏寒易泄者用六君子肉果木香調之命門火衰不能生脾土者用八味丸補之沈大尹每五更即泄余以為腎泄用五味子散數服而愈後不慎起居不節飲食其泄復作日夜無度畏寒飲食且難消化肌體日瘦余曰乃變火衰之症也遂與八味丸瀉止食進若眼目昏暗者加當歸酒洗川芎菊花各一兩柴胡黃連酒炒烏犀角各五錢蔓荊子防風各三錢愚按目者五臟之華上榮於目得氣血之精者若昏暗或有黑花皆腎經不足也用滋陰腎氣丸若視物散大或見非常之狀者皆陰血虛弱也用茲陰地黃丸若兩目昏暗四肢倦怠者乃脾虛五臟之精不能上騰用東垣益氣聰明湯若兩目緊小羞明畏日或視物無力肢體倦怠或頭面麻木者乃脾肺之氣虛不能上行也用東垣神效黃耆湯若病後或日晡或燈下不能觀物者乃陽虛下陷陰盛故也用決明夜光丸或鎮陰升陽湯若兼氣虛之人加人參黃耆蜜炙各二兩若左尺既虛右尺亦微命門火衰陽事不舉加黑附子小便浸炮去皮肉桂去皮各七錢沉香五錢愚按前症果左尺脈虛宜用六味地黃丸以滋水之源若右尺脈虛宜用八味地黃丸以益火之主勞瘵男子二十前後色欲過度損傷精血必生陰虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎帶血咯吐出血或咳血吐血衄血身熱脈沉數肌肉消瘦此名勞瘵最重難治輕者必用藥數十服重者期以歲年然必須病人愛命堅心定志絕房室息妄想戒惱怒節飲食以自培其根否則雖服良藥亦無用也此病治之於早則易若到肌肉銷鑠沉困著床沉伏細數則難為矣又此病大忌服人參若曾服過多者亦難治今制一方於後治色欲證先見潮熱盜汗咳嗽倦怠趁早服之生地黃酒洗甘草炙乾薑炮各五分川芎熟地各一錢白芍藥炒一錢三分陳皮七分當歸白朮各一錢三分黃柏蜜水浸炙七分知母蜜水浸拌炒天門冬去心皮各一錢生薑三片水煎空心溫服愚按前方治火盛陰虛之法也大抵此症屬足三陰虧損虛熱無火之症故晝發夜止夜發晝止不時而作當用六味地黃丸為主以補中益氣湯調補脾胃若脾胃先損者當以補中益氣為主以六味地黃丸溫存肝腎多有得生者若誤用黃柏知母之類則復傷脾胃飲食日少諸臟愈虛元氣下陷腹痞作瀉則不可救矣夫衄血吐血之類因虛火妄動血隨火而泛行或陽氣虛不能攝血歸經而妄行其脈弦洪乃無根之火浮於外也大抵此症多因四五六月為火土大旺金水衰涸之際不行獨宿淡味保養二臟及十一二月火氣潛藏不遠幃幕戕賊真元故至春末夏初患頭疼腳軟食少體熱注夏之病或少有老態不耐寒暑不勝勞役四時迭病皆因氣血方長而勞心虧損或精血未滿而早斫喪故其見症難以名狀若左尺脈虛弱或細數是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絕是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛也十補丸此皆滋其化源也仍參前發熱及後咳嗽諸症治法用之州同韓用之色欲過度煩熱作渴飲水不絕小便淋瀝大便秘結唾痰如湧面目俱赤滿舌生刺兩唇燥裂遍身發熱或身如芒刺而無定處兩足心如烙左三部脈洪而無倫此腎陰虛陽無所附而發於外蓋大熱而甚寒之不寒是無水也當峻補其陰遂以加減八味丸料一斤內肉桂用一兩以水頓煎六碗冰冷與飲半餉熟睡至晚又溫飲一碗諸症悉退翌日畏寒足冷至膝諸症仍至是無火也當補其陽急以八味丸四劑諸症頓退舉人陳履賢色欲過度孟冬發熱無時飲水不絕痰涎上湧遺精不止小便淋瀝或用四物二陳之類胸膈不利飲食少思大便不實余朝用四君子湯加熟地當歸夕用加減八味丸更以附子唾津調搽湧泉穴漸愈詳見內科摘要府庠王以道元氣素弱丙午丁未二年以科場歲考積勞致疾至十二月間其病盛作大熱淚出隨凝目赤面黯揚手露胸氣息沉沉幾絕脈洪大鼓指按之如無舌乾捫之如刺此內真寒而外假熱也遂先服十全大補湯余曰既服此湯其脈當收斂為善少頃熟睡覺而惡寒增衣脈頓微細如絲此虛寒之真象也余以人參一兩加熟附三錢水煎頓服而安夜間脈復脫余以參二兩熟附五錢仍愈後以大劑參朮歸身炙甘草等藥調理而安上藥此敬臣所親試者雖昏瞶中固知必此藥然後可治必立齋然後能識此病能用此藥因尊信服之卒致痊愈向使誤投寒涼之劑能不殆哉今留餘生皆立翁所賜也感激之餘因附數語於藥案之末以告世之患者一男子吐血遇勞即作余以為勞傷肺氣血不歸源與補中益氣加麥門五味山藥熟地茯神遠志服之而愈一男子咳嗽吐血熱渴痰盛盜汗遺精余以為腎水虧損用地黃丸料加麥門五味以壯水而愈後因勞怒忽紫血成塊上湧先用花蕊石以化之又用獨參湯以補之仍用前藥調理遂愈後每勞則咳嗽有痰吐血脾肺腎三脈皆洪數用補中益氣加貝母茯苓山茱山藥麥門五味與前藥間服而愈一星士談命良久不時吐血一二口余謂此勞傷肺氣與補中益氣湯加麥門五味山藥熟地茯神遠志服之而愈一童子年十四歲發熱吐血余謂宜補中益氣以滋化源不信乃用寒涼降火前症愈甚或謂曰童子未室何腎虛之有參耆補氣奚為用之余述丹溪先生云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則相火翕然而起雖不交會而其精亦已暗耗矣又褚氏精血篇云男子精未滿而御女以通其精則五臟有不滿之處異日有難狀之疾正此謂也遂用補中益氣湯及地黃丸而痊一婦人素勤苦冬初咳嗽吐痰發熱久而吐血盜汗經水兩月或三月一至遍身作痛或用清熱化痰等藥口噤筋攣余用加減八味丸及補中益氣加麥門五味山藥治之年餘而痊一婦人年將七十素有肝脾之症每作則飲食不進或胸膈不利或中脘作痛或大便作瀉或小便不利余用逍遙散加山梔茯神遠志木香而愈後因憂思吐紫血成塊每作先倦怠後煩熱以前藥加炒黑黃連三分吳茱萸二分頓愈復因怒吐多色赤躁渴垂死乃用人參一兩白朮白茯苓當歸各三錢陳皮炮黑乾薑各二錢炙甘草木香各一錢一劑頓止若咳嗽盛加桑白皮馬兜鈴栝蔞仁各七錢五味子十粒若痰盛加薑製半夏貝母栝蔞仁各一錢愚按前二症腎氣虛弱火盛水涸津液湧而為痰者用六味丸腎經陽氣虛憊者用八味丸脾肺氣虛不能攝涎歸源而痰盛咳嗽者用六君子湯加桔梗虛寒者更加炮姜若潮熱盛加桑白皮沙參地骨皮各七分愚按前症若寅卯辰時潮熱者肝經燥熱也用六味丸補腎水以生肝血若午未時潮熱者心經虛熱也用六味丸壯水之主以制陽光申酉戌時潮熱者肺經虛熱也用補中益氣湯培脾土以生肺金亥子丑時潮熱者腎涸虛熱也用六味丸兼手足逆冷者腎經虛敗也用六味丸大凡潮熱發熱晡熱者五臟齊損也須用六味丸氣血虧損者須用十全大補湯若夢遺精滑加蠣龍骨山茱萸各七分愚按前症若腎氣不足用益志湯金鎖正元丹肝腎虛熱者用六味丸加味逍遙散脾虛熱者用六味丸補中益氣湯凡此悉屬不足之症宜用十全大補湯或用萆薢分清飲送八味丸若盜汗多加牡蠣酸棗仁各七分浮小麥一撮愚按前症若陽氣虛弱汗出不止肢體倦怠用耆附湯上氣喘急盜汗氣短頭暈者用參附湯腎氣虛弱盜汗發熱者用六味丸若腎氣虛乏盜汗惡寒者用八味丸氣血俱虛而盜汗者用十全大補湯陽盛陰虛者當歸六黃湯心腎虛弱者斑龍丸若赤白濁加白茯苓一錢黃連三分炒愚按前症若脾肺虛熱者用補中益氣湯送六味丸肺腎虛熱者用黃芩清肺飲送六味丸肝腎虛熱者加味逍遙散送六味丸勞傷心腎者清心蓮子飲鬱結傷脾者歸脾湯若鬱怒傷肝脾者加味逍遙散若心腎虛弱者小溫金散若思慮傷心腎者茯菟丸夢遺精滑赤白二濁治法當互參用之一男子年逾二十早於斫喪夢遺精滑睡中盜汗唾痰見血足熱痿軟服黃柏知母之類余曰此陽虛而陰弱也當滋其化源不信恪服之前症益甚其頭漸大囪門漸開視物皆大吐痰叫喊余以如法調補諸症漸退頭囪漸斂而安若兼衄血咳血出於肺也加桑白皮一錢黃芩山梔各五分炒若兼嗽血痰血出於脾也加桑白皮貝母黃連栝蔞仁各七分若兼嘔吐血出於胃也加山梔黃連乾薑蒲黃各一錢韭汁半盞薑汁少許若兼咯唾血出於腎也加桔梗玄參側柏葉炒各一錢愚按前方惟上古之人形病俱實者宜用之今之患者多屬形病俱虛治者當求其屬而主之若前症鬱熱傷肺而衄血者用黃耆益氣湯肺氣虛熱不能攝血而衄者用四君子加芎歸五味子鬱結傷脾而嗽吐血者用歸脾湯胃經有熱而嗽吐血者用犀角地黃湯胃氣弱而嗽吐血者用四君子加芎歸升麻腎經虛熱陰火內動而咯吐血用六味丸補中益氣湯怒動肝火而見血者用加味逍遙散腎涸肝火動而見血者用六味丸雖曰血得熱而錯經妄行亦有衛氣虛不能統攝榮血而為妄行者不可不察以上諸症皆屬足三陰虧損虛火內動所作非外因所致皆宜六味丸補中益氣湯滋其化源是治本也其因甚多不能枚舉治者當臨症而制宜庶無誤矣若先見血證或吐衄盛大者宜先治血治法輕少者涼血止血盛大者先消瘀血次止血涼血蓋血來多必有瘀於胸膈不先消化之則止之涼之不應也葛可久十藥神書方可次第檢用方向惟獨參湯止可用於大吐血後昏倦脈微細氣虛者氣雖虛而復有火可加天門冬五錢若如前所云陰虛火動潮熱盜汗咳嗽脈數不可用愚按劉宗厚先生云榮者水穀之精也和調於五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身是以出入升降濡潤宣通者由此使然也故經云氣主噓之血主濡之又云肺朝百脈之氣肝統諸經之血氣血為人身之橐籥也觀此多因飲食起居六淫七情失宜虧損元氣以致諸經失職不能司攝法當調補脾肺之氣使血各歸其源諸病自愈矣若潮熱咳嗽而脈數者元氣虛弱假熱之脈也尤當用甘溫調補脾胃為善若病屬火大便多燥然須節調飲食勿令泄瀉若胃氣復壞泄瀉稀溏則前項寒涼之藥難用矣急宜調理脾胃用白朮茯苓陳皮半夏神麯麥芽甘草等藥俟胃氣復然後用前本病藥收功保後可合補陰丸常服之及用葛可久方愚按內經云腎開竅於二陰大小便也若腎經津涸者用六味丸脾肺氣虛者補中益氣湯脾經鬱結者加味歸脾湯氣血虛者八珍湯若發熱作渴飲冷用竹葉黃耆湯若膏粱厚味積熱者加味清胃散一儒者大便素結服搜風順氣丸後胸膈不利飲食善消面戴陽色左關尺脈洪大而虛余曰此屬足三陰虛症也彼不信乃服潤腸丸大便不實肢體倦怠余以補中益氣六味地黃月餘而驗年許而安一儒者懷抱鬱結發熱作渴胸膈不利飲食少思服清熱化痰行氣等劑前症益甚肢體倦怠心脾二脈澀滯余用加味歸脾湯飲食漸進諸症漸退但大便尚澀兩顴赤色用八珍湯加蓯蓉麥門五味至三十餘劑大便自潤一男子所患同前不信余言服大黃等藥泄瀉便血遍身黑黯復求治余視之曰此陰陽二絡俱傷也經曰陽絡傷則血外溢陰絡傷則血內溢內外俱傷其死奚待辭不治後果然一儒者口乾發熱小便頻濁大便秘結盜汗夢遺遂致廢寢用當歸六黃湯二劑盜汗頓止用六味地黃丸二便調和用十全大補湯及前丸兼服月餘諸症悉愈枳朮丸論人之一身脾胃為主胃陽主氣脾陰主血胃司受納脾司運化一納一運化生精氣津液上升糟粕下降斯無病矣人惟飲食不節起居不時損傷脾胃胃損則不能納脾損則不能化脾胃俱損納化皆難元氣斯弱百邪易侵而飽悶痞積關格吐逆腹痛泄痢等症作矣況人與飲食豈能一一節調一或有傷脾胃便損飲食減常元氣漸憊矣故潔古制枳朮之丸東垣發脾胃之論使人常以調理脾胃為主後人稱為醫中王道厥有旨哉近世論治脾胃者不分陰陽氣血而率皆理胃所用之藥又皆辛溫燥熱助火消陰之劑遂致胃火益旺脾陰愈傷清純中和之氣變為燥熱胃脘乾枯大腸燥結脾臟漸絕而死期迫矣殊不知脾胃屬土屬濕位居長夏故濕熱之病十居八九況土旺四季寒熱溫涼各隨其時豈可偏用辛熱之劑哉今舉枳朮丸方立加減法於後白朮二兩枳實一兩麩炒上為細末荷葉包飯燒取出杵爛和藥杵勻丸綠豆大每服五六十丸清米湯下此法一補一消取飲食緩化不令有傷東垣加陳皮一兩名枳朮橘丸治老幼元氣衰弱飲食少進久服令人多食而不傷愚按經云脾為消化之器熏蒸腐熟五穀者也若飲食自倍腸胃乃傷則不能運化其精微故噯氣吞酸脹滿痞悶之症作矣故用此丸消之實非專主補養若脾胃虛弱者宜用四君子湯脾胃虛寒者宜用四君子加炮姜命門火衰者用八味丸廷評張汝翰飲食難化服枳朮丸體瘦發熱脈浮大余以為命門火衰而脾胃虛寒用八味丸不月而飲食進三月而形體充工部陳禪亭患前症服消導之藥益甚余曰此火衰而不能生土故脾病也當益火則土自實而脾安矣不悟仍服前藥後遂歿若元氣素弱飲食難化食多即腹內不和疼痛泄瀉此虛寒也加人參白芍藥酒炒神麯炒大麥芽炒杵去皮一兩愚按前方乃飲食所傷之治法也東垣先生云亦有六淫而致瀉者有七情而致瀉者又有飲食所傷而致瀉者有因胃氣下流而致泄者有因風而成飧泄者有因痰積於上焦以致大腸不固而泄者有因脾胃氣虛而泄者治法外淫所傷當調六氣七情所傷當平五臟飲食所傷當消停滯胃氣下流當升舉之因風而成當解散之痰積於上焦當去其痰而不治其泄脾胃氣虛者當補益之丹溪先生謂飲食畢而腸鳴腹痛瀉盡食物者脾虛食瀉用理中湯加炮姜攻刺腹痛洞下水穀名寒瀉用理中湯送大戊己丸寒甚者附子桂香丸惡食者八物湯糞色青黃肛門痛煩躁作渴小便不利者名熱瀉用五苓散香連丸瀉而惡食而氣噫腐臭者名食瀉治中湯加砂仁或送感應丸金憲高如齋飲食難化腹痛泄瀉用六君子加砂仁木香治之而痊後復作完穀不化腹痛頭疼體重困倦余以為脾虛受濕用芍藥防風湯而愈太僕楊舉元先為飲食停滯小腹重墜用六君子加升麻柴胡漸愈後飲食難化大便不實裡急後重數至圊而不得用升陽除濕防風湯而痊後心腹作痛飲食不甘用和中丸倍加益智仁而尋愈光祿楊立之元氣素弱飲食難化泄瀉不已小便短少灑淅惡寒體重節痛余以為脾肺虛用升陽益胃湯而痊大凡泄瀉服分利調補等劑不應者此肝木鬱於脾土必用升陽益胃之劑庶能保生其五臟勝負所致者見第二卷泄瀉各條下若素有痰火胸膈鬱塞咽酸噎氣及素有吞酸吐酸之症或有酒積泄瀉結痛此皆濕熱也加黃連薑汁炒白芍藥酒炒陳皮各一兩石膏生甘草各五錢縮砂木香各一錢川芎四錢愚按前症吐酸吞酸大略不同吐酸者濕中生熱吞酸者虛熱內郁皆屬脾胃虛寒中傳末症故內經以為火者指其病形而言也東垣以為胃寒者指其病本而言也凡患此者先當辨其吞吐而治以固本元為主若服寒涼復傷胃氣則實實虛虛者矣復審其脾氣虛而飲食不能輸化濁氣不能下降者須用六君子湯補養脾胃為主少佐越鞠丸以清中故東垣先生云邪熱不殺穀若誤認為實熱而妄用寒涼必變敗症若傷食飽悶痞塞不消加神麯麥芽山楂各一兩有食積痞塊在腹者再加黃連厚朴俱薑製各五錢積堅者再加蓬朮醋煮昆布各三錢愚按前症若脾胃素實止因倍食暴傷而患者宜用前藥否則慎用也東垣云脾胃之氣壯則多食而不傷過時而不飢前症若因脾氣虛弱不能腐化者宜培補之若脾胃虛寒者宜溫養之若命門火衰者宜溫補之大凡食積痞塊症為有形所謂邪氣勝則實真氣奪則虛惟當養正則邪積自除矣雖云堅者削之客者除之若胃氣未虛元氣尚實乃可用也或病久虛羸或元氣素弱者亦當固本為主而佐用前法不然反致痞滿不食而益其病矣然古人立法皆備其常也而為按圖索驥可乎學者推此而用其庶幾乎若傷冷食不消腹痛溏泄加半夏薑製一兩縮砂乾薑神麯各炒大麥芽各五錢愚按前症若傷性熱之物者用二陳加黃連山楂傷濕面之物者用二陳加神麯麥芽傷米食者用六君加谷蘖傷麵食者用六君加麥蘖傷肉食者用六君加山楂傷魚腥者用六君倍加陳皮傷角黍炊飯者用六君倍加酒麴若物已消而瀉未愈者此脾胃受傷也宜用六君子湯若飲食減少或食而難化者屬脾胃虛寒也加炮薑木香肉果不應加五味吳茱骨脂脾腎虛寒者須服八味丸否則多患脾虛中滿之症其神麯麥芽雖助戊土以腐熟水穀麥芽一味余嘗以治婦人喪子乳房脹痛欲成癰者用一二兩炒熟煎服即消其破血散氣可知矣丹溪云麥芽消腎婦人良方云神麯善下胎皆克伐之功多而補益之功少亦不宜輕用唐儀部胸內作痛月餘腹亦痛左關弦長右關弦緊面色黃中見青此脾胃虛弱肝邪所乘以補中益氣湯加半夏木香二劑而愈又用六君子湯二劑而安李儀部常患腹痛余以補中益氣湯加山梔即愈一日因怒肚腹作痛胸脅作脹嘔吐不食肝脈弦緊面色青黃此肝乘脾也仍用補中益氣吞左金丸一服即愈若人性多氣惱夾氣傷食氣滯不通加川芎香附炒各七錢木香黃連姜炒各五錢愚按前症若因中氣虛弱不能運行者宜用六君子加山梔木香如不應送保和丸太守朱陽山因怒腹痛作瀉或兩脅作脹或胸乳作痛或寒熱往來或小便不利或飲食不入嘔吐痰涎神思不清此肝木乘脾土用小柴胡加山梔炮薑茯苓陳皮制黃連一劑即愈制黃連即黃連吳茱萸等分用熟水拌濕罨二三日同炒焦取黃連後仿此陽山之內素善怒胸膈不利吐痰甚多吞酸噯腐飲食少思手足發熱所服非芩連枳實必檳蘇厚朴左關弦洪右關弦數余以為肝火血燥木乘土位也朝用六味地黃丸以滋養肝木夕用六君子加當歸芍藥以調補脾土不月而愈後因恚怒前疾復作或用二陳加石膏服之吐涎如湧外熱如灼脈洪大按之如無余曰脾主涎乃脾損發熱而涎泛溢也用六君子加薑桂一服即睡覺而諸症頓失又數劑而康若服理氣化痰等藥必變腹脹喘促腿浮膝腫淋瀝等症急用濟生加減腎氣丸救之多有得生者詳見各方若胸膈不利過服辛香燥熱之藥以致上焦受傷胃脘乾燥嘔吐噎膈反胃加黃連姜炒山梔仁炒各五錢白芍藥當歸各一兩桔梗生甘草石膏各三錢胸膈頑痰膠結及大便燥秘再加芒硝五錢愚按王安道先生曰內膈嘔逆食不得入是有火也若病而吐食入反出是無火也治法若脾胃氣虛而胸膈不利者用六君子湯壯脾土生元氣若辛熱之劑而嘔吐噎膈者用四君子加芎歸益脾土以抑陰火胃火內格而飲食不入者用六君子加芩連清熱養胃若病嘔吐食入而反出者用六君子加木香炮姜溫中補脾若服耗氣之劑血無所生而大便燥結者用四君子加芎歸補脾生血若火逆衝上食不得入者用四君子加山梔黃連清熱養血若痰飲阻滯而食不得入者用六君子加木香山梔補脾化痰若脾胃虛寒飲食不入或入而不化者用六君子加木香炮姜溫補脾胃更非慎房勞節厚味調飲食者不治年高無血者亦不治一男子食少胸滿手足逆冷飲食畏寒發熱吐痰時欲作嘔自用清氣化痰之劑胸腹愈脹呼吸不利吐痰嘔食小便淋漓又用五苓散之類小便不利諸病益甚余曰此脾土虛寒無火之症故食入不消而反出非氣膈所致遂用八味丸補中益氣加半夏茯苓薑桂旬日乃愈秀才楊君爵年將五十胸痞少食吐痰體倦肌肉消瘦所服方藥皆耗氣破血化痰降火余曰此氣鬱所傷陽氣不能升越屬脾經血虛之症當用歸脾湯解鬱結生脾血用補中益氣壯脾氣生髮諸經否則必為中滿氣膈之患不信仍服前藥後果患前症而歿若素有痰火者加半夏姜炒橘紅白茯苓各一兩黃芩炒黃連姜炒各五錢愚按前症亦有因脾氣不足者有因脾氣鬱滯者有因脾肺之氣虧損者有因腎陰虛不能攝水泛而似痰者有因脾氣虛不能攝涎上溢而似痰者有因熱而生痰者有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因酒而得者有因食積而得者有脾虛不能運化而生者有胸中痰鬱而似鬼附者各審其原而治之若人能食好食但食後反飽難化此胃火旺脾陰虛也加白芍藥酒炒一兩五錢人參七錢石膏火煅一兩生甘草五錢黃連炒香附炒木香各四錢愚按東垣先生云胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛不能食而瘦或少食而肥雖肥而四肢不舉又有善食而瘦者胃中火邪於氣分則能食而肉削今能食而難化者脾氣虛弱不能腐化水穀故前藥不應或熱渴嘔吐或腹脹泄瀉等症者乃是脾胃復傷急用六君子加芍藥木香炮姜補之亦有屬脾氣鬱結者當解鬱健脾若用清涼降火以致中氣虛痞而不食或食而食反出又以為膈噎用行氣化痰者必不能療也若年高人脾虛血燥易飢易飽大便燥難用白芍藥當歸各一兩人參七錢升麻甘草炙各四錢山楂大麥芽桃仁去皮尖另研各五錢此老人常服藥也愚按前症屬形氣病氣俱不足脾胃虛弱津血枯涸而大便難耳法當滋補化源又有脾約症成無己云胃強脾弱約束津液不得四布但輸膀胱小便數而大便難者是也宜用脾約丸陰血枯槁內火燔灼肺金受邪土受木克脾肺失傳大便秘而小便數者宜用潤腸丸病氣有餘之治法也經云脾為至陰己土而主陰然老弱之人當補中益氣以生陰血職方陳莪齋年逾六旬先因大便不通服內疏等劑後飲食少思胸腹作脹兩脅作痛形體倦怠兩尺浮大左關短澀右關弦澀時五月此乃命門火衰不能生脾土而肺金又克肝木決其金旺之際不起後果然一老婦痰喘內熱大便不通兩月不寐此肝肺腎虧損朝用六味丸夕用逍遙散各三十餘劑計所進飲食百餘碗腹始痞悶乃以豬膽汁導而通之用十全大補湯調理而安若間斷前藥飲食不進諸症復作化痰丸論痰者病名也人之一身氣血清順則津液流通何痰之有惟夫氣血濁逆則津液不清熏蒸成聚而變為痰焉痰之本水也原於腎痰之動濕也主於脾古人用二陳湯為治痰通用者所以實脾燥濕治其標也然以之而治濕痰寒痰痰飲痰涎則固是矣若夫痰因火上肺氣不清咳嗽時作及老痰郁痰結成黏塊凝滯喉間吐咯難出此等之痰皆因火邪炎上熏於上焦肺氣被郁故其津液之隨氣而升者為火熏蒸凝濁鬱結而成歲月積久根深蒂固故名老名郁而其原則火邪也病在上焦心肺之分咽喉之間非中焦脾胃濕痰冷痰痰飲痰涎之比故湯藥難治亦非半夏茯苓蒼朮枳殼南星等藥所能治也惟在開其鬱降其火清潤肺金而消凝結之痰緩以治之冀可效耳今制一方於後天門冬去心黃芩酒炒海粉橘紅各一兩桔梗連翹香附杵碎淡鹽水浸炒各五錢青黛另研芒硝另研各三錢栝蔞仁取肉另研一兩上為細末煉蜜入薑汁少許和藥杵極勻丸小龍眼大噙化一丸或嚼爛清湯細嚥之或丸如黍米大淡薑湯送下五六十丸愚按前方味屬甘苦鹹寒之劑雖能軟堅開鬱化痰降火而不無損胃之禍乎若脾土太過氣滯鬱熱而生痰者用之得宜若脾土不及氣痞虛熱而生痰者用之必致中滿吞酸肚腹腫脹小便不利而歿治者審之一男子素不善調攝唾痰口乾飲食不美服化痰行氣之劑胸滿腹膨痰涎愈盛服導痰理脾之劑肚腹膨脹二便不利服分氣利水之劑腹大脅痛睡臥不得服破血消導之劑兩足皆腫兩關脈浮大不及於寸口余以脾土虛而生痰朝用金匱加減腎氣丸夕用補中益氣湯煎送前丸月餘諸症漸退飲食漸進再用八味丸補中益氣湯月餘乃能轉側又兩月而能步履卻服十全大補湯還少丹又半載而康後稍失調理其腹仍脹隨服前藥即愈一武職形體魁梧素不圍爐不喜熱食行則喘促自謂氣實老痰服碑記丸攻伐之診其脈洪數重按全無余謂命門火衰脾肺虛寒與八味丸一服痰喘稍止數服全止遂能親火喜熱飲食蓋碑記丸出自西域況方外人所制者經云西域水土剛強其民不衣而褐薦其民華色而脂肥故邪不能傷其形體其病生於內其治宜毒藥由此觀之恐不可概用也太倉陸中舍以腎虛不能攝水肚腹脹大用此丸未數服而歿於京今之專門治蠱者即此方也又名黑丸子用之無不速亡機房蔡一素不慎起居患症同前更加手足逆冷惡寒飲食余用補中益氣湯加附子一錢先回其陽至數劑諸症漸愈余因他往或用峻厲之劑下鮮血甚多亦致不起若此等老痰飲酒之人多有之酒氣上升為火肺與胃脘皆受火邪故鬱結而成此方用天麥冬黃芩泄肺火也海粉芒硝咸以軟堅也栝蔞仁潤肺清痰香附米開鬱降氣連翹開結降火青黛降鬱火故皆不用香燥之劑愚按前症若飲食少思或胸膈不利者此中氣虛弱也宜用補中益氣湯為主中氣既健其痰自運化若腎氣虧損津液難降敗濁為痰者乃真臟之症宜用六味地黃丸為主腎氣既壯津液清化而何痰之有哉亦有因脾胃虧損中焦氣虛不能運化而為痰者亦有因峻厲過度脾氣愈虛不能運化津液凝滯而為痰者凡此皆當健脾胃為主備用要方暑症若夏月傷暑發熱汗大泄無氣力脈虛細而遲此暑傷元氣也服後方人參黃耆蜜炙麥門冬去心白芍藥陳皮白茯苓各一錢黃連炒甘草炙各五分黃柏三分白朮一錢五分香薷知母各七分上薑水煎食前溫服愚按東垣先生曰暑熱之時無病之人或避暑熱納涼於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛煩熱無汗為房室陰寒之氣所遏名曰中暍以大順散熱藥主之若行人或農夫於日中得之者名曰勞役中熱其病必苦頭痛躁熱惡熱肌熱大渴汗泄懶動為天熱外傷肺氣以蒼朮白虎湯涼劑主之若人元氣不足用前藥不應宜補中益氣湯主之大抵夏月陽氣浮於外陰氣伏於內若人飲食勞倦內傷中氣或酷暑勞役外傷陽氣者多患之法當調補元氣為主而佐以解暑若中暍者乃陰寒之症法當補陽氣為主少佐以解暑故先哲多用薑桂附子之類此推內經舍時從症之良法也今患暑症歿而手足指甲或肢體青黯此皆不究其因不溫補其內而泛用香薷飲之類所誤也夫香薷飲乃散陽氣導真陰之劑也須審有是症而服亦何患哉若人元氣素虛或犯勞過度而飲之者適所以招暑患病也其暑熱傷元氣而類風症者見第四卷首治驗若夏秋暑熱因過用冷物茶水傷其內又過取涼風傷其外以致惡寒發熱胸膈飽悶或飲食不進或兼嘔吐泄瀉此內外俱傷寒冷也人參乾薑炒紫色厚朴姜水炒陳皮羌活枳實白茯苓各一錢白朮一錢五分甘草炙五分上薑水煎食前溫服愚按前症如未應宜用藿香正氣散若內外已解寒熱未退或飲食未進宜用六君子湯保命集云霍亂屬陽明症宜用和中平胃建中或四君子湯輩脈浮自汗四君子加桂枝主之脈浮無汗四君子加麻黃吐利轉筋脅下痛脈弦者木剋土也用平胃散加木瓜或建中加柴胡木瓜吐利轉筋腹中痛體重脈沉而細者四君子加白芍藥良薑吐利而四肢拘急脈沉而遲屬少陰四君子加薑附厚朴吐利而四肢厥冷脈微緩屬厥陰建中加歸附吐利頭痛而身熱多欲飲水者五苓散寒多不欲飲水者理中丸主之元戎云太陰症霍亂者理中加橘紅吐下腹痛手足逆冷理中加熟附吐利後轉筋者理中加火煅石膏一兩進士劉華甫夏月食生冷果品患前症余用附子理中湯一服頓安上舍徐民則夏月入房及食冰果麵食而患腹痛余曰此陰寒之症也須用附子理中湯以回陽不信別用二陳枳實黃連香薷飲之類而死若夏暑在途中常服以壯元氣清熱驅暑服之免中暑霍亂泄瀉痢疾等症人參一錢二分白朮一錢五分五味子十粒杵碎麥門冬去心白芍藥炒白茯苓各一錢知母炒陳皮香薷各七分黃芩炒三分甘草炙五分上薑水煎食前溫服愚按前症若人元氣虛弱宜用補中益氣去柴胡升麻加麥門五味或少加炒黑黃柏人參養氣湯亦可用一儒者季夏患泄瀉腹中作痛飲食無味肢體倦怠余用補中益氣湯八味地黃丸月餘而痊後彼云每秋間必患痢今則無恙何也余曰此閉藏之月不遠幃幕妄泄真陽而然前藥善能補真火火能生土脾氣生旺而免患也若遇勞倦辛苦用力過多即服後方一二服免生內傷發熱之病此方主於補氣黃耆二錢半蜜炙人參麥門冬去心陳皮各一錢白朮炙草五味各五分上薑棗水煎食前溫服勞倦甚加熟附子四五分愚按前論開世俗之蒙瞶濟無窮之夭枉內附子若素畏寒飲食者尤宜用若素喜寒飲食者以肉桂或炮姜代之亦可但世所鮮用耳一婦人因勞役發熱倦怠唾痰欲嘔或以為火症用清熱化痰等藥反大便不實無氣以動余以寒涼復傷中氣形病俱虛用前方加附子治之而痊後復勞經水數日不止眾以為附子之熱所致用四物芩連槐花之類涼而止之前症愈甚更加胸膈痞滿飲食日少余仍用前方去門冬更加茯苓半夏炮姜數劑漸愈又用當歸芍藥湯而經止但四肢逆冷飲食難化不時大熱此命門真火衰脾土虛寒之假熱也用八味丸半載而痊又服六味丸三載而生子
