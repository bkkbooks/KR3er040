body:
  text: 卷之二泄瀉泄本屬濕然多因飲食不節致傷脾胃而作須看時令分寒熱新久而施治治法補脾消食利小便亦有升提下陷之氣用風藥以勝濕亦有久泄腸胃虛滑不禁者宜收澀之主方白朮二錢白茯苓白芍藥炒各一錢五分以上三味乃泄瀉必用者陳皮一錢甘草炙五分若傷食瀉黃或食積加神麯麥芽山楂各一錢黃連炒七分若腹中窄狹再加厚朴枳實以消停滯愚按前症若飲食已消而泄瀉未止此脾胃之氣傷也宜用五味異功散若泄瀉而腹中重墜此脾胃之氣下陷也宜用補中益氣湯若服克滯之劑而腹中窄狹此脾氣虛痞也宜用六君子湯若脅脹少食善怒瀉青此脾虛肝所乘也宜六君子加柴胡升麻木香若少食體倦善噫泄黃此脾虛色陷也宜用六君子加升麻柴胡大凡諸症若脾脈弦長者肝木乘脾土也當補脾平肝若脾脈沉弦者寒水侮脾土也當溫中補腎夫黃連枳實雖消停滯開痞悶若人脾胃充實暴患實痞宜暫用之若人屢患屢服或脾胃虛痞者而用之則脾胃反傷而諸症蜂起矣故東垣先生云脾胃實者用黃連枳實瀉之虛者用白朮陳皮補之須分病之虛實人之南北而治之後仿此若小便赤澀短少加豬苓澤瀉各一錢以分利之夏月加茵陳七分山梔仁炒四分愚按前症若津液偏滲於大腸大便瀉而小便少者宜用此藥分利若陰陽已分而小便短少者此脾肺氣虛而不能生水也宜用補中益氣湯加麥門五味陰火上炎而小便赤少者此肺氣受傷而不能生水也用六味地黃丸加麥門五味腎經陰虛陽無所生而小便短少者用滋腎丸腎氣丸腎經陽虛陰無所化而小便短少者用益氣湯六味丸若誤用滲泄分利復傷陽氣陰無所生而小便不利或目睛凸出腹脹如鼓或腿膝腫硬或皮膚斷裂者先用滋腎丸益氣湯每見元氣虛而復用澤瀉豬苓之類因損真陰以致前症益甚者急投金匱加減腎氣丸多有復生者若反服牽牛大黃峻劑而通之是速其危也若口渴引飲加乾薑一錢五分人參麥門冬各一錢升麻四分烏梅肉五個愚按前症若胃氣傷而內亡津液者用七味白朮散胃氣弱而津液少者用補中益氣湯氣血俱虛而津液少者用十全大補湯腎虛津液短少者用六味地黃丸腎水不足而虛火上炎者用加減八味丸若腎水不足之人患泄瀉或服分利之劑過多而患口渴者若不用前藥以固其本源則肺腎復傷多變小便不利肚腹水腫等危症矣憲副屠九峰先瀉而口渴尺脈數而無力恪用解酒毒利小便之劑不應余曰此腎陰虧損虛火熾盛宜急壯水之主不然必發疽而不能收斂也不信別服降火化痰之劑果患疽而歿若夏秋之間濕熱大行暴注水瀉加黃連蒼朮澤瀉各一錢升麻木通各五分發熱作渴加乾薑石膏各一錢黃疸小便赤加茵陳一錢山梔木通各五分愚按東垣云若值秋燥行令濕熱少退體重節痛口舌乾燥飲食無味二便不調不欲飲食或食不化兼灑淅惡寒悽慘面惡此肺之脾胃虛而陽氣不伸也用升陽益胃湯治之前症若濕熱內作脾胃不能通調而致者宜用此藥分利之濕熱已去脾胃虛弱而致者宜用六君子當歸調補之濕熱已去脾氣下陷而致者宜用補中益氣湯升舉之其黃疸若小便不利四肢沉重渴不欲飲此濕勝於熱用大茵陳湯大便自利茵陳梔子黃連湯若往來寒熱身黃者宜用小柴胡加梔子若因勞傷形體飲食失節而身黃者用小半夏湯蓋黃疸為內傷不足之症宜調補脾胃元氣為主若妄用驅逐復傷元氣多致不起若久瀉脾胃虛弱飲食難化加黃耆炙人參各一錢神麯麥芽各一錢二分木香煨乾薑炙各五分愚按前症或作嘔或飲食少思屬脾胃虛弱用四君子加半夏木香或兼作嘔或腹作痛屬脾胃虛寒用六君子加炮薑木香若麥芽善損腎神麯善化胎消腎不宜輕用大抵此症多由泛用消食利水之劑損其真陰元氣不能自主持遂成久泄若非補中益氣湯四神丸滋其本源後必胸痞腹脹小便淋瀝多致不起若久瀉腸胃虛滑不禁加肉豆蔻訶子皮赤石脂各一錢木香煨乾薑炙各五分愚按東垣先生云中焦氣弱脾胃受寒冷大便滑瀉腹中雷鳴或因誤下末傳寒中復遇時寒四肢厥逆心胃絞痛冷汗不止此腎之脾胃虛也用沉香溫胃丸治之竊謂前症若脾胃虛寒下陷者用補中益氣湯加木香肉豆蔻補骨脂若脾氣虛寒不禁者用六君子湯加炮薑肉桂命門火衰而脾土虛寒者用八味丸若脾腎氣血俱虛者用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾腎氣血俱虛宜用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾腎虧損宜用金匱加減腎氣丸若飲酒便泄此酒積熱瀉也加黃連炒茵陳乾薑各一錢木香五分愚按前症若酒濕未散脾氣未虛宜用此藥分利濕熱若濕熱已去中氣被傷宜用六君子調補中氣若誤服克伐分利之劑胸膈漸滿小便短小或腿足與腹漸腫者急用加減金匱腎氣丸調補脾胃多有生者夫酒性大熱乃無形之物無形元氣受傷當用葛花解醒湯分消其濕往往反服大熱酒症丸重瀉有形陰血使陽毒大旺元氣消亡折人長命金匱要略云酒疸下之久而為黑疸每見善飲服酒症丸者多患疸症不悟其因反服分利化痰以致變症而歿者多矣詳見奇效方秀水卜封君善飲腹痛便泄服分利化痰等劑不應其脈滑數皮膚錯甲余謂此酒毒致腸癰而潰敗也辭不治不信仍服前劑果便膿而歿光祿柴黼庵善飲泄瀉腹脹吐痰作嘔口乾余謂脾胃氣虛先用六君子加神麯痰嘔已止再用補中益氣加茯苓半夏瀉脹亦愈舊僚錢可久素善飲面赤痰盛大便不實余以為腸胃濕痰壅滯用二陳芩連山梔枳實乾葛澤瀉升麻一劑吐痰甚多大便始實此後日以黃連三錢泡湯飲之而安若寒月溏泄清冷腹痛傷生冷飲食加神麯麥芽炒乾薑炙各一錢縮砂益智木香各七分愚按前症若脾腎虛寒宜用四神丸若脾腎虛脫用六君薑桂如不應急補命門火以生脾土一儒者小腹急痛溏泄清冷大便欲去不去余謂此命門火衰而脾土虛寒也用八味丸月餘而愈向後飲食失宜前症仍作小腹重墜此脾氣下陷也用補中益氣湯而痊痢疾痢是濕熱及食積治者別赤白青黃黑五色以屬五臟白者濕熱傷氣分赤者濕熱傷血分赤白相雜氣血俱傷黃者食積治法瀉腸胃之濕熱開鬱結之氣消化積滯通因通用其初只是下下後未愈隨症調之痢稍久者不可下胃虛故也痢多屬熱然亦有虛與寒者虛者宜補寒者宜溫年老及虛弱人不宜下主方黃芩炒黃連炒各五分白芍藥炒二錢以上三藥乃痢疾之必用者木香枳殼炒各五分甘草炙三分檳榔一錢上薑水煎服若腹痛加當歸一錢五分縮砂一錢再加木香芍藥各五分愚按前症若因濕熱鬱結後重不利宜用此方若飲食停滯用二陳湯加山楂送香連丸仲景先生云脈沉而有力者屬裡實也宜下之沉而無力者屬裡虛也宜補之元氣虛滑者宜溫之澀之脈滑而數者有宿食也當下之脈浮大此為虛而強下之故也脈浮革者因而腸鳴當溫之下痢腹堅者當下之下痢譫語有燥屎當下之下痢三部脈皆平按之心下堅急下之下痢脈大浮弦當自愈下痢腹滿痛為實當下之治者審焉若後重加滑石炒五分再加枳殼檳榔芍藥條芩各五分愚按痢而便膿血者乃氣行而血止也行血則便膿自愈調氣則後重自除若大腸積滯壅實而後重法當疏導若大腸氣虛下陷而後重法當升補司馬王荊山患痢後重服枳殼檳榔之類後重益甚食少腹痛余以為脾胃傷而虛寒也用六君木香炮薑而愈太常邊華泉嘔吐不食腹痛後重服大黃之藥腹痛益甚自汗發熱昏憒脈大余以為胃氣復傷陽氣虛寒脫陷也以參術各一兩炙草炮薑各三錢升麻一錢一劑而蘇又用補中益氣加炮薑二劑而愈若白痢加白朮白茯苓滑石炒陳皮各一錢初欲下之再加大黃五錢兼食積加山楂枳實各一錢愚按前症若腹痛後重怕手按腹或脈洪實為積滯閉結宜用此方疏通之若腹痛後重喜手按腹或脈微細為陽氣虛寒宜用六君手薑溫補之少宗伯顧東江停食患痢腹痛下墜或用疏導之劑兩足腫脹食少體倦煩熱作渴脈洪數按之微細余以六君子加薑桂各二錢吳茱五味各一錢煎熟冷服即睡覺而諸症頓退再劑而安此內真寒而外假熱治以熱劑而冷飲東垣先生治假寒熱之症投以假寒熱之劑廷評曲汝為食後接內患腹痛去後似痢非痢次日便膿血煩熱作渴神思昏倦用四神丸一服頓減又用八味丸料加吳茱五味骨脂肉蔻二劑全愈若紅痢加當歸川芎桃仁各一錢五分初欲下之再加大黃五錢愚按前症若病日久或誤服疏通之藥而不能愈者當調補脾胃大凡血症久而不愈多因陽氣虛而不能生血或因陽氣虛而不能攝血故丹溪先生治此症久而不愈用四君子湯以收其功判官汪天錫患痢腹痛後重渴欲飲冷飲食不進用芍藥湯納大黃一兩四劑稍應仍用前藥但大黃減半數劑而愈通府薛允俯下血服犀角地黃湯其血愈多發熱少食裡急後重豫以為清氣下陷用補中益氣湯加炮薑一劑而瘳若紅白相雜加川芎當歸桃仁各一錢五分以理血滑石陳皮蒼朮各一錢五分以理氣有食積者加山楂枳實以消導愚按前症若氣滯食積濕熱所致宜用此方治之若脾虛飲食停滯宜用六君子湯送香連丸調補之經云脾主血肺主氣前症乃氣血俱受病也若因脾肺血傷所致宜用四物湯加白朮茯苓煎送香連丸若因脾肺氣傷所致宜用四君湯加當歸川芎煎送香連丸若白痢久胃弱氣虛或下後未愈去檳榔枳殼減芩連芍藥各七分加白朮一錢五分黃耆陳皮茯苓各一錢縮砂乾薑炙各五分愚按前症若數至圊而不能便或少有白膿者乃土不能生金肺與大腸氣傷而下墜也當用升陽益胃湯舉其陽氣則陰自降而二便自愈矣飲食不入發熱作渴其勢危甚用十全大補湯如不應送二神丸若紅痢久胃弱血虛或下後未愈減黃芩黃連各五分加當歸川芎熟地阿膠陳皮各一錢白朮一錢五分愚按前症若脾經血熱下注而不愈者用四物湯加白朮茯苓若脾經氣虛不能統血而不愈者用四君子加川芎當歸若中氣下陷不能攝血而不愈者用補中益氣湯若赤黑相雜此濕勝也及小便赤澀短少加木通澤瀉茯苓各一錢山梔仁炒五分以分利之愚按初患濕盛而小便赤澀者宜用前藥若病久而陽氣下陷或老弱者宜用升陽除濕防風湯若脾土虧損寒水來侮先用六君子湯加薑桂以溫而補之後用補中益氣湯加茯苓半夏以升而補之若血痢加當歸川芎生地黃桃仁槐花炒各一錢久不愈減芩連各七分去檳榔枳殼再加阿膠珠側柏葉白朮各一錢五分乾薑炒黑陳皮各一錢愚按前症亦有因脾氣虛弱者有因脾氣下陷者有因肝氣虛弱者有因肝血虛熱者祠部李宜散患血痢胸腹膨脹大便欲去不去肢體殊倦余以為脾氣虛弱不能攝血歸源用補中益氣湯加茯苓半夏治之漸愈後因怒前症復作左關脈弦浮按之微弱此肝氣虛不能藏血用六味丸治之而愈若痢已久而後重不去此大腸墜下去檳榔枳殼用條芩加升麻一錢以升提之愚按前症亦有因大腸氣滯者有因大腸氣陷者有因大腸血虛者有因脾腎虛寒者若大腸氣滯墜下宜用四君子送香連丸若大腸氣虛陷下宜用四君子加柴胡升麻送香連丸若大腸血虛後重宜用四物湯加參術送香連丸東垣先生云裡急者腹中不寬快也亦有虛坐而大便不行者皆血虛也血虛則裡急後重若嘔吐食不得下加軟石膏一錢五分陳皮一錢山梔仁炒五分生薑六分緩呷之以瀉胃口之熱愚按前症若脾胃素有實熱或過食厚味辛辣而暴患之宜用此方若胃氣虛膈氣逆而作嘔吐者用六君子加生薑若胃氣虛寒亦用前藥加炮薑木香有一樣氣血虛而痢者用四物湯加人參白朮陳皮黃芩黃連愚按前症若脾氣虛而血弱宜用四君子湯若胃氣虛而血弱宜用補中益氣湯若久病氣血俱虛宜用八珍湯大凡此症久而不愈或變症百出但守前法久之自愈有一樣寒痢用黃連木香芍藥酒炒當歸乾薑炒縮砂厚朴肉桂愚按東垣先生云前症若脈沉細而身不動作睛不了了飲食不下鼻準氣息者用薑附湯身重四肢不舉者用朮附湯暴下無聲身冷自汗小便自利大便不禁氣難布息脈微嘔吐者用漿水散先太安人年八十仲夏患痢腹痛作嘔不食渴飲湯水按腹痛稍止脈鼓指而有力余謂真氣虛而邪氣實也用人參五錢白朮茯苓各三錢陳皮升麻附子炙甘草各一錢服之睡覺索食脈症頓退再劑而安橫金陳子復面帶赤色吐痰口乾或時作瀉或用二陳黃連枳實之類不應豫脈之左關弦急右關弦大此乃腎水挾肝木之勢而克勝脾土也不信後交夏果患痢而亡若得痢而誤服溫熱止澀之藥則雖稍久亦宜用前法以下之下後方調之若得痢便用前症法下之而未應又用前調理法治之久而不愈此屬虛寒而滑脫可於前補虛寒溫二條用擇更加龍骨石脂罌粟殼烏梅肉等收澀之藥愚按前症若脾氣虛寒下陷宜用補中益氣湯加粟殼薑桂如不應急用附子若氣血虛弱宜用十全大補湯加附子粟殼若命門火衰用八味丸以補土母若腹痛作渴飲湯手按腹痛稍止者俱溫補脾胃瘧疾瘧是風暑之邪有一日一發有二日一發有三日一發有間一日連二日發有日與夜各發有有汗有無汗有上半日發有下半日發有發於夜者治法邪從外入宜發散之然以扶持胃氣為本又須分別陽分陰分而用藥邪瘧及新發者可散可截虛瘧及久者宜補氣血若過服截藥致傷脾胃則必延綿不愈矣主方柴胡白朮各一錢半蒼朮泔浸一錢以上三味瘧疾必用之藥乾葛一錢二分陳皮七分甘草炙五分愚按前症皆因先傷於暑次感於風客於榮衛之間腠理不密復遇風寒閉而不出舍於腸胃之外與榮衛並行晝行於陽夜行於陰並則病作離則病止並於陽則熱並於陰則寒淺則日作深則間日在氣則早在血則晏按本經曰瘧脈自弦弦數者多熱弦遲者多寒弦短者傷食弦滑者多痰弦而緊者宜下浮大者宜吐弦遲者宜溫此治瘧之大法其病熱多寒少心煩少睡者屬心名曰溫瘧用柴芩湯但寒少熱腰疼足冷者屬腎名曰寒瘧用桂附二陳湯先寒而後大熱咳嗽者屬肺名曰疸瘧用參蘇飲熱長寒短筋脈揪縮者屬肝名曰風瘧用小柴胡加烏藥香附寒熱相停嘔吐痰沫者屬脾名曰食瘧用清脾飲瘧愈之後陰陽兩虛夢遺咳嗽不善保養遂成勞瘵若能清心養體節食避風如此調治無不愈矣若一日一發及午前發者邪在陽分加枯芩茯苓半夏各一錢熱甚頭痛再加川芎軟石膏各一錢口乾加石膏知母麥門冬各一錢愚按劉宗厚先生云從卯至午發者邪在大腸小腸也宜大柴胡湯下之從午至酉發者邪亦在心與腎也宜大承湯下之此皆邪入於內也從酉至子發者邪在心與膽也或至寅發者此邪在氣在血也宜用桃仁承氣湯微下之更以小柴胡湯徹其餘邪若身熱目痛熱多寒少其脈實長者先以大柴胡湯下之餘熱不盡再用白芷湯若甚寒微熱或但寒不熱者名曰牝瘧用柴胡桂枝湯以解表若間日或三日發或午後或夜發者邪入陰分加川芎當歸芍藥酒炒熟地黃知母酒炒各一錢紅花酒洗黃柏酒炒升麻各四分提起陽分可截之愚按仲景先生云瘧無他症但隔日發而先寒後熱寒多熱少用桂枝石膏湯發於夜麻黃黃芩湯竊謂前症若中氣虛而間日發者用補中益氣湯若氣血俱虛而三日一發者用十全大補湯大抵邪氣在陽分者淺而易治邪氣在陰分者深而難治若間一日連發二日或日夜各發者氣血俱病加人參黃耆白茯苓各一錢以補氣川芎當歸芍藥熟地黃各一錢以補血愚按此條治法當以前後論參看用藥調治若陽瘧多汗用黃耆人參白朮以斂之無汗柴胡蒼朮白朮黃芩乾葛以發之愚按仲景云處暑以前瘧發而頭項痛脈浮惡風有汗者桂枝羌活湯若惡風無汗者麻黃羌活湯若久而汗多腠理開泄陽不能固必補斂之無汗則腠理致密邪不能解必發散之若屬飲食所傷用六君子湯為主勞傷元氣用補中益氣湯為主若陰瘧多汗用當歸白芍藥熟地黃連黃柏黃耆以斂之無汗柴胡蒼朮川芎紅花升麻以發之故曰有汗者要無汗扶正為主無汗者要有汗散邪為主愚按前症若寒熱大作不論先後此太陽陽明合病寒熱作則必戰經曰熱勝而動也發熱則必汗泄又曰汗出不愈知內熱也陽盛陰虛之症當內實外虛不治恐久而傳陰經也宜用桂枝芍藥湯若病久須大補脾胃為主蓋養正邪自除也若病人胃氣弱飲食少或服截藥傷脾胃而少食者加人參一錢五分芍藥酒炒大麥芽各一錢愚按前症若用寒涼止截脾胃傷損必致連綿不已若非培養元氣決不能愈然芍藥麥芽善損脾腎恐不宜多用洞庭馬志卿母瘧後形體骨立發熱惡寒自汗盜汗胸膈痞滿日飲米飲盞許服參術藥益脹臥床半年矣余以為陽氣虛寒用大劑補中益氣加附子一錢二劑諸症漸退飲食漸進又二劑全愈若傷食痞悶或有食積者加神麯麥芽枳實炒各一錢黃連炒五分愚按前症若脾胃無虧飲食過多而患暴怒胸膈痞悶者宜用此方以消導宿滯若飲食既消而胸膈痞悶者宜用六君子湯以調補脾胃若勞傷元氣兼停飲食用補中益氣加半夏茯苓以升補脾胃若感怒兼食用二陳參朮木香香附山梔以補脾平肝冬官朱省庵停食感寒而患瘧自用清脾截瘧二藥食後腹脹時或作痛服二陳黃連枳實之類小腹重墜腿足浮腫加白朮山楂吐食未化余曰食後脹痛脾虛不能克化也小腹重墜陽氣不能升舉也腿足浮腫胃氣不能運行也吐食不消脾胃虛寒也治以補中益氣湯加吳茱薑桂木香不數服而痊一婦人飲食後患瘧嘔吐屬內停飲食外感風寒用藿香正氣散而愈後因怒吐痰甚多狂言熱熾胸膈脹痛手按少止脈洪大無倫按之微細余謂肝脾二經血少火旺用加味逍遙散加熟地川芎二劑頓退再用十全大補而安若痰盛加半夏薑製南星枳實各一錢黃芩炒黃連各六分愚按前方非膏粱積熱實火為痰者不宜用若中氣虛而痰甚用補中益氣湯加茯苓半夏如未應用一味薑汁尤好若欲截之加檳榔黃芩青皮常山各一錢烏梅肉三個愚按前症若血氣俱虛用人參生薑各一兩煎服頓止不問新久並效若咽酸口酸且節飲食其病潮作時雖大渴只與薑湯乘熱飲之此亦截瘧之良法每見飲啖生冷物者病或少愈多致脾虛胃損反為難治若病勢正熾一二髮間未宜遽截恐邪氣不去正氣反傷耳此法有益無害一上舍每至夏秋非停食作瀉必瘧痢霍亂遇勞吐痰頭眩體倦發熱惡寒雜用四物二陳芩連之類患瘧服止截之藥前症益甚時或遍身如芒刺然余謂中氣虛熱用補中益氣湯加茯苓半夏內參耆各用三錢歸術各二錢四十餘劑全愈若日久虛瘧寒熱不多或無寒而微熱者邪氣已無只用四君子合四物湯加柴胡黃芩陳皮以滋補氣血愚按前症若因胃氣虛用四君加升麻當歸若脾血虛用四君加川芎當歸若因中氣下陷用補中益氣湯加茯苓半夏大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食戰栗泄瀉手足逆冷皆脾胃虛弱但補中益氣其諸症悉愈一婦人瘧久不愈發熱口乾倦甚此脾胃虛熱用七味白朮散加麥門五味作大劑煎與恣飲再發稍可乃用補中益氣湯加茯苓半夏十餘劑而愈一婦人久瘧寒熱服清脾飲之類胸膈飽脹飲食減少用補中益氣湯加茯苓半夏炮薑各一錢而痊咳嗽咳謂有聲肺氣傷而不清嗽謂有痰脾濕動而生痰咳嗽者因傷肺氣而動脾濕也病本雖分六氣五臟之殊而其要皆主於肺蓋肺主氣而聲出也治法須分新久虛實新病風寒則散之火熱則清之濕熱則瀉之久病便屬虛屬郁氣虛則補氣血虛則補血兼鬱則開鬱滋之潤之斂之則治虛之法也主方杏仁去皮尖白茯苓各一錢橘紅七分五味子桔梗甘草炙各五分春多上升之氣宜潤肺抑肝加川芎芍藥半夏各一錢麥門冬黃芩炒知母各五分春若傷風咳嗽鼻流清涕宜辛涼解散加防風薄荷黃芩炒麥門冬各一錢愚按前症若因風寒所傷咳嗽聲重頭痛用金沸草散咳嗽聲重身熱頭痛用局方消風散蓋肺主皮毛肺氣虛則腠理不密風邪易入治法當解表兼實肺氣肺有火則腠理不閉風邪外乘治宜解表兼清肺火邪退即止若數行解散則重亡津液邪蘊而為肺疽肺痿矣故凡肺受邪不能輸化而小便短少皮膚漸腫咳嗽日增者宜用六君子湯以補脾肺六味丸以滋腎水一儒者素勤苦惡風寒鼻流清涕寒栗嚏噴服祛風之藥肢體麻木倦怠痰涎自出殊類中風余以為風劑耗散元氣陰火乘其土位也遂以補中益氣湯加麥門五味治之而安一儒者每至春咳嗽用參蘇飲之類乃愈後復發仍用前藥反喉喑左尺洪數而無力余以為腎經陰火刑剋肺金以六味丸料加麥門五味炒山梔及補中益氣湯而愈夏多火熱炎上最重宜清金降火加桑白皮知母黃芩炒麥門冬石膏各一錢愚按王太僕云壯水之主以制陽光前症若喘急而嗽面赤潮熱其脈洪大者用黃連解毒湯熱躁而咳用梔子仁湯咳唾有血用麥門冬湯俱兼以六味丸夏月尤當用此壯腎水以保肺金嘉興周上舍每至夏患咳嗽服降火化痰之劑咳嗽益甚脾肺腎脈皆浮而洪按之微細余曰此脾土虛不能生肺金肺金不能生腎水而虛火上炎也朝用補中益氣湯夕用六味地黃丸而痊後至夏遂不再發一男子夏月唾痰或嗽用清胃火藥不應余以為火乘肺金用麥門冬湯而愈後因勞復嗽用補中益氣湯加桔梗山梔片芩麥門五味而愈但口乾體倦小便赤澀日用生脈散而痊秋多濕熱傷肺宜清熱瀉濕加蒼朮桑白皮各一錢防風黃芩山梔炒各五分愚按前症若咳而身熱自汗口乾便赤脈虛而洪者用白虎湯身熱而煩氣高而短心下痞滿四肢困倦精神短少者香薷飲若病邪既去宜用補中益氣加乾山藥五味子以養元氣柴胡升麻各二分以升生氣冬多風寒外感宜解表行痰加麻黃桂枝半夏乾薑防風各一錢肺金素有熱者再加酒炒黃芩知母各五分若發熱頭痛鼻塞聲重再加藁本川芎前胡柴胡各一錢愚按果系前症若風寒外感形氣病氣俱實者宜用麻黃之類所謂從表而入自表而出若形氣病氣俱虛者宜補其元氣而佐以解表之藥若專於解表則肺氣益虛腠理益疏外邪乘虛易入而其病愈難治矣若病日久或誤服表散之劑以致元氣虛而邪氣實者急宜補脾土為主則肺金有所養而諸病自愈若人老弱或勞傷元氣而患前症誤用麻黃枳殼紫蘇之類而汗出亡陽者多患肺癰肺痿治失其宜多致不起一男子神勞冬月患咳嗽服解散之劑自以為便余曰此因肺氣虛弱腠理不密而外邪所感也當急補其母是治本也始服六君子湯內去參術反加紫蘇枳殼之類以致元氣益虛生肺癰而歿太守錢東墟先患肩疽屬足三陰虛火不歸源用壯水之主以制陽光而愈余曰瘡疾雖愈當屏去侍女恐相火一動其精暗流金水復竭必致變症後果喘嗽痰出如湧面目赤色小便淋澀又誤認為外感風寒用麻黃湯表散汗出不止迎余視之其脈已脫惟太衝未絶余曰此脾虛不能攝涎腎虛不能生水肺虛不能攝氣水泛為痰虛寒之症也辭為難治勉以益火之源以消陰翳而愈繼又勞傷神思外邪乘之仍汗出亡陽以致不起若有痰加半夏枳殼風痰再加南星薑汁炒濕痰脾困少食加白朮蒼朮有痰而口燥咽乾勿用半夏南星宜加知母蜜水拌炒貝母栝蔞仁黃芩炒愚按前症若因脾氣虛而為濕痰者宜用補中益氣湯若因腎經虛熱而口燥咽乾者宜用六味丸若夏月熱痰或素熱有痰加黃芩黃連知母石膏愚按前症若心火乘肺輕則用麥門冬湯重則用人參平肺散若上焦實熱用涼膈散虛熱用六君子湯中焦實熱用竹葉石膏湯虛熱用竹葉黃耆湯下焦虛熱用六味丸一武職因飲食起居失宜咳嗽吐痰用化痰止嗽之藥時仲夏左尺洪數而無力胸滿面赤唾痰腥臭自汗余曰腎虛水泛為痰而反重亡津液得非肺癰乎不信仍服前藥翌日吐膿脈數右寸為甚用桔梗湯一劑數脈與膿頃減又二劑將愈佐以六味丸而痊上半日咳者胃中有火加貝母石膏黃連五更咳者同上愚按前症若胃中熱甚為患者宜用本方泄之若胃中微熱為患者當用竹葉石膏湯清之若胃中虛熱所致者須用補中益氣湯補之俱少佐以治痰之劑其五更咳嗽者當作脾虛宿食為痰治之一儒者咳嗽用二陳芩連枳殼胸滿氣喘侵晨吐痰加蘇子杏仁口出痰涎口乾作渴余曰清晨吐痰脾虛不能消化飲食也胸滿氣喘脾虛不能生肺金也涎沫自出脾虛不能收攝也口乾作渴脾虛不能生津液也用六君子加炮薑肉果溫補脾胃更用八味丸以補土母而安若咳嗽久肺虛滋氣補血加人參黃耆阿膠當歸生薑天門冬款冬花馬兜鈴芍藥酒炒之類肺熱喘咳去人參用沙參此兼補血氣也愚按肺屬金生於脾土凡肺金受邪由脾土虛弱不能生肺乃所生受病治者審之黃昏咳者火浮於肺不可正用寒涼藥宜加五味子五倍子訶子皮斂而降之愚按前症屬脾肺氣虛以致腎經陽虛陰弱而虛火上炎或房勞太過虧損真陰為患法當補脾肺生腎水不可專主於肺也若午後嗽者屬陰虛即勞嗽也宜補陰降火加川芎當歸芍藥熟地黃柏知母竹瀝薑汁天門冬栝蔞仁貝母此專補陰血也愚按前症屬腎氣虧損火炎水涸或津液湧而為痰者乃真臟為患也須用六味地黃丸壯腎水滋化源為主以補中益氣湯養脾土生肺腎為佐設用清氣化痰則誤矣司廳陳國華素陰虛患咳嗽自謂知醫用發表化痰之劑不應用清熱化痰等藥愈甚余以為脾肺虛不信用牛黃清心丸反加胸腹作脹飲食少思遂朝用六君桔梗升麻麥門五味補脾土以生肺金夕用八味丸補命門火以生脾土諸症漸愈中翰鮑羲伏患陰虛咳嗽服清氣化痰丸及二陳芩連之類痰益甚用四物黃柏知母之類腹脹音啞右關脈浮弦左尺洪大余朝用補中益氣湯加山茱麥門五味夕用六味地黃丸加五味子三月餘喜其慎疾得愈若火鬱嗽為痰鬱火邪在中宜開鬱消痰用訶子皮香附童便浸栝蔞仁半夏曲海石青黛黃芩為末蜜調為丸噙化仍服前補陰降火藥失治則成勞愚按前症若因肺胃蘊熱痰氣不利宜用前藥若因脾肺不清氣鬱痰滯用二陳加山梔枳殼桔梗若因鬱結傷脾氣血虛損用濟生歸脾加山梔桔梗若因怒動肝火脾土受克用四君子加山梔柴胡若勞役失宜傷損元氣用補中益氣加山梔桔梗一婦人不得於姑患咳胸膈不利飲食無味此脾肺俱傷痰鬱於中先用歸脾湯加山梔撫芎貝母桔梗諸症漸愈一婦人咳嗽脅痛發熱日晡益甚用加味逍遙散加熟地治之而愈後因勞役多怒前症仍作又少陽寒熱往來或咳嗽遺尿皆屬肝虛火旺陰挺痿痹用前散及地黃丸而痊若痰積食積作咳嗽者用香附栝蔞仁貝母海石青黛半夏曲軟石膏山楂枳實黃連薑炒為末蜜調噙化愚按前症若因飲食停滯胃口濕熱所化者宜用本方若因脾胃氣虛而痰積滯用六君子加枳殼木香若因脾胃氣虛而食積滯用六君子加神麯麥芽夫早間吐痰咳嗽屬食積喘促咳嗽屬肺氣虛火旺大抵當助胃壯氣為主不可專攻其痰若勞嗽見血加阿膠當歸芍藥天門冬知母貝母桑白皮亦於前肺虛陰虛二條擇用大抵咳嗽見血多是肺受熱邪氣得熱而變為火火盛而陰血不寧從火上升故治宜瀉火滋陰忌用人參等甘溫之藥然亦有氣虛而咳血者則宜用人參黃耆款冬花等藥但此等症不多耳愚按前症亦有勞傷元氣內火妄動而傷肺者亦有勞傷腎水陰火上炎而傷肺者有因過服天門生地寒藥損傷脾胃不能生肺氣而不愈者有因誤用黃柏知母之類損傷陽氣不能生陰精而不愈者凡此皆脾肺虧損而腎水不足以致虛火上炎真臟為患也須用補中益氣湯補脾土而生肺金用六味地黃丸滋腎水而生陰精否則不救一武職素不慎起居吐痰自汗咳嗽發熱服二陳芩連山梔之類前症不減飲食少思用四物二陳芩連之類前症愈甚反添胸膈不利食少晡熱加桑皮杏仁紫蘇之類胸膈膨脹小便短少用四苓枳殼之類小便不通飲食不進余視之六脈洪數肺腎二部尤甚余曰脾土既不能生肺金而心火乘之必變肺癰之症也不信仍服前藥後吐痰唾膿復求治余曰胸膈痞滿脾土敗也已而果歿因咳而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾但是食積成痰痰氣上升以致咳嗽只治其痰消其積而咳自止不必用肺藥以治咳也愚按前論治法最是仍分六淫七情及五臟相勝脾肺虛實以治之否則恐成肺癰之症一男子脾胃不和服香燥行氣之劑飲食少思兩脅脹悶服行氣破血之藥致飲食不入右脅脹痛喜手按之余曰乃肝木克脾土而脾土不能生肺金也用滋化源之藥四劑諸症頓退余又曰火令在邇當再補脾土以養肺金不信後復作吐膿而歿痰飲痰屬濕熱乃津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲或吐咯上出或凝滯胃膈或留聚腸胃或客於經絡四肢隨氣升降遍身上下無處不到其為病也為喘為咳為噁心嘔吐為痞隔壅塞關格異病為泄為眩暈為嘈雜怔忡驚悸為癲狂為寒熱為痛腫或胸間轆轆有聲或背心一點常如冰冷或四肢麻痹不仁皆痰所致百病中多有兼痰者世所不知也痰有新久輕重之殊新而輕者形色清白氣味亦淡久而重者黃濁稠結咳之難出漸成惡味酸辣腥臊鹹苦甚至帶血而出治法痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食積則消之在上者吐之在中者下之又中氣虛者宜固中氣以運痰若攻之太重則胃氣虛而痰愈甚矣主方二陳湯橘紅半夏湯泡白茯苓甘草炙生薑上方總治一身之痰如要下行加引下藥上行加引上藥若濕痰多軟如身體倦怠之類加蒼白朮寒痰痞塞胸中倍加半夏甚者加麻黃細辛烏頭之類愚按痰者脾胃之津液或為飲食所傷或因七情六淫所擾故氣壅痰聚諺云肥人多痰而在瘦人亦有之何也蓋脾統血行氣之經氣血俱盛何痰之有皆由過思與飲食所傷損其經絡脾血既虛胃氣獨盛脾為己土胃為戊土戊癸化火是以濕因氣化故多痰也遊行周身無所不至痰氣既盛客必勝主或奪於脾之大絡之氣則倏然仆地者此痰厥也升於肺者則喘急咳嗽迷於心則怔忡恍惚走於肝則眩暈不仁脅肋脹痛關於腎不哈而多痰唾留於胃脘則嘔瀉而作寒熱注於胸則咽膈不利眉稜骨痛入於腸則漉漉有聲散則有聲聚則不利竊謂若脾氣虛弱不能消濕宜用補中益氣湯加茯苓半夏若因脾氣虛弱濕熱所致宜用東垣清燥湯若因胃氣虛弱寒痰凝滯者宜用人參理中湯若因脾胃虛寒而痰凝滯者宜用理中化痰丸若因脾虛而痰滯氣逆宜用六君子加木香若因脾胃虛弱而肝木乘侮宜用六君子加柴胡頭痛宜用半夏白朮天麻湯若因脾腎虛弱寒邪所乘以致頭痛宜用附子細辛湯若風痰加南星枳殼白附子天麻殭蠶豬牙皂角之類氣虛者更加竹瀝氣實加荊瀝俱用薑汁愚按脈訣云熱則生風故云風自火出若風邪氣滯痰蘊於胸中者宜用之若因肺經風熱而生痰者宜用金沸草散若因風火相搏肝經風熱熾盛而生痰者宜用牛黃抱龍丸或牛黃清心丸若因肝經血燥而生痰者宜用六味地黃丸若因熱盛制金不能平木而生痰者宜用柴胡梔子散若因中氣虛弱不能運化而生痰者宜用六君柴胡鉤藤若熱痰加黃芩黃連痰因火盛逆上降火為先加白朮黃芩軟石膏黃連之類眩暈嘈雜者火動其痰也亦加山梔黃芩黃連愚按前方若肺胃實火者宜用之若風寒鬱熱宜用參蘇飲加山梔片芩若中氣虛熱宜用補中益氣加半夏桔梗若腎虛陰火炎上宜用六味丸若腎氣虛寒痰上湧用八味丸若血虛有痰者加天門冬知母栝蔞仁香附米竹瀝薑汁帶血者再加黃芩白芍藥桑白皮血滯不行中焦有飲者取竹瀝和生薑韭菜自然汁服三五盞必胃中煩躁不寧後自愈愚按前方苦寒甘寒辛辣降火化痰行氣破血之劑須審有是病而乃服是藥可也病去六七即當止之過劑則反傷中氣而病益甚大凡內因之症原屬脾胃虛弱當審所致之由而調養之若稍重其劑復傷胃氣虛症蜂起若氣虛有痰者加人參白朮脾虛者宜補中氣以運痰降下加白朮白芍藥神麯麥芽兼用升麻提起內傷挾痰加人參黃耆白朮之類薑汁傳送或加竹瀝尤效愚按前症若脾肺氣虛不能運化而有痰者宜用六君子加木香若肺氣虛弱不能清化而有痰者宜用六君子加桔梗若因脾經氣滯而痰中有血者宜用加味歸脾湯若因肝經血熱而痰中有血者宜用加味逍遙散若因肝腎陰虛而痰中有血者宜用六味地黃丸若因過服寒涼之劑而唾痰有血者必用四君子湯之類以主之若食積痰加神麯麥芽山楂黃連炒枳實以消之甚者必用攻之宜丸藥若兼血虛者用補藥送下中焦有痰者食積也胃氣亦賴所養若攻之盡則虛矣愚按前症若元氣素實偶因飲食過多而致者宜用主方消導宿滯蓋食痰多因脾虛食難消化而作痰也血虛者多因脾氣衰弱不能生血也皆當調補脾胃之氣則無食積之患而血自生矣故東垣云脾胃之氣實用黃連枳實瀉之虛用白朮陳皮補之其方內用神麯麥芽説見上卷府庠沈文姬母食濕面吞酸嘔吐絶食服芩連等劑加寒熱口乾流涎又食冬瓜一星而嘔吐愈甚余謂此脾氣虛寒也急用鹽艾附子炒熱尉臍腹又以其子口氣接其母氣神氣少蘇以參朮附子陳皮為末丸如粟米大津咽五七粒次日加至十餘粒漸服煎劑一二匙乃思粥飲又以參術等藥五十餘劑而愈詳見內科摘要若喉中有物咯不出咽不下此痰結也用藥化之加咸藥軟堅之類宜栝蔞仁杏仁海石桔梗連翹香附少佐朴硝薑汁煉蜜和丸噙服之脈澀者卒難開必費調理氣實痰熱結者吐難得出或成塊吐咯不出氣滯者難治愚按此方治形症充實之法也前症有因脾經鬱結而傷陰血者有因腎水虧損而陰火上炎者有因脾肺火鬱而生痰者治法若因七情鬱結痰涎滯於喉間者先用局方四七湯調和滯氣後用歸脾湯調補脾血脾火傷血用加味歸脾湯腎水虧損用六味地黃丸肺經鬱火用知母茯苓湯若婦人患此而兼帶下皆由鬱結傷損肝脾當佐以四七湯送青州白丸子此等症候屬脾胃氣虛為本而氣滯痰結為末也古方用十棗湯控涎丹神佑丸滾痰丸異香枳實利膈滌痰透羅破飲降氣化痰等湯蘇合香丸之類皆形病充實之藥也西北人用之多有效驗其屬虛弱者皆致肚腹脹滿而歿大參李北泉時吐痰涎內熱作渴肢體倦怠勞而足熱余曰此腎水泛而為痰法當補腎不信另用化痰湯滾痰丸吐瀉不食頭暈眼閉余用六君子湯數劑胃氣漸復用六味丸諸症漸愈一儒者咳嗽痰盛胸腹不利飲食少思肢體倦怠脈浮大按之微弱服二陳枳殼等藥愈盛余曰脾肺腎虛也用補中益氣湯六味地黃丸而愈若痰在腸胃間可下而愈枳實甘遂巴豆大黃芒硝之類痰在脾里膜外非薑汁竹瀝不能及在四肢非竹瀝不開在經絡中亦用竹瀝必佐以薑韭汁膈間有痰或癲狂或健忘或風痰俱用竹瀝與荊瀝同功氣虛少食用竹瀝氣實能食用荊瀝痰在脅下非白芥子不能達愚按前症多因飲食起居七情失宜耗損元氣內火動而為患者當求其屬而治其本可也前法乃慓悍之劑非灼見形氣俱充實者決不可用必先察其病形脈症則知所挾之邪隨其表裡上下虛實以治之若夫挾寒挾虛之症不可不論也一儒者脾氣虛弱嘔吐痰涎因怒胸腹膨脹飲食少思左關脈弦長按之無力右關脈弦長按之微弱此木剋土也用六君子加柴胡山梔木香治之而愈一婦人脾胃虛弱飲食素少忽痰壅氣喘頭搖目扎手揚足擲難以候脈視其面色黃中兼青此肝木乘脾胃也用六君子加柴胡升麻治之而蘇更以補中益氣加半夏調理而痊若老痰用海石半夏栝蔞仁香附米連翹之類五倍子佐他藥大治頑痰宜作丸服愚按前症若脾氣壅滯痰客中焦者宜先用此方以治其痰後用六君子以調補脾氣其痰自消若始未悉治其痰則脾氣益虛津液不行而痰益盛矣一男子吐痰胸膈不利飲食少思服海石栝蔞之類不應余曰此脾氣虛弱不能消導而為痰當健脾為主彼不信又服驅逐之劑其痰如湧四肢浮腫小腹腫脹小便澀滯余曰此復損脾腎所致也先用金匱加減腎氣丸補中益氣湯治之諸症漸減又用八味丸兼前湯而愈一男子素吐痰遇怒其痰益甚胸膈痞滿此肝木製脾土也用六君加木香治之而痊一婦人素鬱結胃膈不寬吐痰如膠用加味歸脾湯乃瘥一婦人吐痰頭暈帶下青黃用四七湯送白丸子小柴胡加白朮茯苓治之而安人身上中下有塊是痰也問其平日好食何物吐下後方用藥若頭面頸頰身中有結核不痛不紅不作膿者皆痰注也宜隨處用藥消之愚按前症若脾肺氣逆而痰滯於肉裡或散或作肉色不變亦不作痛按之不硬此為痰核宜推其因而治其本則痰自消若因鬱怒虧損肝脾或因暴怒觸動肝膽經火以致血病結核或筋攣於項側耳前後或胸脅腫痛或發寒熱此為瘰癧宜用柴胡清肝散加鉤藤鉤山梔以養血氣清肝火若肉色不變晡熱內熱屬肝經血虛火旺宜用逍遙散加龍膽草以養肝血清肝火或結於肢節或纍纍如貫珠其色不變亦為肝火血燥而筋攣宜用柴芍參苓散加鉤藤以養血氣佐以六味丸以生腎水儒者楊澤之性躁好色缺盆結一核此肝火血燥筋攣法當滋腎水生肝血不信乃內服降火化痰外敷南星商陸轉大如碗余用補中益氣及六味地黃間以蘆薈丸年餘元氣漸復而腫消一婦人經事不調肝膽經分結核如榛如豆不計其數肉色不變大按方痛或投化痰消毒之藥不按自痛發熱作渴日晡益甚余謂屬肝火之症用養血解鬱清肝之藥百餘劑諸症已退惟項核未消更以當歸龍薈丸數服及四物柴胡山梔而愈一婦人耳前後結核耳內微腫寒熱口苦用小柴胡山梔桔梗川芎四劑而愈後因恚怒耳前後頭兩角俱痛發熱憎寒以小柴胡山梔川芎桔梗羌活二劑而愈詳見外科樞要滾痰丸攻瀉腸胃痰積及小兒食積痰急驚風痰甚者最為要藥常宜合備但須量人虛實而用之愚按滾痰丸奪旗斬關回生起死之劑必痰滯胸膈祕結不利形氣病氣俱實者乃可用之或脾氣不能攝涎而上泛或腎氣不能攝水而上溢苟誤認為實痰而用之禍在反掌江南人尤慎之一婦人元氣素弱痰氣時作或咽間不利或胸痞等症余以為鬱結傷脾用加味歸脾湯治之而愈後遇恚怒前症仍作惑於衆言以為痰飲妄用祛痰之劑吐瀉數次變諸異症口噤不醒余以為脾胃復傷日用六君子一劑米飲濃煎常服匙許至四日漸進粥食乃服前藥間以歸脾湯喜其善調養兩月餘諸症悉愈擬治嶺南諸病春秋時月人感山嵐瘴霧之氣發寒熱胸膈飽悶不思飲食此毒氣從鼻口入內也治當清上焦解內毒行氣降痰不宜發汗主方黃連薑炒黃芩木香厚朴薑製枳實麩炒半夏湯洗桔梗柴胡川芎木通各一錢生甘草七分升麻蒼朮泔浸鹽水炒各一錢五分上薑水煎食前熱服愚按嶺南炎方瀕海地卑土薄故陽氣常泄陰氣常盛四時放花冬無霜雪一歲之間暑熱過半窮臘久晴或至搖扇人居其間氣多上壅膚多汗出腠理不密蓋陽不反本而然也陽燠既泄則使人本氣不堅陽不下降常浮而上氣浮而不堅則玄府開疏汗液易泄故內寒外熱上熱下寒之症由生也治當固陽氣實腠理為主若多用表散之藥則陽氣愈虛風邪益盛鮮有不誤者矣苟系外邪為患則當解散之外邪既解而病仍作肺氣傷也用補中益氣湯若頭目不清胃氣不能上升也加蔓荊子若飲食少思胃氣虛也用四君子湯若食而難化脾氣虛也用六君子加芍藥當歸若畏寒冷飲食或作吞酸脾氣虛寒也前藥更加炮薑不應再加吳茱萸四分黃連二分余各當推而治之嶺南瘴癘為患諸症詳見衛生篇凡宦遊此地者當備此書而常覽之若寒溫失節汗身脫衣巾感冒風寒之氣氣閉發熱頭疼此則傷寒類也但嶺南氣溫易出汗故多類瘧重則寒熱不退輕則為瘧南方氣升故嶺南人得此病者卒皆胸滿痰涎壅塞飲食不進與北方傷寒只傷表而里自和者不同治當解表清熱降氣行痰此方用於寒涼時月及雖在溫暖時而感冒風寒者羌活蒼朮泔浸柴胡黃芩橘紅半夏湯洗枳實甘草炙川芎各一錢上薑水煎食前服渣隨服取汗出止服愚按前症若內停飲食外感風寒用藿香正氣散若脾氣虛弱而寒熱作嘔用金不換散蓋嶺南之地濕熱熏蒸腠理不閉津液妄泄陽氣內虛法當調補肺氣為主蓋肺主氣而司腠理肺氣虛則腠理不密故津液妄泄多患前症若外邪既去當補脾土以生肺金瘴瘧時瘧寒熱往來柴胡知母各一錢五分炒蒼木泔浸黃芩酒炒乾葛陳皮半夏湯洗川芎各一錢甘草七分炙上薑三片烏梅二個水煎侵晨午前服愚按前症若因外邪未解而寒熱往來者宜用原方解散之若因脾氣素弱或服前藥外邪既去而寒熱不止或欲嘔少食者脾氣虧損也宜用補中益氣湯加半夏乾葛茯苓調補之若午前寒熱屬氣虛用四君子加當歸升麻若午後寒熱屬血虛用八珍湯加柴胡升麻大凡病久氣虛而血弱者必發熱須用四君之類調補脾胃脾胃一健氣血自生若誤認為血虛而用四物沉陰之劑徑生其血則脾土復傷諸臟皆病虛症蜂起反為難治甚致不救瘧久者加人參一錢五分當歸一錢汗多者去蒼朮換白朮加白芍藥酒炒一錢五分愚按瘧久不愈屬中氣虛不能滋養諸臟但調補脾胃諸病自退其汗自出者乃陽氣虛而不能衛固於腠理也用四君加歸耆陳皮未應加薑桂手足逆冷急加附子盜汗者陰虛而腠理不密也宜用八珍加肉桂五味子煩熱作渴暫用當歸六黃湯其中三黃俱炒黑倍加參耆汗既止仍用八珍散之類若腎氣素虛發熱作渴宜六味丸手足逆冷或痰氣上攻宜用八味丸若邪氣既散而寒熱仍作此真氣虛也即用補中益氣湯若氣血虛而寒熱者用八珍湯若治失其宜則元氣虧損變症百出不但久瘧而已矣瘧後變成痢疾宜從虛治故用補脾胃藥黃連炒木香縮砂黃芩炒橘皮白朮當歸酒洗各一錢白芍藥炒二錢甘草炙五分上薑水煎食前服愚按前症乃病氣有餘形氣不足而變症也宜用原方以清解脾胃邪熱若病氣形氣俱不足而不能愈宜補中益氣湯滋養諸臟自愈若溫暑之月民病天行瘟疫熱病治宜清熱解毒之劑兼治內外愈後隨當調理脾胃以壯元氣枯黃芩升麻乾葛知母酒炒各一錢人參石膏白芍藥各一錢半黃連酒炒四分甘草七分羌活二錢生地黃酒洗五分上薑水煎食前熱服渣繼服愚按前症若邪在足陽明表裡不解者宜用本方和解之若疏通過度胃氣虧損而發熱煩渴者用竹葉黃耆湯以生津液若誤汗亡陽而發熱煩渴者用升陽益胃湯若誤下亡陰而發熱煩躁者用理中湯若胸膈痞悶痰涎壅塞者加枳實半夏各一錢生薑汁四五匙脾胃不實加白朮一錢半愚按前症若形病表裡俱實而痰邪痞悶者宜用本方若脾肺氣虛痰涎不得運化而痞悶者宜用六君子少加桔梗枳殼若脾胃虛弱不能攝涎歸源而痞悶者宜用六君炮薑若時氣發熱變為黃病所謂瘟黃也治宜內瀉濕熱茵陳黃連薑水炒山梔仁白茯苓厚朴薑水炒木通白朮人參各一錢木香七分白芍藥酒炒乾葛各一錢半上薑水煎食前服渣繼服愚按前症若因濕熱壅滯所致者宜用此方若因病久元氣益虛而脾之正色見於外者宜用補中益氣加茵陳茯苓若中氣虛寒四肢厥冷或浮腫黑黃者用人參理中湯加茯苓茵陳觀東坡任黃州用聖散子正謂此意土人不知反用檳榔導損真氣疏泄腠理外邪易感病由是作若節飲食慎起居適寒暑固元氣以卻外邪雖患是症亦為輕淺嘉靖甲申春南都大疫煎聖散子普濟老幼並服來者接踵死者塞途良可哀憫殊不知此方因嶺南風土而作且浙之與廣相去萬里殊域異方天時人事大不相侔豈有概一治療而無誤者哉
